<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e3a44">
<title>TripPilot</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="16x16" href="icon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<style>
:root{
  --tabbar-height:62px;
  --paper:#f5f1e8;
  --card:#fffdf8;
  --ink:#22303a;
  --ink-soft:#5c6b73;
  --ink-faint:#94a0a6;
  --line:#e5ddcd;
  --line-soft:#eee8db;
  --sea:#12707f;
  --sea-deep:#0e3a44;
  --coral:#df5f3a;
  --coral-bg:#fbeee7;
  --gold:#c1963c;
  --green:#3c8062;
  --violet:#7659a0;
  --shadow:0 2px 12px rgba(24,44,52,.08);
  --shadow-lg:0 8px 28px rgba(24,44,52,.16);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
html,body{touch-action:pan-x pan-y}
body{
  font-family:"Hiragino Sans","Noto Sans TC","PingFang TC",system-ui,-apple-system,sans-serif;
  background:var(--paper);color:var(--ink);line-height:1.6;font-size:15px;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
  padding-bottom:calc(var(--tabbar-height) + env(safe-area-inset-bottom));
}
a{color:var(--sea)}
input,select,textarea{font-size:16px}

/* ===== 頂部列 ===== */
.hdr{position:sticky;top:0;z-index:60;box-shadow:0 2px 10px rgba(0,0,0,.18)}
.topbar{
  background:var(--sea-deep);
  padding:calc(env(safe-area-inset-top) + 8px) 12px 0;
}
.brand{display:flex;align-items:center;gap:8px;padding-bottom:8px;justify-content:center}
.brand .logo{
  width:26px;height:26px;border-radius:7px;object-fit:cover;display:block;flex:0 0 26px;
}
.brand .logo.simulating{filter:hue-rotate(120deg) saturate(1.35)}
.sim-marker{display:none;color:#ffe19a;font-size:11px;font-weight:800}
.sim-marker.on{display:inline}
.brand .t{color:#fff;font-size:15px;font-weight:700;letter-spacing:.03em}
.brand .sync{
  position:absolute;right:12px;top:calc(env(safe-area-inset-top) + 8px);
  font-size:11px;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:4px;
  background:rgba(255,255,255,.1);border-radius:20px;padding:5px 10px;border:none;cursor:pointer;
  font-family:inherit;
}
.brand .sync .dot{width:7px;height:7px;border-radius:50%;background:#5ec27a}
.brand .sync .dot.stale{background:var(--gold)}
.brand .sync .dot.err{background:var(--coral)}
.brand .sync.spinning .dot{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.trip-tabs{display:flex;gap:6px}
.trip-tab{
  flex:1;background:transparent;border:none;cursor:pointer;color:rgba(255,255,255,.5);
  padding:9px 4px 11px;font-size:14px;font-weight:600;border-bottom:3px solid transparent;
  font-family:inherit;transition:.2s;
}
.trip-tab .sub{display:block;font-size:10.5px;font-weight:400;opacity:.7;margin-top:1px}
.trip-tab.active{color:#fff;border-color:var(--coral)}

/* ===== 日期橫向 ===== */
.daybar{
  background:var(--sea);display:flex;gap:7px;overflow-x:auto;padding:8px 12px;
  scrollbar-width:none;
}
.daybar::-webkit-scrollbar{display:none}
.day-chip{
  flex:0 0 auto;background:rgba(255,255,255,.13);border:none;border-radius:18px;cursor:pointer;
  color:rgba(255,255,255,.85);font-family:inherit;padding:6px 13px;font-size:13px;
  font-weight:600;white-space:nowrap;transition:.2s;line-height:1.3;text-align:center;
}
.day-chip .dow{font-size:9.5px;opacity:.8;display:block;font-weight:400}
.day-chip.active{background:var(--coral);color:#fff}
.day-chip.today-chip{box-shadow:0 0 0 2px #ffd98a inset}

/* ===== 內容 ===== */
.wrap{max-width:620px;margin:0 auto;padding:14px 12px 40px;min-height:calc(100vh - var(--tabbar-height) - env(safe-area-inset-bottom));min-height:calc(100dvh - var(--tabbar-height) - env(safe-area-inset-bottom))}
.view{display:none}
.view.active{display:block;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}

/* 今日首頁 hero */
.today-hero{
  background:linear-gradient(140deg,var(--sea-deep),var(--sea));color:#fff;
  border-radius:16px;padding:15px 16px 16px;margin-bottom:14px;box-shadow:var(--shadow-lg);
  position:relative;overflow:hidden;
}
.today-hero::after{
  content:"";position:absolute;right:-30px;top:-30px;width:130px;height:130px;
  background:radial-gradient(circle,rgba(223,95,58,.35),transparent 70%);
}
.today-hero .lbl{font-size:11px;letter-spacing:.14em;opacity:.75;font-weight:600}
.today-hero .date{font-size:24px;font-weight:800;margin:2px 0 2px;position:relative}
.today-hero .loc{font-size:13px;opacity:.9;position:relative}
.today-hero .empty{font-size:14px;opacity:.9;margin-top:6px;line-height:1.6;position:relative}
.today-hero.weather-on{display:flex;align-items:center;justify-content:space-between;gap:10px}
.today-hero-main{min-width:0;position:relative}
.weather-chip{flex:0 0 auto;text-align:right;font-size:13px;line-height:1.25;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);border-radius:999px;padding:8px 11px;color:#fff;font-weight:800;white-space:nowrap;position:relative}
.weather-chip .city{font-size:12.5px;opacity:.9;font-weight:700;margin-right:2px}
.mini-tl{margin-top:14px;position:relative}
.mini-item{display:flex;gap:11px;align-items:flex-start;padding:6px 0}
.mini-item .mt{font-size:12.5px;font-weight:700;color:#ffd98a;min-width:46px;padding-top:1px}
.mini-item .mc{flex:1;font-size:14px;font-weight:600;line-height:1.4}
.mini-item .mc small{display:block;font-size:11.5px;font-weight:400;opacity:.75;margin-top:1px}
.mini-item .md{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);margin-top:5px;flex:0 0 auto}
.mini-item.done .mc{opacity:.5;text-decoration:line-through}
.today-jump{
  display:inline-block;margin-top:12px;background:rgba(255,255,255,.16);color:#fff;
  border:none;border-radius:10px;padding:9px 16px;font-size:13.5px;font-weight:600;
  cursor:pointer;font-family:inherit;position:relative;
}

/* 住宿卡 */
.hotel{
  background:var(--card);border-left:4px solid var(--gold);border-radius:12px;
  padding:13px 15px;margin-bottom:16px;box-shadow:var(--shadow);
}
.hotel .h-lbl{font-size:10.5px;letter-spacing:.1em;color:var(--gold);font-weight:700;margin-bottom:4px}
.hotel .h-name{font-size:15.5px;font-weight:700;margin-bottom:5px}
.hotel .h-meta{font-size:12.5px;color:var(--ink-soft);line-height:1.65;white-space:pre-line}

/* 日標題 */
.day-head{display:flex;align-items:baseline;gap:10px;margin:4px 2px 14px;padding-bottom:9px;border-bottom:2px solid var(--line)}
.day-head .num{font-size:12px;font-weight:800;color:#fff;background:var(--coral);border-radius:7px;padding:3px 9px;letter-spacing:.03em}
.day-head .date{font-size:19px;font-weight:800;color:var(--sea-deep)}
.day-head .prog{margin-left:auto;font-size:12px;color:var(--ink-faint);font-weight:600}
.trip-filter{display:flex;gap:8px;margin:10px 0 12px}
.trip-filter-btn{flex:1;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);border-radius:999px;padding:9px 10px;font-size:13px;font-weight:800}
.trip-filter-btn.on{background:var(--sea);border-color:var(--sea);color:#fff}

/* 行程項目 */
.item{background:var(--card);border-radius:13px;margin-bottom:10px;box-shadow:var(--shadow);border:1px solid var(--line);overflow:hidden;transition:.2s}
.item.checked{opacity:.62}
.item-main{display:flex;align-items:flex-start;gap:11px;padding:12px 13px}
.chk{
  flex:0 0 auto;width:24px;height:24px;border-radius:7px;border:2px solid var(--line);
  background:#fff;cursor:pointer;margin-top:2px;display:flex;align-items:center;justify-content:center;
  transition:.15s;font-size:14px;color:#fff;
}
.chk.on{background:var(--green);border-color:var(--green)}
.time{flex:0 0 auto;font-size:12.5px;font-weight:700;color:var(--coral);background:var(--coral-bg);border-radius:6px;padding:3px 7px;margin-top:1px;min-width:50px;text-align:center;line-height:1.3}
.time.blank{background:var(--line-soft);color:var(--ink-faint)}
.body{flex:1;min-width:0}
.act{font-size:15.5px;font-weight:700;line-height:1.35;word-break:break-word}
.item.checked .act{text-decoration:line-through}
.place-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:3px}
.place{font-size:14px;font-weight:600;color:var(--sea);word-break:break-word}
.tag{display:inline-block;font-size:10.5px;font-weight:700;border-radius:5px;padding:2px 6px;margin-top:5px}
.tag.food{background:#fdeee3;color:#c0562e}
.tag.shop{background:#e9f2ec;color:var(--green)}
.tag.move{background:#e7f0f2;color:var(--sea)}
.tag.stay{background:#f4ecd8;color:#9a7620}
.tag.play{background:#efeaf6;color:var(--violet)}
.snippet{font-size:12.5px;color:var(--ink-faint);margin-top:4px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}

/* 導航按鈕列 */
.nav-btns{display:flex;gap:6px;padding:0 13px 11px 48px;flex-wrap:wrap}
.nav-btn{
  display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;
  border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 10px;
  cursor:pointer;font-family:inherit;color:var(--ink-soft);text-decoration:none;transition:.15s;
}
.nav-btn:active{transform:scale(.96)}
.nav-btn.g{color:var(--sea);border-color:#bfe0e2;background:#eef8f8}
.nav-btn.t{color:var(--violet);border-color:#ddd2ee;background:#f4f0fa}
.nav-btn.u{color:#111;border-color:#ccc;background:#f4f4f4}

/* 展開詳情 */
.more-btn{
  display:inline-flex;align-items:center;gap:5px;margin:0 13px 11px 48px;
  font-size:12px;font-weight:600;color:var(--ink-faint);cursor:pointer;
  background:var(--line-soft);border:none;border-radius:8px;padding:6px 11px;font-family:inherit;
}
.more-btn .arw{transition:transform .25s;font-size:9px}
.more-btn.open .arw{transform:rotate(180deg)}
.detail{display:none;margin:0 13px 12px 48px;padding:11px 13px;background:#faf8f2;border-radius:10px;border:1px solid var(--line)}
.detail.open{display:block;animation:fade .25s ease}
.detail .sec{font-size:12.5px;line-height:1.7;white-space:pre-line;color:#3f4a50}
.detail .sec + .sec{margin-top:9px;padding-top:9px;border-top:1px dashed var(--line)}
.detail .sec-lbl{font-size:11px;font-weight:700;color:var(--coral);margin-bottom:3px;letter-spacing:.05em}
.detail .sec.move .sec-lbl{color:var(--sea)}
.detail a{word-break:break-all}
.detail .hl{background:#fdf0d5;padding:0 3px;border-radius:3px;color:#8a6416;font-weight:600}

/* 分段標籤 */
.seg{font-size:11.5px;font-weight:700;color:var(--ink-faint);letter-spacing:.12em;margin:18px 2px 8px;display:flex;align-items:center;gap:8px}
.seg::before,.seg::after{content:"";height:1px;background:var(--line);flex:1}

/* ===== 分帳 ===== */
.split-intro{font-size:13px;color:var(--ink-soft);margin-bottom:14px;line-height:1.6}
.card{background:var(--card);border-radius:13px;padding:15px;box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:13px}
.card h3{font-size:14.5px;color:var(--sea-deep);margin-bottom:12px;font-weight:700;display:flex;align-items:center;gap:7px}
.people-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:6px}
.pchip{background:var(--sea);color:#fff;border-radius:16px;padding:5px 11px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.pchip .x{cursor:pointer;opacity:.7;font-weight:700}
.inline-add{display:flex;gap:7px;margin-top:8px}
.inline-add input{flex:1;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:16px;font-family:inherit;background:#fff}
.inline-add input:focus{outline:none;border-color:var(--sea)}
.btn{background:var(--sea);color:#fff;border:none;border-radius:9px;padding:9px 15px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn.ghost{background:#fff;color:var(--sea);border:1px solid var(--sea)}
.btn.coral{background:var(--coral)}
.btn.sm{padding:7px 12px;font-size:12.5px}
.btn.block{width:100%;margin-top:4px}

.exp-item{padding:11px 0;border-top:1px dashed var(--line)}
.exp-item:first-child{border-top:none}
.exp-item .er1{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.exp-item .edesc{font-weight:600;font-size:14px}
.exp-item .eamt{font-weight:700;color:var(--coral);white-space:nowrap;font-size:14px}
.exp-item .er2{font-size:11.5px;color:var(--ink-faint);margin-top:3px}
.exp-item .edel{font-size:11px;color:var(--ink-faint);cursor:pointer;margin-top:5px;display:inline-block}

.result-card{background:linear-gradient(140deg,var(--sea-deep),var(--sea));color:#fff}
.result-card h3{color:#fff}
.bal-row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;border-top:1px solid rgba(255,255,255,.15)}
.bal-row:first-of-type{border-top:none}
.bal-row .who{font-weight:600}
.bal-row .num{font-weight:700}
.bal-row .num.pos{color:#8ff0a8}
.bal-row .num.neg{color:#ffb59e}
.settle{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.2)}
.settle .s-line{font-size:13.5px;padding:6px 0;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.settle .s-line b{color:#ffd98a}

.field{margin-bottom:11px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px}
.field input,.field select{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 11px;font-size:16px;font-family:inherit;background:#fff}
.field input:focus,.field select:focus{outline:none;border-color:var(--sea)}
.payer-grid{display:flex;flex-wrap:wrap;gap:6px}
.payer-opt{border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;background:#fff;font-weight:600;color:var(--ink-soft)}
.payer-opt.on{background:var(--sea);color:#fff;border-color:var(--sea)}
.split-with{display:flex;flex-wrap:wrap;gap:6px}
.sw-opt{border:1px solid var(--line);border-radius:8px;padding:6px 11px;font-size:12.5px;cursor:pointer;background:#fff;font-weight:600;color:var(--ink-soft);display:flex;align-items:center;gap:5px}
.sw-opt.on{background:#e9f2ec;color:var(--green);border-color:var(--green)}

.empty-state{text-align:center;padding:30px 20px;color:var(--ink-faint);font-size:13.5px;line-height:1.7}

/* ===== 底部導覽 ===== */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:70;background:rgba(255,253,248,.96);
  backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;
  height:calc(var(--tabbar-height) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);
}
.tabbar-btn{
  flex:1;height:var(--tabbar-height);background:none;border:none;cursor:pointer;padding:8px 0 7px;font-family:inherit;
  display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--ink-faint);font-size:12px;font-weight:600;
}
.tabbar-btn .ic{font-size:24px;line-height:1}
.tabbar-btn.active{color:var(--sea)}

.totop{
  position:fixed;right:14px;bottom:calc(74px + env(safe-area-inset-bottom));width:42px;height:42px;
  border-radius:50%;background:var(--sea-deep);color:#fff;border:none;font-size:19px;cursor:pointer;
  z-index:65;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.3s;
  display:flex;align-items:center;justify-content:center;
}
.totop.show{opacity:.9;pointer-events:auto}

.toast{
  position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--sea-deep);color:#fff;padding:11px 18px;border-radius:22px;font-size:13.5px;font-weight:600;
  z-index:90;opacity:0;pointer-events:none;transition:.3s;box-shadow:var(--shadow-lg);white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.has-action{pointer-events:auto;display:flex;align-items:center;gap:12px}
.toast-action{border:0;background:rgba(255,255,255,.16);color:#fff;border-radius:999px;padding:4px 9px;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer}
.toast-action:active{transform:scale(.96)}

.loading{text-align:center;padding:50px 20px;color:var(--ink-faint)}
.spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--sea);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== V1 元件 ===== */
.chip-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.drive-chip{display:inline-block;font-size:10.5px;font-weight:700;border-radius:5px;padding:2px 7px;margin-top:5px;background:#e7f0f2;color:var(--sea)}
.qa-row{display:flex;gap:7px;padding:0 13px 12px 48px;flex-wrap:wrap}
.qa-btn{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:700;border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 13px;cursor:pointer;font-family:inherit;color:var(--ink-soft);text-decoration:none;transition:.15s;min-height:38px}
.qa-btn:active{transform:scale(.96)}
.qa-btn.drv{color:#fff;border-color:var(--sea);background:var(--sea)}
.qa-btn.pk{color:#1256a0;border-color:#bcd6f0;background:#eaf3fc}
.qa-btn.nf{color:#9a7620;border-color:#e8d9ae;background:#faf3df}
.qa-btn.fr{color:#0e6d8c;border-color:#b8dde9;background:#e8f6fb}
.qa-btn.sp{color:var(--green);border-color:#c4dccd;background:#edf5f0}
.qa-btn.mo{color:var(--ink-faint);border-color:var(--line);background:var(--line-soft)}
.qa-btn.on{outline:2px solid currentColor;outline-offset:-2px}
.panel{display:none;margin:0 13px 12px 48px;padding:12px 13px;background:#faf8f2;border-radius:11px;border:1px solid var(--line)}
.panel.open{display:block;animation:fade .25s ease}
.mapcode-box{display:flex;justify-content:space-between;align-items:center;gap:10px;background:#0e3a44;color:#fff;border-radius:10px;padding:11px 13px;margin-bottom:9px}
.mapcode-open{cursor:pointer}
.mapcode-open:active{transform:scale(.99)}
.mc-lbl{font-size:10px;opacity:.7;letter-spacing:.05em}
.mc-val{font-size:18px;font-weight:800;letter-spacing:.04em;font-variant-numeric:tabular-nums}
.mapcode-fullscreen{position:fixed;inset:0;z-index:120;background:rgba(6,32,38,.96);color:#fff;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
.mapcode-fullscreen .mapcode-dialog{width:100%;max-width:360px}
.mapcode-fullscreen .mapcode-label{font-size:13px;font-weight:900;letter-spacing:.16em;opacity:.7;margin-bottom:14px}
.mapcode-fullscreen .mapcode-value{font-size:clamp(38px,13vw,64px);font-weight:950;line-height:1.08;letter-spacing:.04em;font-variant-numeric:tabular-nums;word-break:break-word}
.mapcode-fullscreen .mapcode-hint{margin-top:18px;font-size:13px;font-weight:700;opacity:.62}
.copy-btn{background:var(--coral);color:#fff;border:none;border-radius:9px;padding:9px 13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.copy-btn:active{transform:scale(.96)}
.pc-row{display:flex;gap:10px;font-size:13px;line-height:1.6;padding:5px 0;border-top:1px dashed var(--line)}
.pc-row:first-child,.mapcode-box+.pc-row{border-top:none}
.pc-k{flex:0 0 auto;color:var(--ink-faint);font-weight:600;min-width:56px}
.pc-v{flex:1;color:#3f4a50;word-break:break-word}

<div class="hdr">

      <span class="dot" id="syncDot"></span><span id="syncTxt">同步中</span>
    </button>
  </div>

</div>

</div><!-- /hdr -->

    <span class="ic">🗺️</span><span>行程</span>
  </button>

    <span class="ic">🏬</span><span>購物</span>

    <span class="ic">💴</span><span>分帳</span>
  </button>

<script>
/* ===== schema.js(部署為獨立檔)===== */
/* ============================================================
   schema.js — 唯一資料規格(Single Source of Truth)
   ============================================================
   整個 App 的資料層都依賴這份 Schema:
   - Google Sheet 欄位定義(header + aliases)
   - Parser 動態解析(不再硬編碼欄位)
   - Validator 同步時檢查缺漏/未知欄位
   - schemaDoc() 自動產生對照文件

   ▍新增欄位 SOP(不用改 Parser):
   1. Google Sheet 加欄
   2. 本檔對應 sheet 的 columns 加一筆 { field, header, aliases?, required?, desc }
   3. UI 要顯示新欄位時才需要動渲染層
   ============================================================ */

var SCHEMA = {
  version: '2.1 (2026-07-10)',

  /* 發布來源(換試算表只改這裡) */
  pubBase: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRenmV8UxEzWbzSjKJKi4rSpYt63geBqhEkKsl1GemWVPmFKTcvv3Uk71Hjla3TGBpGIjC7bQDDdI00/pub?single=true&output=csv&gid=',
  fetchTimeoutMs: 10000,
  fetchRetries: 1,

  sheets: {

    /* ── 行程總表:固定 7 欄位置式解析 ── */
    itin: {
      gid: '1169222358', label: '行程總表', kind: 'itinerary',
      columns: [
        { field:'date',  header:'日期',     desc:'僅換日標記列使用(第N天MM/DD)' },
        { field:'time',  header:'時間',     desc:'HH:MM 或「16:00後」等自由文字' },
        { field:'act',   header:'詳細行程', desc:'活動名稱' },
        { field:'place', header:'地點',     desc:'地點顯示名稱(給人看)' },
        { field:'ref',   header:'ID',       desc:'Pxxx=地點 / Rxxx=餐廳(給程式讀)' },
        { field:'move',  header:'交通',     desc:'交通說明;空值時卡片退回資料庫交通時間' },
        { field:'note',  header:'備註',     desc:'自由備註' }
      ]
    },

    /* ── Places 地點主表 ── */
    places: {
      gid: '1089684162', label: 'Places', kind: 'table', idField: 'placeId',
      columns: [
        { field:'placeId', header:'PID',           aliases:['placeid','地點id'], required:true, desc:'地點唯一ID(P001…),不得重複' },
        { field:'name',    header:'地點',           aliases:['名稱'],            required:true, desc:'地點名稱(同時作為導航關鍵字)' },
        { field:'type',    header:'Type',           aliases:['類型'],            required:true, desc:'決定卡片型別,禁止程式猜測。值:購物/美食區/住宿/景點/機場/纜車/渡船口/渡輪/租車點',
          values:{ '購物':'shopping','美食區':'restarea','住宿':'hotel','景點':'attraction','機場':'attraction','纜車':'attraction','渡船口':'ferry','渡輪':'ferry','租車點':'parking',
                   'shopping':'shopping','restaurantarea':'restarea','hotel':'hotel','attraction':'attraction','ferryterminal':'ferry','parking':'parking' } },
        { field:'mapcode', header:'MAPCODE',        desc:'車用導航輸入碼(大字純顯示)' },
        { field:'travel',  header:'交通/交通時間',  aliases:['交通時間'], desc:'開車X分鐘/步行X分鐘;行程交通欄空值時顯示' },
        { field:'pnote',   header:'停車',           aliases:['停車備註','停車場'], desc:'停車資訊單欄;「停車同Pxxx」可繼承' },
        { field:'hours',   header:'營業時間',       aliases:['開放時間'] },
        { field:'ticket',  header:'門票',           desc:'門票或船票資訊' },
        { field:'web',     header:'官網',           aliases:['網站','網址'] },
        { field:'ttl',     header:'時刻表連結',     aliases:['時刻表'], desc:'渡輪等官方時刻表 URL' },
        { field:'note',    header:'備註' }
      ]
    },

    /* ── Restaurants 餐廳表 ── */
    rest: {

<script>
/* ===== validator.js(部署為獨立檔)===== */
/* ============================================================
   validator.js — 自體防錯防線(Guardrails)
   ============================================================
   職責:
   1. AppLog:六類錯誤日誌,格式固定「[分類] 訊息」,
      AI Debug 時看一眼 console 即可定位,不需貼整段程式碼
   2. 表頭驗證(buildHeaderMap):缺必填欄/未知欄位 → 警告不崩潰
   3. healthCheck():資料一致性健康報告(重複ID/懸空引用/型別覆蓋)
   依賴:schema.js(SCHEMA 必須先載入)
   ============================================================ */

/* ---- 六類錯誤日誌 ---- */
var AppLog = {
  schema: function(msg){ console.warn('[Schema Error] ' + msg); },
  parser: function(msg){ console.warn('[Parser Error] ' + msg); },
  data:   function(msg){ console.warn('[Data Error] ' + msg); },
  repo:   function(msg){ console.warn('[Repository Error] ' + msg); },
  render: function(msg){ console.error('[Render Error] ' + msg); },
  sync:   function(msg){ console.warn('[Sync Error] ' + msg); }
};

/* ---- 表頭正規化 ---- */
function normH(h){ return String(h||'').trim().toLowerCase().replace(/\s+/g,''); }
function normHBase(h){ return normH(h).replace(/[（(].*?[)）]/g,''); }

/* ---- 表頭驗證與對照(Schema 驅動) ---- */
function buildHeaderMap(rows, def){
  var result = { map:{}, headerIdx:-1 };
  var best = { idx:-1, hits:0 };
  for(var i=0;i<Math.min(rows.length,10);i++){
    var hits = 0;
    (rows[i]||[]).forEach(function(cell){
      var h = normHBase(cell);
      if(!h) return;
      def.columns.forEach(function(c){
        var cand = [c.header].concat(c.aliases||[]).map(normHBase);
        if(cand.indexOf(h)>=0) hits++;
      });
    });
    if(hits > best.hits){ best = { idx:i, hits:hits }; }
  }
  if(best.idx < 0 || best.hits === 0){
    AppLog.schema(def.label + ':找不到表頭列 — 請確認工作表第一列為欄位名稱');
    return result;
  }
  result.headerIdx = best.idx;
  rows[best.idx].forEach(function(cell, idx){
    var h = normHBase(cell);
    if(!h) return;
    var matched = null;
    def.columns.forEach(function(c){
      if(matched) return;
      var cand = [c.header].concat(c.aliases||[]).map(normHBase);
      if(cand.indexOf(h)>=0) matched = c.field;
    });
    if(matched){ if(!(matched in result.map)) result.map[matched] = idx; }
    else AppLog.schema(def.label + ':未知欄位「' + cell + '」(第' + (idx+1) + '欄) — 已忽略;若為新欄位請更新 schema.js');
  });
  def.columns.forEach(function(c){
    if(c.required && !(c.field in result.map)){
      AppLog.schema(def.label + ":Missing required field '" + c.header + "'(" + c.field + ") — 相關卡片可能無法顯示");
    }
  });
  return result;
}

/* ---- 專案健康檢查(資料一致性) ----
   回傳 findings 陣列並輸出報告;AI 每次交付前必跑 */
function healthCheck(){
  var f = [];
  function sameDisplayName(a,b){
    var na=String(a||'').toLowerCase().replace(/\s+/g,''), nb=String(b||'').toLowerCase().replace(/\s+/g,'');
    return !!(na&&nb&&(na.indexOf(nb)>=0||nb.indexOf(na)>=0));
  }
  function dupCheck(list, idField, label){
    var seen = {};
    (list||[]).forEach(function(r){
      var id = (r[idField]||'').toUpperCase();
      if(!id) return;
      if(seen[id]) f.push('重複ID:' + label + ' ' + id);
      seen[id] = true;
    });
    return seen;
  }
  var pids = dupCheck(DB.placeList, 'placeId', 'Places');
  dupCheck(DB.rest, 'restId', 'Restaurants');
  dupCheck(DB.shop, 'shopId', 'Shopping');
  /* 懸空引用 */
  (DB.rest||[]).forEach(function(r){
    if(r.placeId && !pids[r.placeId.toUpperCase()]) f.push('懸空引用:Restaurants ' + r.restId + ' → ' + r.placeId + ' 不存在於 Places');
  });
  (DB.shop||[]).forEach(function(s){
    if(s.placeId && !pids[s.placeId.toUpperCase()]) f.push('懸空引用:Shopping ' + s.shopId + ' → ' + s.placeId + ' 不存在於 Places');
  });
  if(DB.trip) DB.trip.days.forEach(function(d){
    d.items.forEach(function(it){
      var ref = (it.ref||'').toUpperCase().trim();
      if(/^P\d+/.test(ref) && !pids[ref]) f.push('懸空引用:行程 ' + d.date + '「' + it.act + '」→ ' + ref + ' 不存在於 Places');
      if(/^R\d+/.test(ref)){
        var linkedRest=(DB.rest||[]).find(function(r){ return (r.restId||'').toUpperCase()===ref; });
        if(!linkedRest) f.push('懸空引用:行程 ' + d.date + '「' + it.act + '」→ ' + ref + ' 不存在於 Restaurants');
        else if(it.place && linkedRest.name && !sameDisplayName(it.place,linkedRest.name))
          f.push('引用名稱不一致:行程 ' + d.date + '「' + it.place + '」→ ' + ref + '「' + linkedRest.name + '」');
      }
    });
  });
  /* 渲染型別覆蓋:資料中出現的型別必須都有對應卡片 */
  var covered = ['shopping','restarea','hotel','ferry','parking','attraction'];
  (DB.placeList||[]).forEach(function(p){
    if(covered.indexOf(p.tnorm)<0) f.push('未註冊型別:' + p.placeId + ' 型別「' + p.type + '」無對應卡片渲染');
  });
  /* Sheet 資料到位 */
  Object.keys(SCHEMA.sheets).forEach(function(k){
    if(!RAW[k]) f.push('資料缺席:工作表 ' + SCHEMA.sheets[k].label + ' 無任何資料來源(內建/快取/線上皆空)');
  });
  /* 輸出報告 */
  if(f.length){
    console.warn('━━ Project Health Check:發現 ' + f.length + ' 項 ━━');
    f.forEach(function(x){ AppLog.data(x); });
  }else{
    console.log('━━ Project Health Check:PASS(資料一致性無異常)━━');
  }
  return f;
}
if(typeof window !== 'undefined') window.healthCheck = healthCheck;

function lsGet(k,f){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):f; }catch(e){ AppLog.repo('讀取 '+k+' 失敗:'+(e.message||e)+' — 使用預設值'); return f; } }
function lsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){ AppLog.repo('寫入 '+k+' 失敗:'+(e.message||e)+' — 個人狀態可能未保存'); } }
function escapeHtml(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function jsString(s){ return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/\r/g,''); }
function appNow(){
  var sim=lsGet('trip_time_simulation',null);
  if(sim&&sim.mode==='offset'&&typeof sim.offsetMs==='number') return new Date(Date.now()+sim.offsetMs);
  if(sim&&sim.mode==='custom'&&sim.value){
    var custom=new Date(sim.value);
    if(!isNaN(custom.getTime())) return custom;
  }
  try{
    var q=new URLSearchParams(window.location.search||'');
    var pd=q.get('previewDate');
    if(pd&&/^\d{4}-\d{2}-\d{2}$/.test(pd)){
      var d=new Date(pd+'T09:00:00');
      if(!isNaN(d.getTime())) return d;
    }
  }catch(e){}
  return new Date();
}
function todayMD(){ var d=appNow(); return ('0'+(d.getMonth()+1)).slice(-2)+'/'+('0'+d.getDate()).slice(-2); }
var toastTimer, toastAction=null;
function clearToast(){
  var el=document.getElementById('toast');
  if(!el) return;
  el.classList.remove('show','has-action');
  el.textContent='';
  toastAction=null;
}
function runToastAction(){
  if(!toastAction) return;
  var fn=toastAction;
  clearTimeout(toastTimer);
  clearToast();
  fn();
}
function toast(msg,actionText,actionFn){
  var el=document.getElementById('toast');
  toastAction=typeof actionFn==='function'?actionFn:null;
  if(toastAction){
    el.innerHTML='<span>'+escapeHtml(msg)+'</span><button class="toast-action" onclick="runToastAction()">'+escapeHtml(actionText||'復原')+'</button>';
    el.classList.add('has-action');
  }else{
    el.textContent=msg;
    el.classList.remove('has-action');
  }
  el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(clearToast,toastAction?3500:2000);
}
function copyText(text,label){
  var done=function(){ toast((label||'')+'已複製 ✓'); };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(function(){ legacyCopy(text,done); });
  }else legacyCopy(text,done);
}
function legacyCopy(text,done){
  try{
    var ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done();
  }catch(e){ toast('複製失敗，請長按手動複製'); }
}

/* ================= CSV 解析 ================= */
function parseCSV(text){
  var rows=[],row=[],field='',inQ=false;
  for(var i=0;i<text.length;i++){
    var c=text[i],n=text[i+1];
    if(inQ){
      if(c==='"'&&n==='"'){ field+='"'; i++; }
      else if(c==='"') inQ=false;
      else field+=c;
    }else{
      if(c==='"') inQ=true;
      else if(c===','){ row.push(field); field=''; }
      else if(c==='\r'){}
      else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else field+=c;
    }
  }
  if(field.length||row.length){ row.push(field); rows.push(row); }
  return rows;
}

/* ================= 表格 → 物件(依表頭名稱對應,容錯欄位順序) ================= */
/* ============================================================
   Schema 驅動 Parser + Validator
   欄位對應完全來自 schema.js;新增欄位只改 Schema,不改這裡
   ============================================================ */
/* normH / normHBase / buildHeaderMap 已抽離至 validator.js(防錯防線) */

/* 表格型解析:rows → 物件陣列(欄位名 = Schema field) */
function parseTable(csvText, sheetKey){
  var def = SCHEMA.sheets[sheetKey];
  var rows = parseCSV(csvText||'');
  var hm = buildHeaderMap(rows, def);   // 驗證與警告由 validator.js 處理
  if(hm.headerIdx < 0) return [];
  var out = [];
  for(var r=hm.headerIdx+1; r<rows.length; r++){
    var row = rows[r]; if(!row) continue;
    var o = {}, any = false;
    for(var f in hm.map){
      var v = (row[hm.map[f]]||'').trim();
      o[f] = v; if(v) any = true;
    }
    if(any) out.push(o);
  }
  return out;
}

/* Key/Value 型解析(TripConfig):依 Schema keys 正規化 */
function parseKeyValue(csvText, sheetKey){
  var def = SCHEMA.sheets[sheetKey];
  var rows = parseCSV(csvText||'');
  var cfg = {};
  rows.forEach(function(r){
    var k = normHBase(r[0]), v = (r[1]||'').trim();
    if(!k || k==='key') return;
    var matched = null;
    (def.keys||[]).forEach(function(kd){
      if(matched) return;
      var cand = [kd.header].concat(kd.aliases||[]).map(normHBase);
      if(cand.indexOf(k)>=0) matched = kd;
    });
    if(!matched){ AppLog.schema(def.label+':未知設定鍵「'+(r[0]||'')+'」— 已忽略;若為新設定請更新 schema.js'); return; }
    if(matched.values){
      var nv = matched.values[normH(v)] || matched.values[v];
      if(nv) v = nv;
      else if(v) AppLog.schema(def.label+':「'+matched.header+'」的值「'+v+'」不在 Schema 定義中,原樣使用');
    }
    cfg[matched.field] = v;
  });
  return cfg;
}

/* 型別正規化:對照 Places.Type 欄的 Schema values;未知值警告並回退景點 */
function schemaType(raw){
  var col = null;
  SCHEMA.sheets.places.columns.forEach(function(c){ if(c.field==='type') col = c; });
  var v = (col && col.values && (col.values[String(raw||'').trim()] || col.values[normH(raw)])) || null;
  if(!v && raw){ AppLog.schema("Places:未知型別「"+raw+"」— 以「景點」處理;請更新 schema.js 的 type.values"); }
  return v || 'attraction';
}

/* ================= 行程解析(7欄:日期/時間/活動/地點/ID/交通/備註) ================= */
function buildItin(rows){
  var meta={ title:'' }, days=[], cur=null;
  var dayRe=/第.+天\s*(\d{1,2})\/(\d{1,2})\s*[\(（]?([日一二三四五六])?/;
  rows.forEach(function(r,idx){
    var c=[]; for(var i=0;i<7;i++) c.push((r[i]||'').trim());
    if(idx===0&&c[0]&&!meta.title){ meta.title=c[0]; return; }
    if(c[0]==='飯店') return;
    if(c[0]==='日期'&&c[1]==='時間') return;
    var dtext=c[0]||c[1];
    var m=dtext.match(dayRe);
    if(/第.+天/.test(dtext)&&m){
      cur={ date:m[1].padStart(2,'0')+'/'+m[2].padStart(2,'0'), dow:m[3]||'', items:[] };
      days.push(cur);
      if(!c[2]&&!c[3]) return;
    }
    if(!cur) return;
    var it={ time:c[1], act:c[2], place:c[3], ref:c[4], move:c[5], note:c[6] };
    if(!it.act&&!it.place&&!it.move&&!it.note) return;
    cur.items.push(it);
  });
  days.forEach(function(d){ d.items.forEach(function(it,i){ it.id=d.date+'_'+i; }); });
  return { meta:meta, days:days };
}

/* ================= 網路(相容模式:無 AbortController) ================= */
function fetchWithTimeout(url,ms){
  var bust=url+'&_ts='+Date.now();
  var timeout=new Promise(function(_,rej){ setTimeout(function(){ rej(new Error('連線逾時')); },ms); });
  var attempt=new Promise(function(resolve,reject){
    var p;
    try{ p=fetch(bust,{cache:'no-store'}); }catch(e){ p=null; }
    if(!p){ try{ p=fetch(bust); }catch(e2){ reject(e2); return; } }
    p.then(resolve).catch(function(err){
      if(/clone|DataCloneError/i.test(String(err))){
        try{ fetch(bust).then(resolve).catch(reject); }catch(e3){ reject(e3); }
      }else reject(err);
    });
  });
  return Promise.race([attempt,timeout]);
}
function fetchSheet(s){
  var tryOnce=function(){
    return fetchWithTimeout(PUB+s.gid,FETCH_TIMEOUT).then(function(res){
      if(!res.ok) throw new Error('HTTP '+res.status);
      return res.text();
    }).then(function(text){
      if(!text||text.trim().length<5) throw new Error('CSV為空');
      return text;
    });
  };
  return tryOnce().catch(function(e){
    AppLog.sync(s.key+' 第1次抓取失敗:'+(e.message||e)+' — 自動重試');
    return tryOnce();
  });
}

/* ================= 資料層:三層防線 ================= */
var RAW={};      // key → csv text(目前生效)
var SRC={};      // key → builtin|cache|online
function localBest(key){
  var b = BUILTIN[key]? { text:BUILTIN[key], src:'builtin', ts:BUILTIN_TS } : null;
  var c = lsGet('v2_cache_'+key,null);
  if(c&&c.text&&c.ts>(b?b.ts:0)) b={ text:c.text, src:'cache', ts:c.ts };
  return b;
}
function bootLocal(){
  var ok=true;
  SHEETS.forEach(function(s){
    var b=localBest(s.key);
    if(b){ RAW[s.key]=b.text; SRC[s.key]=b.src; }
    else ok=false;
  });
  return ok;
}
function syncAll(showToast){
  setSyncState('syncing');
  var jobs=SHEETS.map(function(s){
    return fetchSheet(s).then(function(text){
      RAW[s.key]=text; SRC[s.key]='online';
      lsSet('v2_cache_'+s.key,{text:text,ts:Date.now()});
      return true;
    }).catch(function(e){
      AppLog.sync(s.key+' 同步失敗,維持'+(SRC[s.key]||'無')+'版本:'+(e.message||e));
      return false;
    });
  });
  return Promise.all(jobs).then(function(results){
    var okN=results.filter(Boolean).length;
    buildDB(); renderAll();
    if(okN===SHEETS.length){ setSyncState('online'); if(showToast) toast('已更新到最新版 ✓'); }
    else if(okN>0){ setSyncState('partial'); if(showToast) toast('部分更新('+okN+'/'+SHEETS.length+')'); }
    else { setSyncState(SRC.itin||'error'); if(showToast) toast('無法連線，顯示'+(SRC.itin==='cache'?'上次同步版':'內建版')); }
  });
}
function manualSyncNew(){ toast('正在抓取最新行程…'); return syncAll(true); }
function manualSync(){ return manualSyncNew(); }
function setSyncState(state){
  var dot=document.getElementById('syncDot'),txt=document.getElementById('syncTxt'),btn=document.getElementById('syncBtn');
  if(!dot) return;
  btn.classList.remove('spinning'); dot.className='dot';
  if(state==='syncing'){ btn.classList.add('spinning'); txt.textContent='同步中'; }
  else if(state==='online'){ txt.textContent='已是最新'; }
  else if(state==='partial'){ dot.classList.add('stale'); txt.textContent='部分更新'; }
  else if(state==='cache'){ dot.classList.add('stale'); txt.textContent='離線版'; }
  else if(state==='builtin'){ dot.classList.add('stale'); txt.textContent='內建版'; }
  else { dot.classList.add('err'); txt.textContent='無法連線'; }
}

/* ================= DB 組裝(CMS → 應用資料模型) ================= */
var DB={ places:{}, placeList:[], rest:[], shop:[], hotels:[], expCMS:[], cfg:{}, trip:null };
function normType(t){ return schemaType(t); }

/* Expenses 表為自由格式(非欄位表):
   - 「同行成員:」列 → 成員清單(可供分帳初始化)
   - 類別列(交通/住宿/門票…,僅第1欄有值)→ 之後項目歸此類
   - 項目列:明細(第2欄)+ $台幣(第5欄)/ ¥日幣(第6欄)+ 備註(第7欄)
   - 小計/總計列獨立標記 */
function parseExpensesFree(rows){
  var L = SCHEMA.sheets.exp.layout;   // 欄位位置由 Schema 定義
  var members=[], items=[], curCat='';
  rows.forEach(function(r){
    var c0=(r[L.catCol]||'').trim(), c1=(r[L.nameCol]||'').trim(),
        twd=(r[L.twdCol]||'').trim(), jpy=(r[L.jpyCol]||'').trim(), note=(r[L.noteCol]||'').trim();
    if(c0.indexOf(L.membersRowMark)>=0){
      for(var i=L.nameCol;i<r.length;i++){ var v=(r[i]||'').trim(); if(v) members.push(v); }
      return;
    }
    if(c0==='項目' && c1==='明細') return;   // 表頭列
    var isTotal = L.totalMarks.some(function(m){ return c0.indexOf(m)===0; });
    if(isTotal){ items.push({cat:c0, name:'', twd:twd, jpy:jpy, note:note, total:true}); return; }
    if(c0 && !c1 && !twd && !jpy && !note){ curCat=c0.replace(/[：:]$/,''); return; }
    if(c1){ items.push({cat:(c0||curCat), name:c1, twd:twd, jpy:jpy, note:note}); }
  });
  return { members:members, items:items };
}

function buildDB(){
  try{
    DB.trip = buildItin(parseCSV(RAW.itin||''));
  }catch(e){ AppLog.parser('行程總表解析失敗:'+(e.message||e)+' — 顯示空行程'); DB.trip={meta:{title:''},days:[]}; }
  DB.placeList = parseTable(RAW.places, 'places');
  DB.places={};
  DB.placeList.forEach(function(p){ p.tnorm=normType(p.type); if(p.placeId) DB.places[p.placeId.toUpperCase()]=p; });
  DB.rest   = parseTable(RAW.rest, 'rest');

  DB.expMembers = expParsed.members;

}
var _refWarned = {};
function resolveRef(it){
  var ref=(it.ref||'').toUpperCase().trim();
  if(/^P\d+/.test(ref) && DB.places[ref]) return { kind:'place', p:DB.places[ref] };
  if(/^[PR]\d+/.test(ref) && !DB.places[ref] && !_refWarned[ref]){
    var isR = ref.charAt(0)==='R';
    var hasR = isR && DB.rest.some(function(x){ return (x.restId||'').toUpperCase()===ref; });
    if(!hasR && !isR){ AppLog.data('行程引用 '+ref+' 不存在於 Places — 改用名稱備援'); _refWarned[ref]=1; }
  }
  if(/^R\d+/.test(ref)){
    var r=DB.rest.find(function(x){ return (x.restId||'').toUpperCase()===ref; });
    if(r) return { kind:'rest', r:r };
  }
  // 名稱備援
  if(it.place){
    var flat=it.place.replace(/\s+/g,'');
    var p=DB.placeList.find(function(x){ return x.name && (flat.indexOf(x.name.replace(/\s+/g,''))>=0 || x.name.replace(/\s+/g,'').indexOf(flat)>=0); });
    if(p) return { kind:'place', p:p };
    var r2=DB.rest.find(function(x){ return x.name && flat.indexOf(x.name.replace(/\s+/g,''))>=0; });
    if(r2) return { kind:'rest', r:r2 };
  }
  return null;
}
function restaurantsOf(placeId){
  return DB.rest.filter(function(r){ return (r.placeId||'').toUpperCase()===String(placeId).toUpperCase(); });
}
function hotelOf(place){
  if(!DB.hotels.length) return null;
  var flat=(place.name||'').replace(/\s+/g,'');
  return DB.hotels.find(function(h){ return h.name && (flat.indexOf(h.name.replace(/\s+/g,''))>=0 || h.name.replace(/\s+/g,'').indexOf(flat)>=0); }) || DB.hotels[0];
}
function transport(){
  return DB.cfg.travelmode || 'drive';   // 值已由 Schema(cfg.keys.values)正規化為 drive/transit
}

function getChecks(){ return lsGet('trip_checks',{}); }
function toggleCheck(id){ var c=getChecks(); if(c[id]) delete c[id]; else c[id]=true; lsSet('trip_checks',c); }
function dayProgressKey(day,dayIndex){
  var d=(day&&day.date)?day.date:('day'+(dayIndex+1));
  return 'day_'+(dayIndex+1)+'_'+String(d).replace(/[^0-9A-Za-z]/g,'_');
}
function getNextStopProgress(){ return lsGet('trip_next_stop_progress',{}); }
function saveNextStopProgress(progress){ lsSet('trip_next_stop_progress',progress); }
function emptyDayProgress(){ return { done:{}, skip:{} }; }
function normalizeDayProgress(progress){
  progress=progress||{};
  return { done:progress.done||{}, skip:progress.skip||{}, autoSkip:progress.autoSkip||{} };
}
function getDayProgress(day,dayIndex){
  var all=getNextStopProgress();
  return normalizeDayProgress(all[dayProgressKey(day,dayIndex)]);
}
function hasDayProgress(progress){
  progress=normalizeDayProgress(progress);
  return Object.keys(progress.done).length>0 || Object.keys(progress.skip).length>0;
}
function setItemCompletion(day,dayIndex,itemId,status){
  var all=getNextStopProgress();
  var key=dayProgressKey(day,dayIndex);
  var progress=normalizeDayProgress(all[key]);
  delete progress.done[itemId];
  delete progress.skip[itemId];
  delete progress.autoSkip[itemId];
  if(status==='done') progress.done[itemId]=true;
  if(status==='skip') progress.skip[itemId]=true;
  all[key]=progress;
  saveNextStopProgress(all);
  var checks=getChecks();
  if(status==='done') checks[itemId]=true;
  else delete checks[itemId];
  lsSet('trip_checks',checks);
}
function markNextStop(day,dayIndex,itemId,status){
  setItemCompletion(day,dayIndex,itemId,status);
}
/* 時間不能重來、行程不會同天回訪:已過時間且從未手動處理的項目,除了「最後一個」保留待確認外,
   其餘自動標記為略過(寫入 progress.skip,並記錄於 autoSkip 供 UI 顯示標籤與一鍵修正)。
   回傳 true 代表這次呼叫「新」標記了(用於決定是否要 toast),false 代表本來就已清除過,不重複動作。 */
function autoSkipStaleItem(day,dayIndex,itemId){
  if(typeof findToday==='function'&&findToday()!==dayIndex) return false;
  var all=getNextStopProgress();
  var key=dayProgressKey(day,dayIndex);
  var progress=normalizeDayProgress(all[key]);
  if(progress.done[itemId]||progress.skip[itemId]) return false;
  setItemCompletion(day,dayIndex,itemId,'skip');
  all=getNextStopProgress(); progress=normalizeDayProgress(all[key]); progress.autoSkip[itemId]=true; all[key]=progress; saveNextStopProgress(all);
  return true;
}
function isAutoSkipped(itemId,progress){
  return !!(progress&&progress.autoSkip&&progress.autoSkip[itemId]);
}
function isNextStopCleared(item,progress,checks){
  if(!item||!item.id) return false;
  progress=normalizeDayProgress(progress);
  checks=checks||{};
  return !!(progress.done[item.id]||progress.skip[item.id]||checks[item.id]);
}

function navQuery(it,res){

function highlightNote(text){
  var t=escapeHtml(text);
  t=t.replace(/(https?:\/\/[^\s，、]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
  t=t.replace(/(訂單編號[：:]\s*\d+)/g,'<span class="hl">$1</span>');
  t=t.replace(/(TEL[：:]\s*[\d\-+ ]+)/gi,'<span class="hl">$1</span>');
  t=t.replace(/(¥[\d,]+)/g,'<span class="hl">$1</span>');
  return t;
}
function parseNoteLine(line){
  var t=(line||'').trim();
  var m=t.match(/^(•|-|\d+[.、]|[①②③④⑤⑥⑦⑧⑨⑩])\s*(.+)$/);
  if(m) return {type:'list', marker:m[1], text:m[2]};
  m=t.match(/^(※)\s*(.+)$/);
  if(m) return {type:'alert', marker:m[1], text:m[2]};
  return {type:'text', text:t};
}
function renderNote(text){
  if(!text) return '';
  var lines=String(text).split(/\r?\n/), out='', listOpen=false;
  function closeList(){ if(listOpen){ out+='</ul>'; listOpen=false; } }
  lines.forEach(function(line){
    var raw=(line||'').trim();
    if(!raw){ closeList(); return; }
    var item=parseNoteLine(raw);
    if(item.type==='list'){
      if(!listOpen){ out+='<ul class="note-list">'; listOpen=true; }
      out+='<li class="note-li"><span class="note-marker">'+escapeHtml(item.marker)+'</span><span>'+highlightNote(item.text)+'</span></li>';
      return;
    }
    closeList();
    if(item.type==='alert'){
      out+='<div class="note-alert"><span class="note-marker">'+escapeHtml(item.marker)+'</span><span>'+highlightNote(item.text)+'</span></div>';
    }else{
      out+='<div class="note-p">'+highlightNote(item.text)+'</div>';
    }
  });
  closeList();
  return out?'<div class="note-rich">'+out+'</div>':'';
}
function renderNoteBlock(text, icon){
  return text?'<div class="pc-tip">'+renderNote(text)+'</div>':'';
}
function extractDrive(moveText){
  if(!moveText) return '';
  var m=moveText.match(/開車約?\s*([\d.]+\s*(小時|分鐘)[\d.]*\s*(分鐘)?)/);
  return m?'開車約'+m[1].replace(/\s+/g,''):'';
}
function typeTag(res){
  if(!res) return null;
  if(res.kind==='rest') return {cls:'food',label:'🍜 '+(res.r.cat||'美食')};
  var t=res.p.tnorm;
  var rawType=(res.p.type||'').trim();
  if(rawType==='機場') return {cls:'move',label:'🛫 機場'};
  if(rawType==='纜車') return {cls:'play',label:'🚡 纜車'};
  if(t==='shopping') return {cls:'shop',label:'🏬 購物'};
  if(t==='restarea') return {cls:'food',label:'🍜 美食區'};
  if(t==='hotel') return {cls:'stay',label:'🏨 住宿'};
  if(t==='ferry') return {cls:'move',label:'⛴ 渡輪碼頭'};
  if(t==='parking') return {cls:'move',label:'🚗 租車/停車'};
  return {cls:'play',label:'⛩️ 景點'};
}

function parseScheduleLinks(text){
  text=String(text||'');
  var links=[], re=/https?:\/\/[^\s"'<>]+/g, m, last=0;
  while((m=re.exec(text))){
    var url=m[0].replace(/[、，。)）\]]+$/,'');
    var chunk=text.slice(last,m.index).trim();
    var q=chunk.match(/「([^」]+)」[^「」]*$/);
    var label=(q&&q[1]?q[1]:chunk.replace(/\s+/g,' ').replace(/^[:：\-–—]+/,'').trim());
    if(!label) label='官方';
    if(label.indexOf('時刻表')<0) label+='時刻表';
    links.push({ label:label, url:url });
    last=re.lastIndex;
  }
  return links;
}
function renderScheduleLinks(text, className, styleText){
  var links=parseScheduleLinks(text);
  return links.map(function(link){
    return '<a class="'+className+'" '+(styleText?'style="'+styleText+'" ':'')+
      'href="'+escapeHtml(link.url)+'" target="_blank" rel="noopener">⛴ '+escapeHtml(link.label)+'</a>';
  }).join('');
}

/* 停車資訊「引用其他 Place」解析
   規則:停車備註(或停車費)欄若寫「停車同P004」,
   自動找到 P004 並完整繼承其停車資訊(MAPCODE/停車費/停車備註)。
   - 支援多層引用(P006→P005→P004),深度上限 3 防止循環引用
   - 引用的 PlaceID 不存在時:console.warn 提示、顯示原本內容、絕不報錯 */
function resolveParking(p, depth){
  depth = depth || 0;
  /* 現行 Places 停車資訊 = MAPCODE + 停車(單欄文字) */
  var park = { mapcode:p.mapcode||'', pnote:p.pnote||'' };
  var refM = park.pnote.match(/停車同\s*(P\d+)/i);
  if(!refM) return park;
  if(depth >= 3){ AppLog.data('停車引用層數過深(疑似循環引用),停止解析:'+p.placeId); return park; }
  var refId = refM[1].toUpperCase();
  var target = DB.places[refId];
  if(!target){ AppLog.data('找不到停車引用的地點:'+refId+'(來自 '+p.placeId+')'); return park; }
  return resolveParking(target, depth+1);   // 完整繼承目標停車資訊
}

function onCheck(id){
  var day=DB.trip&&DB.trip.days?DB.trip.days[curDay]:null;
  if(day){
    var progress=getDayProgress(day,curDay);
    if(isAutoSkipped(id,progress)){
      /* 這站被系統自動略過(時間已過但你沒手動處理);現在點打卡 = 你確認其實有完成,修正為完成 */
      markNextStop(day,curDay,id,'done');
      if(curView==='trip') renderTrip();
      else if(curView==='today') renderToday();
      toast('已修正為完成 ✓');
      return;
    }
  }
  var progress=day?getDayProgress(day,curDay):null;
  var wasDone=!!(getChecks()[id]||(progress&&progress.done[id]));

function parseStartMinutes(timeText){
  var times=String(timeText||'').match(/\d{1,2}\s*:\s*\d{2}/g);
  var m=times&&times.length?times[times.length-1].match(/(\d{1,2})\s*:\s*(\d{2})/):null;
  if(!m) return null;
  var h=parseInt(m[1],10), min=parseInt(m[2],10);
  if(isNaN(h)||isNaN(min)||h<0||h>23||min<0||min>59) return null;
  return h*60+min;
}

function weatherCityForItem(item){

function dominantWeatherCity(items){
  var counts={}, byKey={}, topKey='', topCount=0, tied=false;
  (items||[]).forEach(function(it){
    var city=weatherCityForItem(it);
    if(!city) return;
    byKey[city.key]=city;
    counts[city.key]=(counts[city.key]||0)+1;
  });
  Object.keys(counts).forEach(function(key){
    if(counts[key]>topCount){
      topKey=key;
      topCount=counts[key];
      tied=false;
    }else if(counts[key]===topCount){
      tied=true;
    }
  });
  return topKey&&!tied?byKey[topKey]:null;
}
function inferWeatherCityForDay(day,item){
  var direct=weatherCityForItem(item);
  if(direct) return direct;
  var items=(day&&day.items?day.items:[]).filter(function(it){ return it&&it.act; });
  var idx=items.indexOf(item);
  if(idx<0) return dominantWeatherCity(items);
  for(var i=idx-1;i>=0;i--){
    var prev=weatherCityForItem(items[i]);
    if(prev) return prev;
  }
  for(var j=idx+1;j<items.length;j++){
    var next=weatherCityForItem(items[j]);
    if(next) return next;
  }
  return dominantWeatherCity(items);
}

  if(code===45||code===48) return '🌫️';
  if((code>=51&&code<=67)||(code>=80&&code<=82)) return '🌧️';
  if(code>=71&&code<=77) return '❄️';
  if(code>=95) return '⛈️';

}

function pickNextStop(items,progress,checks,nowMinutes,dayRef){
  items=(items||[]).filter(function(it){ return it&&it.act; });
  progress=normalizeDayProgress(progress);
  checks=checks||{};
  var remaining=items.filter(function(it){ return !isNextStopCleared(it,progress,checks); });
  if(!remaining.length) return { item:null, remaining:0, source:'complete' };
  function resultFor(item,source){
    var itemIndex=items.indexOf(item);
    var after=remaining.filter(function(it){ return items.indexOf(it)>itemIndex; }).length;
    return { item:item, remaining:after, source:source };
  }
  /* 統一以「時間」判斷下一站,不再依「今天是否已手動清過任一項」切換邏輯(舊版在此分岔會卡住不推進)。
     在 remaining(未清項目)裡,由前到後找「最後一個時間已過」的位置 cutoffIdx:
     - cutoffIdx 之前(含無時間欄位、夾在中間的項目)一律視為過期:時間不能重來、行程不會同天回訪,自動標記略過。
     - cutoffIdx 該項保留下來當「下一站」,待使用者手動確認完成/跳過。 */
  var cutoffIdx=-1;
  remaining.forEach(function(it,i){
    var m=parseStartMinutes(it.time);
    if(m!==null && m<=nowMinutes) cutoffIdx=i;
  });
  if(cutoffIdx>=0){
    var stale=remaining.slice(0,cutoffIdx);
    if(stale.length && dayRef&&dayRef.day){
      var newlySkipped=[];
      stale.forEach(function(it){
        if(autoSkipStaleItem(dayRef.day,dayRef.dayIndex,it.id)) newlySkipped.push(it);
      });
      if(newlySkipped.length){
        var names=newlySkipped.map(function(it){ return it.act||it.place||''; }).filter(Boolean).slice(0,2);
        toast('已自動略過 '+newlySkipped.length+' 項超時未確認行程'+(names.length?'：'+names.join('、')+(newlySkipped.length>2?' 等':''):''));
      }
    }
    return resultFor(remaining[cutoffIdx],'time-stale');
  }
  var future=remaining.find(function(it){
    var m=parseStartMinutes(it.time);
    return m!==null && m>=nowMinutes;
  });
  return resultFor(future||remaining[0],future?'time':'order');
}
function getChildStopCluster(items,parent){
  var start=(items||[]).indexOf(parent);
  if(start<0||!parent||!parent.act) return null;
  var children=[];
  for(var i=start+1;i<items.length;i++){
    var item=items[i];
    if(item&&item.act) break;
    if(item&&item.id&&(item.place||item.ref)) children.push(item);
  }
  return children.length>=2?{ parent:parent, items:children }:null;
}
function pickClusterChild(cluster,progress,checks,nowMinutes,dayRef){

  var visitable=cluster.items.map(function(item){
    return { id:item.id, time:item.time, act:item.act||item.place||item.ref||'子站', place:item.place, ref:item.ref, move:item.move, note:item.note };
  });
  var pick=pickNextStop(visitable,progress,checks,nowMinutes,dayRef);

  return pick;
}
function completeClusterParent(day,dayIndex,cluster,progress,checks){
  if(!cluster||!cluster.parent||isNextStopCleared(cluster.parent,progress,checks)) return false;

function syncCompletedClusterParents(day,dayIndex){

var lastNextStopAction=null;
function snapshotNextStopState(day,dayIndex,itemId,status){
  var progress=getDayProgress(day,dayIndex);
  var checks=getChecks();
  return {
    dayIndex:dayIndex,
    itemId:itemId,
    status:status,
    prevDone:!!progress.done[itemId],
    prevSkip:!!progress.skip[itemId],
    prevCheck:!!checks[itemId]
  };
}
function undoNextStopAction(){
  var action=lastNextStopAction;
  if(!action) return;
  var day=DB.trip&&DB.trip.days?DB.trip.days[action.dayIndex]:null;
  if(!day) return;
  var all=getNextStopProgress();
  var key=dayProgressKey(day,action.dayIndex);
  var progress=normalizeDayProgress(all[key]);
  delete progress.done[action.itemId];
  delete progress.skip[action.itemId];
  if(action.prevDone) progress.done[action.itemId]=true;
  if(action.prevSkip) progress.skip[action.itemId]=true;
  all[key]=progress;
  saveNextStopProgress(all);
  var checks=getChecks();
  if(action.prevCheck) checks[action.itemId]=true;
  else delete checks[action.itemId];
  lsSet('trip_checks',checks);
  lastNextStopAction=null;
  renderToday();
  toast(action.status==='skip'?'已復原跳過':'已復原完成');
}
function onNextStopDone(dayIndex,itemId){
  var day=DB.trip&&DB.trip.days?DB.trip.days[dayIndex]:null;
  if(!day) return;
  lastNextStopAction=snapshotNextStopState(day,dayIndex,itemId,'done');
  markNextStop(day,dayIndex,itemId,'done');
  renderToday();
  toast('已完成這站','復原',undoNextStopAction);
}
function onNextStopSkip(dayIndex,itemId){
  var day=DB.trip&&DB.trip.days?DB.trip.days[dayIndex]:null;
  if(!day) return;
  lastNextStopAction=snapshotNextStopState(day,dayIndex,itemId,'skip');
  markNextStop(day,dayIndex,itemId,'skip');
  renderToday();
  toast('已跳過這站','復原',undoNextStopAction);
}
var homeWeatherState={};
function renderWeatherChip(weather){
  if(!weather) return '';
  return '<div class="weather-chip"><span class="city">'+escapeHtml(weather.city)+'</span>'+escapeHtml(' '+weather.icon+' '+weather.temp+'° 雨'+weather.rain+'%')+'</div>';
}
function requestHomeWeather(dayIndex,item){
  if(!item) return;
  var day=DB.trip&&DB.trip.days?DB.trip.days[dayIndex]:null;
  var city=inferWeatherCityForDay(day,item);
  if(!city) return;
  var key='day_'+dayIndex+'_'+city.key;
  if(homeWeatherState[key]) return;
  var cached=getCachedWeather(city);
  if(cached){ homeWeatherState[key]=cached; return; }
  homeWeatherState[key]={ loading:true };
  loadWeatherForCity(city).then(function(weather){
    if(weather){ homeWeatherState[key]=weather; if(curView==='today') renderToday(); }
    else delete homeWeatherState[key];
  });
}
function homeWeatherFor(dayIndex,item){
  if(!item) return null;
  var day=DB.trip&&DB.trip.days?DB.trip.days[dayIndex]:null;
  var city=inferWeatherCityForDay(day,item);
  if(!city) return null;
  var key='day_'+dayIndex+'_'+city.key;
  var state=homeWeatherState[key];
  if(state&&state.loading) return null;
  return state||getCachedWeather(city);
}
function daysUntilStart(){
  var raw=DB&&DB.cfg&&DB.cfg.startdate?String(DB.cfg.startdate):'';
  var parts=raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!parts) return null;
  var startStamp=Date.UTC(Number(parts[1]),Number(parts[2])-1,Number(parts[3]));
  var now=appNow();
  var todayStamp=Date.UTC(now.getFullYear(),now.getMonth(),now.getDate());
  return Math.ceil((startStamp-todayStamp)/86400000);
}
function renderPreTripBrief(){
  var d=daysUntilStart();
  var day=DB.trip&&DB.trip.days?DB.trip.days[0]:null;
  var highlights=day?day.items.filter(function(it){return it&&it.act;}).slice(0,4):[];
  return (d!==null&&d>0?'<div class="pretrip-count">D-'+d+'</div>':'')+
    (highlights.length?'<div class="tomorrow-list">'+highlights.map(function(it){
      return '<div class="tomorrow-item">'+(it.time?'<b>'+escapeHtml(it.time)+'</b> ':'')+escapeHtml([it.act,it.place].filter(Boolean).join(' · '))+'</div>';
    }).join('')+'</div>':'');
}
var TOMORROW_PREVIEW_HOUR=21; /* 21:00 後,若今日仍有未手動清項目,主卡下方附縮小版明日預告 */
/* 規則(2026-07-09 確認):今日完成度只看「手動完成/跳過/checkbox」,不受時間推進影響。
   pick.item 為 null 就等於「今天所有項目都已手動清除」(pickNextStop 的 remaining 定義與此一致)。*/
function shouldReplaceWithTomorrowPreview(pick){
  return !(pick&&pick.item);
}
function shouldShowCompactTomorrowPreview(pick,nowMinutes){
  return !!(pick&&pick.item) && nowMinutes>=TOMORROW_PREVIEW_HOUR*60;
}
function renderTomorrowPreview(dayIndex,compact){
  if(!DB.trip||!DB.trip.days) return '';
  var day=DB.trip.days[dayIndex+1];
  if(!day) return '';
  var items=(day.items||[]).filter(function(it){return it&&it.act;}).slice(0,compact?2:4);
  return '<div class="tomorrow-card'+(compact?' compact':'')+'">'+
    '<div class="tomorrow-lbl">明日預告</div>'+
    '<div class="tomorrow-title">DAY '+(dayIndex+2)+' · '+day.date+(day.dow?' ('+day.dow+')':'')+'</div>'+
    (items.length?'<div class="tomorrow-list">'+items.map(function(it){
      return '<div class="tomorrow-item">'+(it.time?'<b>'+escapeHtml(it.time)+'</b> ':'')+escapeHtml([it.act,it.place].filter(Boolean).join(' · '))+'</div>';
    }).join('')+'</div>':'')+
  '</div>';
}
function renderToday(){
  var view=document.getElementById('view-today');
  var ti=findToday();
  var checks=getChecks();
  if(ti===null){
    var days=DB.trip?DB.trip.days:[];
    view.innerHTML='<div class="today-hero"><div class="lbl">TODAY · '+todayMD()+'</div>'+
      '<div class="date">還沒到出發日</div>'+
      '<div class="empty">今天沒有排定行程 🗓️<br>出發當天這裡會自動顯示當日安排與下一站。</div>'+
      renderPreTripBrief()+
      '<button class="today-jump" onclick="switchView(\'trip\')">查看完整行程 →</button></div>'+
      (days.length?'<div class="seg">行程重點</div>':'')+
      days.map(function(d,i){
        var hl=d.items.filter(function(it){return it.act;}).slice(0,3).map(function(it){return it.act;}).join('、');
        return '<div class="hotel" style="border-left-color:var(--sea);cursor:pointer" onclick="gotoDay('+i+')"><div class="h-lbl" style="color:var(--sea)">DAY '+(i+1)+' · '+d.date+'</div><div class="h-name" style="font-size:14px">'+escapeHtml(hl)+'</div></div>';
      }).join('');
    return;
  }
  var day=DB.trip.days[ti];
  var items=day.items.filter(function(it){return it.act;});
  var progress=getDayProgress(day,ti);
  if(syncCompletedClusterParents(day,ti)) progress=getDayProgress(day,ti);
  checks=getChecks();
  var nowMinutes=currentMinutes();
  var pick=pickNextStop(items,progress,checks,nowMinutes,{day:day,dayIndex:ti});
  var completed=items.length-(pick.remaining+(pick.item?1:0));
  var cluster=getChildStopCluster(day.items,pick.item);
  var clusterPick=cluster?pickClusterChild(cluster,progress,checks,nowMinutes,{day:day,dayIndex:ti}):null;
  var weatherItem=clusterPick&&clusterPick.item?clusterPick.item:pick.item;
  requestHomeWeather(ti,weatherItem);
  var weather=homeWeatherFor(ti,weatherItem);
  var h='<div class="today-hero'+(weather?' weather-on':'')+'"><div class="today-hero-main"><div class="lbl">TODAY · DAY '+(ti+1)+'</div>'+
    '<div class="date">'+day.date+(day.dow?' ('+day.dow+')':'')+'</div>'+
    '<div class="loc">'+completed+'/'+items.length+' 已處理</div></div>'+
    renderWeatherChip(weather)+'</div>';
  h+=cluster&&clusterPick&&clusterPick.item?renderClusterNextStopCard(day,ti,pick,cluster,checks,progress,nowMinutes):renderNextStopCard(day,ti,pick);
  if(DB.trip.days[ti+1]){
    if(shouldReplaceWithTomorrowPreview(pick)) h+=renderTomorrowPreview(ti,false);
    else if(shouldShowCompactTomorrowPreview(pick,nowMinutes)) h+=renderTomorrowPreview(ti,true);
  }
  h+='<button class="today-jump dark" onclick="gotoDay('+ti+')">看今日完整細節 →</button>';
  view.innerHTML=h;
}

/* ================= 購物模式(資料來自 Shopping 表) ================= */
var _shopQ='';
var shopPlaceFilter='all';
var shopOpenFloors={};
var shopWantListOpen={};
function cssId(s){
  return String(s).replace(/[^a-zA-Z0-9]/g,'_');
}
function shopWantKey(place,index){
  return (place&&place.placeId)?place.placeId:('M'+index);
}
function toggleShopWantList(key){
  shopWantListOpen[key]=!shopWantListOpen[key];
  renderShopResults();
}
function setShopPlaceFilter(key){
  shopPlaceFilter=key||'all';
  renderShopResults();
}
function shopQ(v){ _shopQ=v.trim().toLowerCase(); renderShopResults(); }
function openShopPlace(placeId){
  var key=String(placeId||'').trim().toUpperCase();
  var exists=shopMalls().some(function(m){
    return String(m.place&&m.place.placeId||'').toUpperCase()===key;
  });
  _shopQ='';
  shopPlaceFilter=exists?key:'all';
  switchView('shop');
  if(!exists) return;
  requestAnimationFrame(function(){
    var target=document.getElementById('shopmall_'+cssId(key));
    if(target) target.scrollIntoView({behavior:'smooth',block:'start'});
  });
}
function toggleWant(id){
  var w=getWants(); if(w[id]) delete w[id]; else w[id]=true;
  lsSet('trip_shop_wants',w); renderShopResults();
}
function toggleFloor(fkey,btn){
  var el=document.getElementById('flbody_'+cssId(fkey));
  var open=!shopOpenFloors[fkey];
  shopOpenFloors[fkey]=open;
  if(el) el.classList.toggle('open',open);
  btn.classList.toggle('on',open);
}
function shopMalls(){
  var byPlace={};
  DB.shop.forEach(function(s){
    var pid=(s.placeId||'').toUpperCase(); if(!pid) return;
    (byPlace[pid]=byPlace[pid]||[]).push(s);
  });
  var itineraryOrder={};
  var seq=0;
  if(DB.trip&&DB.trip.days){
    DB.trip.days.forEach(function(d){
      (d.items||[]).forEach(function(it){
        var pid=(it.ref||'').toUpperCase();
        if(pid&&!itineraryOrder[pid]) itineraryOrder[pid]=++seq;
      });
    });
  }
  var seen={};
  var malls=[];
  DB.placeList.forEach(function(p){
    var pid=(p.placeId||'').toUpperCase();
    if(!pid||p.tnorm!=='shopping') return;
    seen[pid]=true;
    malls.push({ place:p, stores:byPlace[pid]||[], order:itineraryOrder[pid]||9999 });
  });
  Object.keys(byPlace).forEach(function(pid){
    if(seen[pid]) return;
    malls.push({ place:DB.places[pid]||{name:pid,placeId:pid}, stores:byPlace[pid], order:itineraryOrder[pid]||9999 });
  });
  malls.sort(function(a,b){
    if(a.order!==b.order) return a.order-b.order;
    return String(a.place.name||'').localeCompare(String(b.place.name||''),'zh-Hant');
  });
  return malls;
}
function storeRow(s,id,on){
  var must=/是|y|✓|v/i.test(s.must||'');
  var tax=/是|y|✓|v/i.test(s.taxfree||'');
  return '<div class="store-row" onclick="toggleWant(\''+id.replace(/'/g,"\\'")+'\')">'+
    '<span class="st-chk'+(on?' on':'')+'">'+(on?'✓':'')+'</span>'+
    '<span class="st-n">'+escapeHtml(s.name)+(must?' <span class="st-must">必逛</span>':'')+(tax?' <span class="st-tax">免稅</span>':'')+'</span>'+
    '<span class="st-f">'+escapeHtml([s.floor,s.note?s.note.replace('櫃位 ',''):''].filter(Boolean).join('·'))+'</span></div>';
}
function renderShop(){
  var view=document.getElementById('view-shop');
  if(!shopMalls().length){ view.innerHTML='<div class="empty-state">尚無購物地點<br>在 Places 新增 Type=購物 後會自動出現</div>'; return; }
  view.innerHTML='<div class="shop-search"><input id="shopSearchInput" placeholder="🔍 搜尋店家（如 UNIQLO、大創）" value="'+escapeHtml(_shopQ)+'" oninput="shopQ(this.value)"></div><div id="shopResults"></div>';
  renderShopResults();
}
function renderShopResults(){
  var box=document.getElementById('shopResults'); if(!box) return;
  var wants=getWants(), h='', malls=shopMalls();
  var wantTotal=0;
  malls.forEach(function(m,mi){
    wantTotal+=m.stores.filter(function(s){return wants['w_'+mi+'_'+s.floor+'_'+s.name];}).length;
  });
  h+='<div class="shop-filter">'+
    '<button class="shop-filter-btn '+(shopPlaceFilter==='all'?'on':'')+'" onclick="setShopPlaceFilter(\'all\')">全部<small>'+malls.length+'</small></button>'+
    '<button class="shop-filter-btn '+(shopPlaceFilter==='wants'?'on':'')+'" onclick="setShopPlaceFilter(\'wants\')">想逛<small>'+wantTotal+'</small></button>'+
    malls.map(function(m){
      var key=(m.place.placeId||m.place.name||'').toUpperCase();
      var label=m.place.name||key;
      return '<button class="shop-filter-btn '+(shopPlaceFilter===key?'on':'')+'" onclick="setShopPlaceFilter(\''+key.replace(/'/g,"\\'")+'\')">'+escapeHtml(label)+'<small>'+m.stores.length+'</small></button>';
    }).join('')+
    '</div>';
  var rendered=0;
  malls.forEach(function(m,mi){
    var p=m.place;
    var pkey=(p.placeId||p.name||'').toUpperCase();
    var wanted=m.stores.filter(function(s){return wants['w_'+mi+'_'+s.floor+'_'+s.name];});
    if(shopPlaceFilter==='wants'&&!wanted.length) return;
    if(shopPlaceFilter!=='all'&&shopPlaceFilter!=='wants'&&shopPlaceFilter!==pkey) return;
    if(_shopQ){
      var searchBase=(shopPlaceFilter==='wants')?wanted:m.stores;
      var hits=searchBase.filter(function(s){return (s.name||'').toLowerCase().indexOf(_shopQ)>=0;});
      h+='<div class="shop-mall" id="shopmall_'+cssId(pkey)+'"><div class="sm-name">🏬 '+escapeHtml(p.name)+'</div>'+
        (hits.length?hits.map(function(s){var id='w_'+mi+'_'+s.floor+'_'+s.name;return storeRow(s,id,!!wants[id]);}).join(''):'<div class="empty-state" style="padding:16px">找不到「'+escapeHtml(_shopQ)+'」</div>')+'</div>';
      rendered++;
      return;
    }
    h+='<div class="shop-mall" id="shopmall_'+cssId(pkey)+'"><div class="sm-name">🏬 '+escapeHtml(p.name)+'</div>'+
      (p.hours?'<div class="sm-hours">🕒 '+escapeHtml(p.hours)+'</div>':'')+
      (p.web?'<div class="sm-actions"><a class="qa-btn nf" href="'+escapeHtml(p.web)+'" target="_blank" rel="noopener">🌐 官方資訊</a></div>':'')+
      renderNoteBlock(p.note);
    if(wanted.length){
      var wkey=shopWantKey(p,mi);
      var wopen=!!shopWantListOpen[wkey];
      h+='<div class="want-box"><button class="want-head '+(wopen?'on':'')+'" onclick="toggleShopWantList(\''+wkey.replace(/'/g,"\\'")+'\')">'+
        '<span>⭐ 想逛清單：'+wanted.length+' 家</span><span>'+(wopen?'收合':'展開')+'</span></button>'+
        (wopen?'<div class="want-body">'+wanted.map(function(s){var id='w_'+mi+'_'+s.floor+'_'+s.name;return storeRow(s,id,true);}).join('')+'</div>':'')+
        '</div>';
    }
    var floors={};
    m.stores.forEach(function(s){ (floors[s.floor||'其他']=floors[s.floor||'其他']||[]).push(s); });
    if(!m.stores.length){
      h+='<div class="empty-state" style="padding:16px">此購物地點尚未建立店家明細<br>可先查看官方資訊與備註</div>';
      h+='</div>';
      rendered++;
      return;
    }
    h+='<div class="seg" style="margin-top:14px">區域 / 樓層（點選展開）</div>';
    Object.keys(floors).forEach(function(f){
      var fkey=(p.placeId||('M'+mi))+'::'+f;
      var domId='flbody_'+cssId(fkey);
      var isOpen=!!shopOpenFloors[fkey];
      var wc=floors[f].filter(function(s){return wants['w_'+mi+'_'+s.floor+'_'+s.name];}).length;
      h+='<div class="floor"><button class="floor-head'+(isOpen?' on':'')+'" onclick="toggleFloor(\''+fkey.replace(/'/g,"\\'")+'\',this)">'+
        '<span class="fl-f">'+escapeHtml(f)+'</span><span class="fl-n">'+floors[f].length+' 家'+(wc?'｜⭐'+wc:'')+'</span><span class="fl-arw">▼</span></button>'+
        '<div class="floor-body'+(isOpen?' open':'')+'" id="'+domId+'">'+floors[f].map(function(s){var id='w_'+mi+'_'+s.floor+'_'+s.name;return storeRow(s,id,!!wants[id]);}).join('')+'</div></div>';
    });
    h+='</div>';
    rendered++;
  });
  if(!rendered){
    h+='<div class="empty-state">'+(shopPlaceFilter==='wants'?'尚未標記想逛店家':'目前沒有符合條件的購物資料')+'</div>';
  }
  box.innerHTML=h;
}

function calcSettle(people,expenses){
  var total=expenses.reduce(function(s,e){return s+Number(e.amt);},0);
  var paid={},owed={};
  people.forEach(function(p){paid[p]=0;owed[p]=0;});
  expenses.forEach(function(e){
    paid[e.payer]=(paid[e.payer]||0)+Number(e.amt);
    var share=Number(e.amt)/e.split.length;
    e.split.forEach(function(p){owed[p]=(owed[p]||0)+share;});
  });
  var balances=people.map(function(p){return {name:p,paid:Math.round(paid[p]||0),owed:Math.round(owed[p]||0),net:Math.round((paid[p]||0)-(owed[p]||0))};});
  var creditors=balances.filter(function(b){return b.net>0;}).map(function(b){return {name:b.name,amt:b.net};}).sort(function(a,b){return b.amt-a.amt;});
  var debtors=balances.filter(function(b){return b.net<0;}).map(function(b){return {name:b.name,amt:-b.net};}).sort(function(a,b){return b.amt-a.amt;});
  var settlements=[],ci=0,di=0;
  while(ci<creditors.length&&di<debtors.length){
    var give=Math.min(creditors[ci].amt,debtors[di].amt);
    if(give>0) settlements.push({from:debtors[di].name,to:creditors[ci].name,amt:Math.round(give)});
    creditors[ci].amt-=give; debtors[di].amt-=give;
    if(creditors[ci].amt<=0.5)ci++; if(debtors[di].amt<=0.5)di++;
  }
  return {total:Math.round(total),balances:balances,settlements:settlements};
}

  document.addEventListener('visibilitychange',function(){ if(!document.hidden) recoverViewportAfterResume(VIEWPORT_META,VIEWPORT_ORIGINAL,wrap,window); });
  window.addEventListener('pageshow',function(){ recoverViewportAfterResume(VIEWPORT_META,VIEWPORT_ORIGINAL,wrap,window); });
  document.addEventListener('focusin',function(e){ if(isFormControl(e.target)){ formFocused=true; userGesture=false; } });
  document.addEventListener('touchstart',function(e){ if(formFocused&&e.touches&&e.touches.length>1) userGesture=true; },{passive:true});
  document.addEventListener('gesturestart',function(){ if(formFocused) userGesture=true; },{passive:true});
  document.addEventListener('focusout',function(e){
    if(formFocused&&isFormControl(e.target)) restoreTimer=restoreFocusZoom(VIEWPORT_META,window.visualViewport,userGesture,restoreTimer);
    formFocused=false; userGesture=false;
    if(e.target&&e.target.closest&&e.target.closest('#diagnosticOverlay')) forceViewportReflow();
  });
}
setupGestureDiagnostics(document,window,IOS_GESTURE_DIAGNOSTICS);
setupDiagnostics();
setupViewportReflow();
init();

</script>

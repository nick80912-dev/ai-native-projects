function getCachedWeather(city){
  var cached=lsGet(weatherCacheKey(city),null);
  if(!cached||!cached.t) return null;
  var maxAge=3*60*60*1000;
  return (Date.now()-cached.t)<maxAge?cached.data:null;
}
function setCachedWeather(city,data){
  lsSet(weatherCacheKey(city),{ t:Date.now(), data:data });
}
function fetchWeather(city){
  var url='https://api.open-meteo.com/v1/forecast?latitude='+encodeURIComponent(city.lat)+
    '&longitude='+encodeURIComponent(city.lon)+
    '&current=temperature_2m,weather_code'+
    '&hourly=precipitation_probability'+
    '&forecast_days=1&timezone=Asia%2FTokyo';
  return fetchWithTimeout(url,6500).then(function(r){
    if(!r.ok) throw new Error('weather '+r.status);
    return r.json();
  }).then(function(json){
    var rain=0;
    if(json.hourly&&json.hourly.precipitation_probability&&json.hourly.precipitation_probability.length){
      rain=Math.max.apply(null,json.hourly.precipitation_probability.filter(function(v){return typeof v==='number';}));
    }
    var temp=json.current&&typeof json.current.temperature_2m==='number'?Math.round(json.current.temperature_2m):null;
    var code=json.current?json.current.weather_code:null;
    if(temp===null) return null;
    return { city:city.label, temp:temp, rain:rain||0, icon:weatherIcon(code), code:code };
  });
}
function loadWeatherForCity(city){
  var cached=getCachedWeather(city);
  if(cached) return Promise.resolve(cached);
  return fetchWeather(city).then(function(data){
    if(data) setCachedWeather(city,data);
    return data;
  }).catch(function(err){
    AppLog&&AppLog.data&&AppLog.data('天氣讀取失敗:'+city.label+' '+(err.message||err));
    return getCachedWeather(city);
  });
}
function pickNextStop(items,progress,checks,nowMinutes,dayRef){
  items=(items||[]).filter(function(it){ return it&&it.act; });
  progress=normalizeDayProgress(progress);
  checks=checks||{};
  var remaining=items.filter(function(it){ return !isNextStopCleared(it,progress,checks); });
  if(!remaining.length) return { item:null, remaining:0, source:'complete' };
  function resultFor(item,source){
    var itemIndex=items.indexOf(item);
    var after=remaining.filter(function(it){ return items.indexOf(it)>itemIndex; }).length;
    return { item:item, remaining:after, source:source };
  }
  /* 統一以「時間」判斷下一站,不再依「今天是否已手動清過任一項」切換邏輯(舊版在此分岔會卡住不推進)。
     在 remaining(未清項目)裡,由前到後找「最後一個時間已過」的位置 cutoffIdx:
     - cutoffIdx 之前(含無時間欄位、夾在中間的項目)一律視為過期:時間不能重來、行程不會同天回訪,自動標記略過。
     - cutoffIdx 該項保留下來當「下一站」,待使用者手動確認完成/跳過。 */
  var cutoffIdx=-1;
  remaining.forEach(function(it,i){
    var m=parseStartMinutes(it.time);
    if(m!==null && m<=nowMinutes) cutoffIdx=i;
  });
  if(cutoffIdx>=0){
    var blockingClusterIdx=remaining.findIndex(function(it,i){
      return i<=cutoffIdx&&it.clusterController;
    });
    if(blockingClusterIdx>=0) cutoffIdx=blockingClusterIdx;
    var stale=remaining.slice(0,cutoffIdx);
    if(stale.length && dayRef&&dayRef.day){
      var newlySkipped=[];
      stale.forEach(function(it){
        if(autoSkipStaleItem(dayRef.day,dayRef.dayIndex,it.id)) newlySkipped.push(it);
      });
      if(newlySkipped.length){
        var names=newlySkipped.map(function(it){ return it.act||it.place||''; }).filter(Boolean).slice(0,2);
        toast('已自動略過 '+newlySkipped.length+' 項超時未確認行程'+(names.length?'：'+names.join('、')+(newlySkipped.length>2?' 等':''):''));
      }
    }
    return resultFor(remaining[cutoffIdx],'time-stale');
  }
  var future=remaining.find(function(it){
    var m=parseStartMinutes(it.time);
    return m!==null && m>=nowMinutes;
  });
  return resultFor(future||remaining[0],future?'time':'order');
}

function clusterController(parent){
  if(!parent||!parent.id) return null;

    id:clusterControllerId(parent),
    sourceId:parent.id,

function clusterParentForPick(items,picked){
  if(!picked||!picked.sourceId) return picked||null;

}
function getChildStopCluster(items,parent){
  var start=(items||[]).indexOf(parent);
  if(start<0||!parent||!parent.act) return null;
  var stops=[];
  if(parent.id&&(parent.place||parent.ref)) stops.push(parent);
  for(var i=start+1;i<items.length;i++){
    var item=items[i];
    if(item&&item.act) break;
    if(item&&item.id&&(item.place||item.ref)) stops.push(item);
  }
  return stops.length>=2?{
    parent:parent,
    controllerId:clusterControllerId(parent),
    items:stops
  }:null;
}
function homeNextStopItems(items){
  return (items||[]).filter(function(item){ return item&&item.act; }).map(function(parent){
    return getChildStopCluster(items,parent)?clusterController(parent):parent;
  });

function pickClusterChild(cluster,progress,checks,nowMinutes,dayRef){
  if(!cluster||!cluster.items||!cluster.items.length) return { item:null, remaining:0, source:'complete' };
  var visitable=cluster.items.map(function(item){
    return { id:item.id, time:item.time, act:item.act||item.place||item.ref||'子站', place:item.place, ref:item.ref, move:item.move, note:item.note };
  });
  var pick=pickNextStop(visitable,progress,checks,nowMinutes,dayRef);
  if(pick.item) pick.item=cluster.items.find(function(item){ return item.id===pick.item.id; })||null;
  return pick;
}
function reconcileClusterController(day,dayIndex,cluster,progress,checks){
  if(!cluster||!cluster.controllerId) return false;
  progress=normalizeDayProgress(progress);
  checks=checks||{};
  var cleared=cluster.items.every(function(item){ return isNextStopCleared(item,progress,checks); });
  var controller={id:cluster.controllerId};
  var controllerCleared=isNextStopCleared(controller,progress,checks);
  if(cleared&&!controllerCleared){
    markNextStop(day,dayIndex,cluster.controllerId,'done');
    return true;
  }
  if(!cleared&&controllerCleared){
    setItemCompletion(day,dayIndex,cluster.controllerId,'clear');
    return true;
  }
  return false;
}
function completeClusterParent(day,dayIndex,cluster,progress,checks){
  return reconcileClusterController(day,dayIndex,cluster,progress,checks);
}
function syncCompletedClusterParents(day,dayIndex){
  var changed=false;
  (day&&day.items||[]).forEach(function(parent){
    if(!parent.act) return;
    var cluster=getChildStopCluster(day.items,parent);
    if(!cluster) return;
    if(reconcileClusterController(day,dayIndex,cluster,getDayProgress(day,dayIndex),getChecks())) changed=true;
  });
  return changed;
}

function undoNextStopAction(){
  var action=lastNextStopAction;

  var all=getNextStopProgress();
  var key=dayProgressKey(day,action.dayIndex);
  var progress=normalizeDayProgress(all[key]);
  delete progress.done[action.itemId];
  delete progress.skip[action.itemId];
  if(action.prevDone) progress.done[action.itemId]=true;
  if(action.prevSkip) progress.skip[action.itemId]=true;

  var checks=getChecks();

var homeWeatherState={};
function renderWeatherChip(weather){
  if(!weather) return '';
  return '<div class="weather-chip"><span class="city">'+escapeHtml(weather.city)+'</span>'+escapeHtml(' '+weather.icon+' '+weather.temp+'° 雨'+weather.rain+'%')+'</div>';
}
function requestHomeWeather(dayIndex,item){
  if(!item) return;
  var day=DB.trip&&DB.trip.days?DB.trip.days[dayIndex]:null;
  var city=inferWeatherCityForDay(day,item);
  if(!city) return;
  var key='day_'+dayIndex+'_'+city.key;
  if(homeWeatherState[key]) return;
  var cached=getCachedWeather(city);
  if(cached){ homeWeatherState[key]=cached; return; }
  homeWeatherState[key]={ loading:true };
  loadWeatherForCity(city).then(function(weather){
    if(weather){ homeWeatherState[key]=weather; if(curView==='today') renderToday(); }
    else delete homeWeatherState[key];
  });
}
function homeWeatherFor(dayIndex,item){
  if(!item) return null;
  var day=DB.trip&&DB.trip.days?DB.trip.days[dayIndex]:null;
  var city=inferWeatherCityForDay(day,item);
  if(!city) return null;
  var key='day_'+dayIndex+'_'+city.key;
  var state=homeWeatherState[key];
  if(state&&state.loading) return null;
  return state||getCachedWeather(city);
}
function daysUntilStart(){
  var raw=DB&&DB.cfg&&DB.cfg.startdate?String(DB.cfg.startdate):'';
  var parts=raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!parts) return null;
  var startStamp=Date.UTC(Number(parts[1]),Number(parts[2])-1,Number(parts[3]));
  var now=appNow();
  var todayStamp=Date.UTC(now.getFullYear(),now.getMonth(),now.getDate());
  return Math.ceil((startStamp-todayStamp)/86400000);
}
function renderPreTripBrief(){
  var d=daysUntilStart();
  var day=DB.trip&&DB.trip.days?DB.trip.days[0]:null;
  var highlights=day?day.items.filter(function(it){return it&&it.act;}).slice(0,4):[];
  return (d!==null&&d>0?'<div class="pretrip-count">D-'+d+'</div>':'')+
    (highlights.length?'<div class="tomorrow-list">'+highlights.map(function(it){
      return '<div class="tomorrow-item">'+(it.time?'<b>'+escapeHtml(it.time)+'</b> ':'')+escapeHtml([it.act,it.place].filter(Boolean).join(' · '))+'</div>';
    }).join('')+'</div>':'');
}
var TOMORROW_PREVIEW_HOUR=21; /* 21:00 後,若今日仍有未手動清項目,主卡下方附縮小版明日預告 */
/* 規則(2026-07-09 確認):今日完成度只看「手動完成/跳過/checkbox」,不受時間推進影響。
   pick.item 為 null 就等於「今天所有項目都已手動清除」(pickNextStop 的 remaining 定義與此一致)。*/
function shouldReplaceWithTomorrowPreview(pick){
  return !(pick&&pick.item);
}
function shouldShowCompactTomorrowPreview(pick,nowMinutes){
  return !!(pick&&pick.item) && nowMinutes>=TOMORROW_PREVIEW_HOUR*60;
}
function renderTomorrowPreview(dayIndex,compact){
  if(!DB.trip||!DB.trip.days) return '';
  var day=DB.trip.days[dayIndex+1];
  if(!day) return '';
  var items=(day.items||[]).filter(function(it){return it&&it.act;}).slice(0,compact?2:4);

    '<div class="tomorrow-lbl">明日預告</div>'+
    '<div class="tomorrow-title">DAY '+(dayIndex+2)+' · '+day.date+(day.dow?' ('+day.dow+')':'')+'</div>'+
    (items.length?'<div class="tomorrow-list">'+items.map(function(it){
      return '<div class="tomorrow-item">'+(it.time?'<b>'+escapeHtml(it.time)+'</b> ':'')+escapeHtml([it.act,it.place].filter(Boolean).join(' · '))+'</div>';
    }).join('')+'</div>':'')+
  '</div>';
}
function renderToday(){
  var view=document.getElementById('view-today');
  var ti=findToday();
  var checks=getChecks();
  if(ti===null){
    var days=DB.trip?DB.trip.days:[];
    view.innerHTML='<div class="today-hero"><div class="lbl">TODAY · '+todayMD()+'</div>'+
      '<div class="date">還沒到出發日</div>'+
      '<div class="empty">今天沒有排定行程 🗓️<br>出發當天這裡會自動顯示當日安排與下一站。</div>'+
      renderPreTripBrief()+
      '<button class="today-jump" onclick="switchView(\'trip\')">查看完整行程 →</button></div>'+
      (days.length?'<div class="seg">行程重點</div>':'')+
      days.map(function(d,i){
        var hl=d.items.filter(function(it){return it.act;}).slice(0,3).map(function(it){return it.act;}).join('、');
        return '<div class="hotel" style="border-left-color:var(--sea);cursor:pointer" onclick="gotoDay('+i+')"><div class="h-lbl" style="color:var(--sea)">DAY '+(i+1)+' · '+d.date+'</div><div class="h-name" style="font-size:14px">'+escapeHtml(hl)+'</div></div>';
      }).join('');
    return;
  }
  var day=DB.trip.days[ti];
  var items=homeNextStopItems(day.items);
  var progress=getDayProgress(day,ti);
  if(syncCompletedClusterParents(day,ti)) progress=getDayProgress(day,ti);
  checks=getChecks();
  var nowMinutes=currentMinutes();
  var pick=pickNextStop(items,progress,checks,nowMinutes,{day:day,dayIndex:ti});
  var completed=items.length-(pick.remaining+(pick.item?1:0));
  var clusterParent=clusterParentForPick(day.items,pick.item);
  var cluster=getChildStopCluster(day.items,clusterParent);
  var clusterPick=cluster?pickClusterChild(cluster,progress,checks,nowMinutes,{day:day,dayIndex:ti}):null;
  var weatherItem=clusterPick&&clusterPick.item?clusterPick.item:pick.item;
  requestHomeWeather(ti,weatherItem);
  var weather=homeWeatherFor(ti,weatherItem);
  var h='<div class="today-hero'+(weather?' weather-on':'')+'"><div class="today-hero-main"><div class="lbl">TODAY · DAY '+(ti+1)+'</div>'+
    '<div class="date">'+day.date+(day.dow?' ('+day.dow+')':'')+'</div>'+
    '<div class="loc">'+completed+'/'+items.length+' 已處理</div></div>'+
    renderWeatherChip(weather)+'</div>';
  h+=cluster&&clusterPick&&clusterPick.item?renderClusterNextStopCard(day,ti,pick,cluster,checks,progress,nowMinutes):renderNextStopCard(day,ti,pick);
  if(DB.trip.days[ti+1]){
    if(shouldReplaceWithTomorrowPreview(pick)) h+=renderTomorrowPreview(ti,false);
    else if(shouldShowCompactTomorrowPreview(pick,nowMinutes)) h+=renderTomorrowPreview(ti,true);
  }
  h+='<button class="today-jump dark" onclick="gotoDay('+ti+')">看今日完整細節 →</button>';
  view.innerHTML=h;
}

var _shopQ='';
var shopPlaceFilter='all';
var shopOpenFloors={};
var shopWantListOpen={};
function cssId(s){
  return String(s).replace(/[^a-zA-Z0-9]/g,'_');
}
function shopWantKey(place,index){
  return (place&&place.placeId)?place.placeId:('M'+index);
}
function toggleShopWantList(key){
  shopWantListOpen[key]=!shopWantListOpen[key];
  renderShopResults();
}
function setShopPlaceFilter(key){

  renderShopResults();
}
function shopQ(v){ _shopQ=v.trim().toLowerCase(); renderShopResults(); }
function openShopPlace(placeId){

  });

function centerShopFilterChip(){

  if(el) el.classList.toggle('open',open);

function shopMalls(){
  var byPlace={};
  DB.shop.forEach(function(s){
    var pid=(s.placeId||'').toUpperCase(); if(!pid) return;
    (byPlace[pid]=byPlace[pid]||[]).push(s);
  });
  var itineraryOrder={};
  var seq=0;
  if(DB.trip&&DB.trip.days){
    DB.trip.days.forEach(function(d){
      (d.items||[]).forEach(function(it){
        var pid=(it.ref||'').toUpperCase();
        if(pid&&!itineraryOrder[pid]) itineraryOrder[pid]=++seq;
      });
    });
  }
  var seen={};
  var malls=[];
  DB.placeList.forEach(function(p){
    var pid=(p.placeId||'').toUpperCase();
    if(!pid||p.tnorm!=='shopping') return;
    seen[pid]=true;
    malls.push({ place:p, stores:byPlace[pid]||[], order:itineraryOrder[pid]||9999 });
  });
  Object.keys(byPlace).forEach(function(pid){
    if(seen[pid]) return;
    malls.push({ place:DB.places[pid]||{name:pid,placeId:pid}, stores:byPlace[pid], order:itineraryOrder[pid]||9999 });
  });
  malls.sort(function(a,b){
    if(a.order!==b.order) return a.order-b.order;
    return String(a.place.name||'').localeCompare(String(b.place.name||''),'zh-Hant');
  });
  return malls;

    h+='<div class="seg" style="margin-top:14px">區域 / 樓層（點選展開）</div>';

var LEDGER_POST_URL='https://script.google.com/macros/s/AKfycbwtC9G5GYZYmvZU2sl81Q2YDYDoeNf-FaZgeZa2GptfQ0znKA-h9Du1GuoSv0waeuSPhA/exec';

var DEFAULT_LEDGER_PAY_METHODS=['現金','信用卡','行動支付','Suica','其他'];
var ledgerIdSeen={};

function ledgerBooleanValue(value){return value===true||value===1||String(value||'').trim().toLowerCase()==='true'||String(value||'').trim()==='1';}
function ledgerRecordMetadata(record){
  var source=record&&typeof record==='object'?record:{};
  return {inputCurrency:String(source.inputCurrency||'').toUpperCase(),isTaxFree:ledgerBooleanValue(source.isTaxFree===undefined?source.taxExempt:source.isTaxFree),priceMode:String(source.priceMode||''),taxRate:source.taxRate===''||source.taxRate==null?null:Number(source.taxRate),couponAmount:Math.max(0,Number(source.couponAmount===undefined?source.discount:source.couponAmount)||0),isProxy:!!source.isProxy,proxyTarget:String(source.proxyTarget||'').trim()};
}
function ledgerVisibleNote(value){return String(value&&typeof value==='object'?value.note:value||'').trim();}

function createLedgerId(now,randomFn){
  var stamp=String(now==null?Date.now():now), random=randomFn||Math.random, suffix='', id='', tries=0;
  do{
    suffix=('0000'+Math.floor(random()*1679616).toString(36)).slice(-4);
    id=stamp+'-'+suffix;
    tries++;
  }while(ledgerIdSeen[id]&&tries<12);
  if(ledgerIdSeen[id]){
    for(var n=0;n<1679616&&ledgerIdSeen[id];n++){
      suffix=('0000'+n.toString(36)).slice(-4);
      id=stamp+'-'+suffix;
    }
  }
  ledgerIdSeen[id]=true;
  return id;
}

function normalizeLedgerRecord(record,now,randomFn,isTestMode){
  var source=record||{}, at=now==null?Date.now():now, detail=String(source.detail||'').trim();
  if(isTestMode&&source.recordType!=='deletion'&&detail.indexOf('[TEST]')!==0) detail='[TEST] '+detail;
  return {
    id:String(source.id||createLedgerId(at,randomFn)).trim(),
    time:String(source.time||timestampDate(at).toISOString()).trim(),
    member:String(source.member||'').trim(),
    category:String(source.category||'').trim(),
    detail:detail,
    amountJpy:source.amountJpy===''||source.amountJpy==null?null:Number(source.amountJpy),
    amountTwd:source.amountTwd===''||source.amountTwd==null?0:Number(source.amountTwd),
    note:String(source.note||'').trim(),
    participants:String(source.participants||'').trim(),
    payMethod:String(source.payMethod||'').trim(),
    recordType:String(source.recordType||'').trim(),
    targetRecordId:String(source.targetRecordId||'').trim(),
    deleteReason:String(source.deleteReason||'').trim(),
    batchId:String(source.batchId||'').trim(),
    storeName:String(source.storeName||'').trim(),
    replacesRecordId:String(source.replacesRecordId||'').trim(),
    inputCurrency:String(source.inputCurrency||'').trim().toUpperCase(),
    isTaxFree:ledgerBooleanValue(source.isTaxFree),
    priceMode:String(source.priceMode||'').trim(),
    taxRate:source.taxRate===''||source.taxRate==null?null:Number(source.taxRate),
    couponAmount:source.couponAmount===''||source.couponAmount==null?0:Number(source.couponAmount)
  };
}

function validateLedgerRecord(record){
  if(!record.member) throw new Error('成員必填');
  if(!record.id) throw new Error('紀錄ID必填');
  if(record.amountJpy===null||!isFinite(record.amountJpy)) throw new Error('日幣必填');
  if(!isFinite(record.amountTwd)) throw new Error('台幣格式錯誤');
  if(record.inputCurrency&&record.inputCurrency!=='JPY'&&record.inputCurrency!=='TWD')throw new Error('輸入幣別格式錯誤');
  if(record.priceMode&&record.priceMode!=='included'&&record.priceMode!=='excluded')throw new Error('價格方式格式錯誤');
  if(record.taxRate!==null&&(!isFinite(record.taxRate)||record.taxRate<0||record.taxRate>100))throw new Error('稅率格式錯誤');
  if(!isFinite(record.couponAmount)||record.couponAmount<0)throw new Error('優惠券金額格式錯誤');
  var deletionIssue=deletionRecordIssue(record);
  if(deletionIssue)throw new Error(deletionIssue);
  return true;
}

function normalizePersonalLedgerRecord(record,now,randomFn){
  var normalized=normalizeLedgerRecord(record,now,randomFn,false),meta=ledgerRecordMetadata(record||{});
  return {
    id:normalized.id,time:normalized.time,member:normalized.member,category:normalized.category,
    detail:normalized.detail,amountJpy:normalized.amountJpy,amountTwd:normalized.amountTwd,
    note:normalized.note,payMethod:normalized.payMethod,isProxy:meta.isProxy,
    proxyTarget:meta.proxyTarget,inputCurrency:normalized.inputCurrency,isTaxFree:normalized.isTaxFree,
    priceMode:normalized.priceMode,taxRate:normalized.taxRate,couponAmount:normalized.couponAmount,batchId:normalized.batchId,
    storeName:normalized.storeName,replacesRecordId:normalized.replacesRecordId
  };
}

function createPersonalLedgerRepository(options){
  var opts=options||{}, storage=opts.storage, now=opts.now||Date.now, random=opts.random||Math.random;
  function all(){
    try{

function buildMemberBalances(records,memberOrder,warnFn,universe){
  universe=universe==='test'?'test':'formal';
  var order=settlementMemberOrder(records,memberOrder,universe), orderInfo=settlementOrderInfo(order), states=Object.create(null), invalidRecords=[];
  function stateFor(name){
    var key=canonicalMemberName(name);
    if(!key)return null;
    if(!states[key])states[key]={member:orderInfo.display[key]||String(name).trim(),paidJpy:0,owedJpy:0,netJpy:0,paidTwd:0,owedTwd:0,netTwd:0};
    return states[key];
  }
  function reject(record,reason){
    invalidRecords.push({id:String(record&&record.id||''),reason:reason});
    settlementWarning(warnFn,'結算排除紀錄 '+String(record&&record.id||'')+':'+reason);
  }
  order.forEach(stateFor);
  effectiveLedgerRecords(records,warnFn).forEach(function(record){
    if(!record||record.recordType!=='expense')return;
    if(universe==='test'?!isTestLedgerRecord(record):isTestLedgerRecord(record))return;
    var participants=parseParticipants(record,warnFn);
    if(!participants){invalidRecords.push({id:String(record.id||''),reason:'participants 無效'});return;}
    var payerName=String(record.member||'').trim(), amountJpy=settlementAmount(record.amountJpy), amountTwd=settlementAmount(record.amountTwd);
    if(!canonicalMemberName(payerName)){reject(record,'缺少付款人');return;}
    if(amountJpy===null||amountTwd===null){reject(record,'金額必須是非負整數');return;}
    var jpyShares=allocateAmountByLargestRemainder(amountJpy,participants),twdShares=allocateAmountByLargestRemainder(amountTwd,participants);
    var emptyState={paidJpy:0,owedJpy:0,paidTwd:0,owedTwd:0},payerCurrent=states[canonicalMemberName(payerName)]||emptyState;
    var participantCurrents=participants.map(function(name){return states[canonicalMemberName(name)]||emptyState;});
    var safe=isSafeLedgerInteger(payerCurrent.paidJpy+amountJpy)&&isSafeLedgerInteger(payerCurrent.paidTwd+amountTwd);
    participantCurrents.forEach(function(state,index){
      if(!isSafeLedgerInteger(state.owedJpy+jpyShares[index].amount)||!isSafeLedgerInteger(state.owedTwd+twdShares[index].amount))safe=false;
    });

    var payer=stateFor(payerName),participantStates=participants.map(stateFor);

}
function buildTransferSuggestions(memberBalances,currency,memberOrder){
  currency=String(currency||'').toUpperCase();
  if(currency!=='JPY'&&currency!=='TWD')throw new Error('結算幣別必須是 JPY 或 TWD');
  if(memberBalances&&!Array.isArray(memberBalances)&&Array.isArray(memberBalances.members)){
    if(!Array.isArray(memberOrder)&&Array.isArray(memberBalances.memberOrder))memberOrder=memberBalances.memberOrder;
    memberBalances=memberBalances.members;
  }
  var field=currency==='JPY'?'netJpy':'netTwd',orderInfo=settlementOrderInfo(memberOrder||[]),debtors=[],creditors=[],totalDebt=0,totalCredit=0;
  (memberBalances||[]).forEach(function(item){

    if(amount<0){totalDebt+=-amount;if(!isSafeLedgerInteger(totalDebt))throw new Error('結算應付總額超過安全整數範圍');debtors.push({member:item.member,amount:-amount});}

  });

    debtor.amount-=amount;creditor.amount-=amount;
    if(!debtor.amount)debtors.shift();
    if(!creditor.amount)creditors.shift();
  }

}

function createLedgerRepository(options){
  var opts=options||{}, storage=opts.storage, post=opts.post, now=opts.now||Date.now, random=opts.random||Math.random, flushInFlight=null;
  function readQueue(){
    try{
      var parsed=JSON.parse(storage.getItem(LEDGER_QUEUE_KEY)||'[]');
      return Array.isArray(parsed)?parsed:[];
    }catch(error){ AppLog.repo('分帳佇列讀取失敗:'+(error.message||error)); return []; }
  }
  function writeQueue(queue){
    storage.setItem(LEDGER_QUEUE_KEY,JSON.stringify(queue));
    if(typeof opts.onChange==='function') opts.onChange(queue.length);
  }
  function pendingCount(){ return readQueue().length; }
  function flushQueue(){
    if(flushInFlight) return flushInFlight;
    var sent=0, sawDup=false;
    function sendNext(){
      var queue=readQueue();
      if(!queue.length) return Promise.resolve({ok:true,sent:sent,dup:sawDup,pending:0});
      var current=queue[0];
      return Promise.resolve().then(function(){ return post(current); }).then(function(response){
        if(!response||response.ok!==true) throw new Error(response&&response.error||'伺服器未確認寫入');
        if(typeof opts.onDelivered==='function')opts.onDelivered(current,response);
        var latest=readQueue().filter(function(item){return item.id!==current.id;});
        writeQueue(latest); sent++; if(response.dup) sawDup=true;
        return sendNext();
      }).catch(function(error){
        AppLog.repo('分帳送出失敗:'+(error.message||error)+' — 已留在本機佇列');
        return {ok:false,sent:sent,dup:sawDup,pending:pendingCount(),error:error};
      });
    }
    flushInFlight=sendNext().then(function(result){flushInFlight=null;return result;},function(error){flushInFlight=null;throw error;});
    return flushInFlight;
  }
  function add(record){
    var at=now(), normalized=normalizeLedgerRecord(record,at,random,typeof opts.isTestMode==='function'&&opts.isTestMode());
    try{ validateLedgerRecord(normalized); }
    catch(error){ return Promise.reject(error); }
    var queue=readQueue();
    if(!queue.some(function(item){return item.id===normalized.id;})){ queue.push(normalized); writeQueue(queue); }
    return flushQueue().then(function(result){
      var delivered=!readQueue().some(function(item){return item.id===normalized.id;});
      return {ok:delivered,dup:!!result.dup,pending:pendingCount(),record:normalized,error:result.error};
    });
  }
  function enqueueBatch(records){
    var testMode=typeof opts.isTestMode==='function'&&opts.isTestMode();
    var normalized=(records||[]).map(function(record){
      var item=normalizeLedgerRecord(record,now(),random,testMode);
      validateLedgerRecord(item);return item;
    });
    if(!normalized.length)throw new Error('記帳批次不可為空');
    var next=readQueue().slice(),seen={};
    next.forEach(function(item){seen[item.id]=true;});
    normalized.forEach(function(item){if(!seen[item.id]){seen[item.id]=true;next.push(item);}});
    writeQueue(next);
    Promise.resolve().then(function(){return flushQueue();}).then(function(){
      if(typeof opts.onBackgroundFlush==='function')opts.onBackgroundFlush();
    },function(error){AppLog.repo('背景同步失敗：'+(error.message||error));});
    return {ok:true,queued:true,records:normalized,pending:next.length};
  }
  return {add:add,enqueueBatch:enqueueBatch,flushQueue:flushQueue,pendingCount:pendingCount,queuedRecords:readQueue};
}

function postLedgerRecord(record){
  var timeout=new Promise(function(_,reject){setTimeout(function(){reject(new Error('分帳寫入逾時'));},FETCH_TIMEOUT);});
  var request=new Promise(function(resolve,reject){
    var promise, body=JSON.stringify(record);
    try{
      promise=fetch(LEDGER_POST_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:body});
    }catch(error){ reject(error); return; }
    promise=promise.catch(function(error){
      if(!/clone|DataCloneError/i.test(String(error))) throw error;
      return fetch(LEDGER_POST_URL,{method:'POST',body:body});
    });
    promise.then(function(response){
      if(!response.ok) throw new Error('HTTP '+response.status);
      return response.json();
    }).then(resolve).catch(reject);
  });
  return Promise.race([request,timeout]);
}

function normalizeLedgerSettings(source){
  var rate=Number(source&&source.exchangeRate);
  var currency=String(source&&source.ledgerDefaultCurrency||source&&source.defaultCurrency||'').toUpperCase();
  if(!isFinite(rate)||rate<=0) throw new Error('匯率未設定');
  if(currency!=='JPY'&&currency!=='TWD') throw new Error('預設幣別未設定');
  return {exchangeRate:rate,defaultCurrency:currency};
}

function currentLedgerSettings(){
  var bridge=lsGet(LEDGER_SETTINGS_BRIDGE_KEY,null);
  try{if(bridge)return normalizeLedgerSettings(bridge);}catch(ignore){}
  return normalizeLedgerSettings(DB.cfg||{});
}

function convertLedgerAmounts(currency,amount,rate){
  currency=String(currency||'').toUpperCase(); amount=Number(amount); rate=Number(rate);
  if(!isFinite(rate)||rate<=0) throw new Error('匯率未設定');
  if(!isFinite(amount)||amount<0) throw new Error('金額格式錯誤');
  if(currency==='JPY') return {amountJpy:Math.round(amount),amountTwd:Math.round(amount*rate)};
  if(currency==='TWD') return {amountJpy:Math.round(amount/rate),amountTwd:Math.round(amount)};
  throw new Error('幣別格式錯誤');
}

function postLedgerSettings(settings){
  return new Promise(function(resolve,reject){
    var settled=false;
    var timer=setTimeout(function(){
      if(settled)return;
      settled=true;
      reject(new Error('分帳設定寫入逾時'));
    },FETCH_TIMEOUT);
    var promise, body=JSON.stringify({
      action:'updateSettings',
      exchangeRate:settings.exchangeRate,
      defaultCurrency:settings.defaultCurrency
    });
    function finish(handler,value){
      if(settled)return;
      settled=true;
      clearTimeout(timer);
      handler(value);
    }
    try{
      promise=fetch(LEDGER_POST_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:body});
    }catch(error){finish(reject,error);return;}
    promise=promise.catch(function(error){
      if(!/clone|DataCloneError/i.test(String(error)))throw error;
      return fetch(LEDGER_POST_URL,{method:'POST',body:body});
    });
    promise.then(function(response){
      if(!response.ok)throw new Error('HTTP '+response.status);
      return response.json();
    }).then(function(result){finish(resolve,result);},function(error){finish(reject,error);});
  });
}

function saveLedgerSettings(source){
  var settings=normalizeLedgerSettings(source);
  return postLedgerSettings(settings).then(function(result){
    if(!result||result.ok!==true)throw new Error(result&&result.error||'伺服器未確認設定');
    if(!DB.cfg)DB.cfg={};
    DB.cfg.exchangeRate=settings.exchangeRate;
    DB.cfg.ledgerDefaultCurrency=settings.defaultCurrency;
    lsSet(LEDGER_SETTINGS_BRIDGE_KEY,{exchangeRate:settings.exchangeRate,defaultCurrency:settings.defaultCurrency});
    if(typeof openSettings==='function')openSettings();
    if(typeof renderSplit==='function')renderSplit();
    return result;
  });
}

function reconcileLedgerSettingsBridge(){
  var bridge=lsGet(LEDGER_SETTINGS_BRIDGE_KEY,null), published, confirmed;
  if(!bridge)return false;
  try{
    published=normalizeLedgerSettings(DB.cfg||{});
    confirmed=normalizeLedgerSettings(bridge);
  }catch(ignore){return false;}
  if(published.exchangeRate!==confirmed.exchangeRate||published.defaultCurrency!==confirmed.defaultCurrency)return false;
  localStorage.removeItem(LEDGER_SETTINGS_BRIDGE_KEY);
  return true;

function copyPersonalStateText(text,timeoutMs){
  if(typeof navigator==='undefined'||!navigator.clipboard||typeof navigator.clipboard.writeText!=='function')return Promise.reject(new Error('clipboard unavailable'));
  timeoutMs=Number(timeoutMs)||1500;
  return new Promise(function(resolve,reject){
    var settled=false;
    var timer=setTimeout(function(){if(settled)return;settled=true;reject(new Error('剪貼簿逾時'));},timeoutMs);
    var finish=function(fn,value){if(settled)return;settled=true;clearTimeout(timer);fn(value);};
    var promise;
    try{promise=navigator.clipboard.writeText(text);}catch(error){finish(reject,error);return;}
    Promise.resolve(promise).then(function(){finish(resolve);},function(error){finish(reject,error);});
  });
}

function validatePersonalStatePayload(payload){
  if(!payload||payload.format!=='trip-personal-state'||[1,2,3].indexOf(payload.version)<0)throw new Error('個人狀態格式錯誤');
  if(payload.version<3&&payload.proxyTargets===undefined)payload.proxyTargets=[];
  if(!Array.isArray(payload.proxyTargets))throw new Error('代購對象清單格式錯誤');
  payload.proxyTargets=ledgerProxyTargetStore.normalize(payload.proxyTargets);
  return payload;
}
function applyPersonalStatePayload(payload){
  var keys=['trip_checks','trip_shop_wants','trip_member',LEDGER_QUEUE_KEY,PERSONAL_LEDGER_KEY,LEDGER_CATEGORY_OPTIONS_KEY,LEDGER_PAY_METHOD_OPTIONS_KEY,LEDGER_PROXY_TARGETS_KEY];
  var before=keys.map(function(key){return {key:key,value:localStorage.getItem(key)};});
  try{
    lsSet('trip_checks',payload.checks);
    lsSet('trip_shop_wants',payload.wants);
    localStorage.setItem('trip_member',String(payload.member));
    localStorage.setItem(LEDGER_QUEUE_KEY,JSON.stringify(payload.ledgerQueue));
    localStorage.setItem(PERSONAL_LEDGER_KEY,JSON.stringify(payload.personalLedger));
    localStorage.setItem(LEDGER_CATEGORY_OPTIONS_KEY,JSON.stringify(payload.ledgerCategories));
    localStorage.setItem(LEDGER_PAY_METHOD_OPTIONS_KEY,JSON.stringify(payload.ledgerPayMethods));
    localStorage.setItem(LEDGER_PROXY_TARGETS_KEY,JSON.stringify(payload.proxyTargets));
  }catch(error){
    before.forEach(function(item){
      if(item.value===null)localStorage.removeItem(item.key);
      else localStorage.setItem(item.key,item.value);
    });
    throw error;
  }
}
function restorePersonalState(){
  var box=document.getElementById('personalStateBox'), payload;
  try{ payload=JSON.parse(box&&box.value||''); }catch(error){ toast('JSON 格式錯誤'); return; }
  if(!payload||payload.format!=='trip-personal-state'||[1,2,3].indexOf(payload.version)<0||!payload.checks||Array.isArray(payload.checks)||typeof payload.checks!=='object'||!payload.wants||Array.isArray(payload.wants)||typeof payload.wants!=='object'||!Array.isArray(payload.ledgerQueue)||!memberIsAllowed(String(payload.member||''))){ toast('個人狀態格式驗證失敗'); return; }
  if(payload.version===1){payload.personalLedger=[];payload.ledgerCategories=DEFAULT_LEDGER_CATEGORIES.slice();payload.ledgerPayMethods=DEFAULT_LEDGER_PAY_METHODS.slice();}
  try{validatePersonalStatePayload(payload);}catch(error){toast(error.message||'代購對象清單格式錯誤');return;}
  if(!Array.isArray(payload.personalLedger)||!Array.isArray(payload.ledgerCategories)||!Array.isArray(payload.ledgerPayMethods)){toast('個人狀態格式驗證失敗');return;}
  try{ payload.ledgerQueue.forEach(function(record){if(!record||!String(record.id||'').trim()||!String(record.time||'').trim())throw new Error('佇列缺少 ID 或時間');validateLedgerRecord(normalizeLedgerRecord(record,Date.now(),Math.random,false));}); }
  catch(error){ toast('佇列紀錄格式驗證失敗'); return; }
  try{
    payload.personalLedger=payload.personalLedger.map(function(record){if(!record||!String(record.id||'').trim()||!String(record.time||'').trim())throw new Error('個人帳缺少 ID 或時間');var normalized=normalizePersonalLedgerRecord(record,Date.now(),Math.random);validateLedgerRecord(normalized);return normalized;});
    payload.ledgerCategories=payload.ledgerCategories.map(normalizeLedgerOption).filter(function(value,index,values){return values.indexOf(value)===index;});
    payload.ledgerPayMethods=payload.ledgerPayMethods.map(normalizeLedgerOption).filter(function(value,index,values){return values.indexOf(value)===index;});
  }catch(error){toast('個人帳或自訂選項格式驗證失敗');return;}
  try{applyPersonalStatePayload(payload);}catch(error){toast('本機資料還原失敗');return;}
  closePersonalStateDialog(); closeSettings(); renderAll(); updateLedgerPendingStatus(); ledgerRepository.flushQueue(); toast('個人狀態已還原');
}

  }else{
    document.getElementById('view-today').innerHTML='<div class="empty-state">😕 資料載入異常，請重新下載檔案。</div>';
  }
  syncAll(false);
}
window.addEventListener('scroll',function(){
  document.getElementById('totop').classList.toggle('show',window.scrollY>400);
});
window.addEventListener('online',function(){ ledgerRepository.flushQueue().then(function(){renderSplit();refreshMemberSelector();}); });
function isTimeSimulationActive(){ var s=lsGet('trip_time_simulation',null); return !!(s&&((s.mode==='offset'&&typeof s.offsetMs==='number')||(s.mode==='custom'&&s.value))); }
function updateSimulationMarker(){ var on=isTimeSimulationActive(),logo=document.getElementById('diagnosticBadge'),marker=document.getElementById('simMarker'); if(logo) logo.classList.toggle('simulating',on); if(marker) marker.classList.toggle('on',on); }
function snapshotSimulationState(){
  if(lsGet('trip_time_simulation_snapshot',null)) return;
  var data={};
  for(var i=0;i<localStorage.length;i++){ var k=localStorage.key(i); if(isSimulationSnapshotKey(k)) data[k]=localStorage.getItem(k); }
  lsSet('trip_time_simulation_snapshot',data);
}
function isSimulationSnapshotKey(k){ return !!(k&&k.indexOf('trip_')===0&&k!=='trip_time_simulation'&&k!=='trip_time_simulation_snapshot'&&k.indexOf('trip_weather_')!==0&&k!=='trip_expenses'&&k!=='trip_people'); }
function setTimeSimulation(){ var input=document.getElementById('diagTime'); if(!input||!input.value) return; var targetMs=Date.parse(input.value); if(isNaN(targetMs)) return; snapshotSimulationState(); lsSet('trip_time_simulation',{mode:'offset',offsetMs:targetMs-Date.now()}); updateSimulationMarker(); renderAll(); closeDiagnostics(); }
function setTimeSimulationDay(dayIndex){ var day=DB.trip&&DB.trip.days&&DB.trip.days[dayIndex]; if(!day) return; var y=(DB.cfg&&DB.cfg.startdate||'').slice(0,4); var input=document.getElementById('diagTime'); if(input) input.value=y+'-'+day.date.replace('/','-')+'T08:00'; }
function resetTripProgress(){ if(!confirm('確定重置所有打卡與略過進度？')) return; if(!confirm('再次確認：此動作無法復原。')) return; localStorage.removeItem('trip_checks'); localStorage.removeItem('trip_next_stop_progress'); renderAll(); closeDiagnostics(); toast('已重置行程進度'); }
function endTimeSimulation(restore){
  var snap=lsGet('trip_time_simulation_snapshot',null);
  if(restore&&snap){ for(var i=localStorage.length-1;i>=0;i--){ var k=localStorage.key(i); if(isSimulationSnapshotKey(k)) localStorage.removeItem(k); } Object.keys(snap).forEach(function(k){ localStorage.setItem(k,snap[k]); }); }
  localStorage.removeItem('trip_time_simulation'); localStorage.removeItem('trip_time_simulation_snapshot'); updateSimulationMarker(); renderAll(); closeDiagnostics(); toast(restore?'已回復模擬前狀態':'已回復手機時間');
}
function closeDiagnostics(){ var el=document.getElementById('diagnosticOverlay'); if(el) el.remove(); }
function openDiagnostics(){
  closeDiagnostics();
  var sim=lsGet('trip_time_simulation',null), findings=healthCheck()||[], el=document.createElement('div');
  el.id='diagnosticOverlay';
  el.className='diag-overlay';
  var simValue=sim&&sim.mode==='custom'?sim.value:'';
  var days=(DB.trip&&DB.trip.days||[]).map(function(_,i){
    return '<button onclick="setTimeSimulationDay('+i+')">Day '+(i+1)+'</button>';
  }).join('');
  el.innerHTML='<div class="diag-panel"><div class="diag-head"><h2>診斷面板</h2><button class="diag-close" onclick="closeDiagnostics()">×</button></div>'+
    '<div class="diag-section"><h3>健康檢查</h3><div class="diag-row">'+(findings.length?escapeHtml(findings.join('；')):'正常')+'</div></div>'+
    '<div class="diag-section"><h3>時間模擬</h3><div class="diag-row">'+(isTimeSimulationActive()?'模擬中：目前模擬時間 '+appNow().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})+'（行走中）':'依手機時間')+'</div><input id="diagTime" type="datetime-local" value="'+escapeHtml(simValue||'')+'"><div class="diag-shortcuts">'+days+'</div><div class="diag-actions"><button class="primary" onclick="setTimeSimulation()">套用並開始模擬</button></div><button onclick="endTimeSimulation(true)">結束模擬——還原測試前狀態</button><div class="diag-help">還原進入模擬前的打卡與略過狀態。</div><button onclick="endTimeSimulation(false)">結束模擬——保留測試變更</button><div class="diag-help">保留模擬期間的打卡與略過狀態。</div></div>'+
    '<div class="diag-section"><h3>行程進度</h3><button onclick="resetTripProgress()">重置行程進度</button><div class="diag-help">僅清除打卡與略過，需雙重確認。</div></div></div>';
  document.body.appendChild(el);
}
function setupDiagnostics(){ var badge=document.getElementById('diagnosticBadge'),last=0; if(!badge) return; badge.addEventListener('touchend',function(e){ var now=Date.now(); if(now-last<300){ e.preventDefault(); openDiagnostics(); } last=now; },{passive:false}); updateSimulationMarker(); }
/* iOS 雙擊放大抑制（相容性定案，勿刪）:
   目標 iPhone 三次開關對照顯示，document 上的手勢觀測 listener
   集合會改變 WebKit 雙擊縮放仲裁；診斷關閉後現象再現。
   退役診斷子系統後只保留最小 dblclick no-op，以維持抑制效果。
   此為未文件化 WebKit compatibility workaround；若未來 iOS
   大版本後雙擊放大再現，優先檢查本監聽器是否仍在。 */
document.addEventListener('dblclick', function iosDoubleTapZoomSuppressor(){}, {passive:true});
var VIEWPORT_META=document.querySelector('meta[name="viewport"]');
var VIEWPORT_ORIGINAL=VIEWPORT_META?VIEWPORT_META.getAttribute('content'):'';
function forceViewportReflow(){ window.scrollTo(0,window.scrollY); }
function isFormControl(el){ return !!(el&&/^(INPUT|SELECT|TEXTAREA)$/.test(el.tagName||'')); }
function recoverViewportAfterResume(meta,original,wrap,win,raf){
  if(meta&&original){ if(meta.setAttribute) meta.setAttribute('content',original); else meta.content=original; }
  if(wrap&&wrap.style){ wrap.style.transform=''; wrap.style.transition=''; }
  var x=typeof win.scrollX==='number'?win.scrollX:(win.pageXOffset||0);
  var y=typeof win.scrollY==='number'?win.scrollY:(win.pageYOffset||0);
  var frame=raf||win.requestAnimationFrame||function(fn){ return setTimeout(fn,0); };
  frame(function(){ frame(function(){ win.scrollTo(x,y); }); });
}
function restoreFocusZoom(meta,viewport,userGesture,pendingTimer){
  if(!meta||!viewport||viewport.scale<=1||userGesture) return null;
  if(pendingTimer) clearTimeout(pendingTimer);
  meta.setAttribute?meta.setAttribute('content',VIEWPORT_ORIGINAL+', maximum-scale=1'):meta.content=VIEWPORT_ORIGINAL+', maximum-scale=1';
  return setTimeout(function(){ if(meta.setAttribute) meta.setAttribute('content',VIEWPORT_ORIGINAL); else meta.content=VIEWPORT_ORIGINAL; },100);
}
function setupViewportReflow(){
  var formFocused=false,userGesture=false,restoreTimer=null;
  var wrap=document.querySelector('.wrap');
  if(window.visualViewport) window.visualViewport.addEventListener('resize',function(){ if(Math.abs(window.visualViewport.height-window.innerHeight)<2) forceViewportReflow(); });
  document.addEventListener('visibilitychange',function(){ if(!document.hidden) recoverViewportAfterResume(VIEWPORT_META,VIEWPORT_ORIGINAL,wrap,window); });
  window.addEventListener('pageshow',function(){ recoverViewportAfterResume(VIEWPORT_META,VIEWPORT_ORIGINAL,wrap,window); });
  document.addEventListener('focusin',function(e){ if(isFormControl(e.target)){ formFocused=true; userGesture=false; } });
  document.addEventListener('touchstart',function(e){ if(formFocused&&e.touches&&e.touches.length>1) userGesture=true; },{passive:true});
  document.addEventListener('gesturestart',function(){ if(formFocused) userGesture=true; },{passive:true});
  document.addEventListener('focusout',function(e){
    if(formFocused&&isFormControl(e.target)) restoreTimer=restoreFocusZoom(VIEWPORT_META,window.visualViewport,userGesture,restoreTimer);
    formFocused=false; userGesture=false;
    if(e.target&&e.target.closest&&e.target.closest('#diagnosticOverlay')) forceViewportReflow();
  });
}
setupDiagnostics();
setupViewportReflow();
init();

</script>

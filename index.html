<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e3a44">
<title>TripPilot</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="16x16" href="icon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<style>
:root{
  --tabbar-height:62px;
  --paper:#f5f1e8;
  --card:#fffdf8;
  --ink:#22303a;
  --ink-soft:#5c6b73;
  --ink-faint:#94a0a6;
  --line:#e5ddcd;
  --line-soft:#eee8db;
  --sea:#12707f;
  --sea-deep:#0e3a44;
  --coral:#df5f3a;
  --coral-bg:#fbeee7;
  --gold:#c1963c;
  --green:#3c8062;
  --violet:#7659a0;
  --shadow:0 2px 12px rgba(24,44,52,.08);
  --shadow-lg:0 8px 28px rgba(24,44,52,.16);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
html,body{touch-action:pan-x pan-y}
body{
  font-family:"Hiragino Sans","Noto Sans TC","PingFang TC",system-ui,-apple-system,sans-serif;
  background:var(--paper);color:var(--ink);line-height:1.6;font-size:15px;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
  padding-bottom:calc(var(--tabbar-height) + env(safe-area-inset-bottom));
}
a{color:var(--sea)}
input,select,textarea{font-size:16px}

/* ===== 頂部列 ===== */
.hdr{position:sticky;top:0;z-index:60;box-shadow:0 2px 10px rgba(0,0,0,.18)}
.topbar{
  background:var(--sea-deep);
  padding:calc(env(safe-area-inset-top) + 8px) 12px 0;
}
.brand{display:flex;align-items:center;gap:8px;padding:0 128px 8px 8px;justify-content:flex-start;position:relative;min-width:0}
.brand .logo{
  width:26px;height:26px;border-radius:7px;object-fit:cover;display:block;flex:0 0 26px;
}
.brand .logo.simulating{filter:hue-rotate(120deg) saturate(1.35)}
.sim-marker{display:none;color:#ffe19a;font-size:11px;font-weight:800}
.sim-marker.on{display:inline}
.brand .t{color:#fff;font-size:15px;font-weight:700;letter-spacing:.03em;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.brand .sync{
  font-size:11px;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:4px;
  background:rgba(255,255,255,.1);border-radius:20px;padding:5px 10px;border:none;cursor:pointer;
  font-family:inherit;
}
.brand-actions{position:absolute;right:0;top:0;display:flex;align-items:center;gap:5px}
.settings-btn{width:32px;height:32px;border:0;border-radius:50%;background:rgba(255,255,255,.1);color:#fff;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer}
@media(max-width:390px){.brand{padding-right:124px}.brand .t{max-width:150px}.brand .logo{width:24px;height:24px;flex-basis:24px}.brand .sync{padding:5px 8px}}
.brand .sync .dot{width:7px;height:7px;border-radius:50%;background:#5ec27a}
.brand .sync .dot.stale{background:var(--gold)}
.brand .sync .dot.err{background:var(--coral)}
.brand .sync.spinning .dot{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.trip-tabs{display:flex;gap:6px}
.trip-tab{
  flex:1;background:transparent;border:none;cursor:pointer;color:rgba(255,255,255,.5);
  padding:9px 4px 11px;font-size:14px;font-weight:600;border-bottom:3px solid transparent;
  font-family:inherit;transition:.2s;
}
.trip-tab .sub{display:block;font-size:10.5px;font-weight:400;opacity:.7;margin-top:1px}
.trip-tab.active{color:#fff;border-color:var(--coral)}

/* ===== 日期橫向 ===== */
.daybar{
  background:var(--sea);display:flex;gap:7px;overflow-x:auto;padding:8px 12px;
  scrollbar-width:none;
}
.daybar::-webkit-scrollbar{display:none}
.day-chip{
  flex:0 0 auto;background:rgba(255,255,255,.13);border:none;border-radius:18px;cursor:pointer;
  color:rgba(255,255,255,.85);font-family:inherit;padding:6px 13px;font-size:13px;
  font-weight:600;white-space:nowrap;transition:.2s;line-height:1.3;text-align:center;
}
.day-chip .dow{font-size:9.5px;opacity:.8;display:block;font-weight:400}
.day-chip.active{background:var(--coral);color:#fff}
.day-chip.today-chip{box-shadow:0 0 0 2px #ffd98a inset}

/* ===== 內容 ===== */
.wrap{max-width:620px;margin:0 auto;padding:14px 12px 40px;min-height:calc(100vh - var(--tabbar-height) - env(safe-area-inset-bottom));min-height:calc(100dvh - var(--tabbar-height) - env(safe-area-inset-bottom))}
.view{display:none}
.view.active{display:block;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}

/* 今日首頁 hero */
.today-hero{
  background:linear-gradient(140deg,var(--sea-deep),var(--sea));color:#fff;
  border-radius:16px;padding:15px 16px 16px;margin-bottom:14px;box-shadow:var(--shadow-lg);
  position:relative;overflow:hidden;
}
.today-hero::after{
  content:"";position:absolute;right:-30px;top:-30px;width:130px;height:130px;
  background:radial-gradient(circle,rgba(223,95,58,.35),transparent 70%);
}
.today-hero .lbl{font-size:11px;letter-spacing:.14em;opacity:.75;font-weight:600}
.today-hero .date{font-size:24px;font-weight:800;margin:2px 0 2px;position:relative}
.today-hero .loc{font-size:13px;opacity:.9;position:relative}
.today-hero .empty{font-size:14px;opacity:.9;margin-top:6px;line-height:1.6;position:relative}
.today-hero.weather-on{display:flex;align-items:center;justify-content:space-between;gap:10px}
.today-hero-main{min-width:0;position:relative}
.weather-chip{flex:0 0 auto;text-align:right;font-size:13px;line-height:1.25;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);border-radius:999px;padding:8px 11px;color:#fff;font-weight:800;white-space:nowrap;position:relative}
.weather-chip .city{font-size:12.5px;opacity:.9;font-weight:700;margin-right:2px}
.mini-tl{margin-top:14px;position:relative}
.mini-item{display:flex;gap:11px;align-items:flex-start;padding:6px 0}
.mini-item .mt{font-size:12.5px;font-weight:700;color:#ffd98a;min-width:46px;padding-top:1px}
.mini-item .mc{flex:1;font-size:14px;font-weight:600;line-height:1.4}
.mini-item .mc small{display:block;font-size:11.5px;font-weight:400;opacity:.75;margin-top:1px}
.mini-item .md{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);margin-top:5px;flex:0 0 auto}
.mini-item.done .mc{opacity:.5;text-decoration:line-through}
.today-jump{
  display:inline-block;margin-top:12px;background:rgba(255,255,255,.16);color:#fff;
  border:none;border-radius:10px;padding:9px 16px;font-size:13.5px;font-weight:600;
  cursor:pointer;font-family:inherit;position:relative;
}

/* 住宿卡 */
.hotel{
  background:var(--card);border-left:4px solid var(--gold);border-radius:12px;
  padding:13px 15px;margin-bottom:16px;box-shadow:var(--shadow);
}
.hotel .h-lbl{font-size:10.5px;letter-spacing:.1em;color:var(--gold);font-weight:700;margin-bottom:4px}
.hotel .h-name{font-size:15.5px;font-weight:700;margin-bottom:5px}
.hotel .h-meta{font-size:12.5px;color:var(--ink-soft);line-height:1.65;white-space:pre-line}

/* 日標題 */
.day-head{display:flex;align-items:baseline;gap:10px;margin:4px 2px 14px;padding-bottom:9px;border-bottom:2px solid var(--line)}
.day-head .num{font-size:12px;font-weight:800;color:#fff;background:var(--coral);border-radius:7px;padding:3px 9px;letter-spacing:.03em}
.day-head .date{font-size:19px;font-weight:800;color:var(--sea-deep)}
.day-head .prog{margin-left:auto;font-size:12px;color:var(--ink-faint);font-weight:600}
.trip-filter{display:flex;gap:8px;margin:10px 0 12px}
.trip-filter-btn{flex:1;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);border-radius:999px;padding:9px 10px;font-size:13px;font-weight:800}
.trip-filter-btn.on{background:var(--sea);border-color:var(--sea);color:#fff}

/* 行程項目 */
.item{background:var(--card);border-radius:13px;margin-bottom:10px;box-shadow:var(--shadow);border:1px solid var(--line);overflow:hidden;transition:.2s}
.item.checked{opacity:.62}
.item-main{display:flex;align-items:flex-start;gap:11px;padding:12px 13px}
.chk{
  flex:0 0 auto;width:24px;height:24px;border-radius:7px;border:2px solid var(--line);
  background:#fff;cursor:pointer;margin-top:2px;display:flex;align-items:center;justify-content:center;
  transition:.15s;font-size:14px;color:#fff;
}
.chk.on{background:var(--green);border-color:var(--green)}
.time{flex:0 0 auto;font-size:12.5px;font-weight:700;color:var(--coral);background:var(--coral-bg);border-radius:6px;padding:3px 7px;margin-top:1px;min-width:50px;text-align:center;line-height:1.3}
.time.blank{background:var(--line-soft);color:var(--ink-faint)}
.body{flex:1;min-width:0}
.act{font-size:15.5px;font-weight:700;line-height:1.35;word-break:break-word}
.item.checked .act{text-decoration:line-through}
.place-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:3px}
.place{font-size:14px;font-weight:600;color:var(--sea);word-break:break-word}
.tag{display:inline-block;font-size:10.5px;font-weight:700;border-radius:5px;padding:2px 6px;margin-top:5px}
.tag.food{background:#fdeee3;color:#c0562e}
.tag.shop{background:#e9f2ec;color:var(--green)}
.tag.move{background:#e7f0f2;color:var(--sea)}
.tag.stay{background:#f4ecd8;color:#9a7620}
.tag.play{background:#efeaf6;color:var(--violet)}
.snippet{font-size:12.5px;color:var(--ink-faint);margin-top:4px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}

/* 導航按鈕列 */
.nav-btns{display:flex;gap:6px;padding:0 13px 11px 48px;flex-wrap:wrap}
.nav-btn{
  display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;
  border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 10px;
  cursor:pointer;font-family:inherit;color:var(--ink-soft);text-decoration:none;transition:.15s;
}
.nav-btn:active{transform:scale(.96)}
.nav-btn.g{color:var(--sea);border-color:#bfe0e2;background:#eef8f8}
.nav-btn.t{color:var(--violet);border-color:#ddd2ee;background:#f4f0fa}
.nav-btn.u{color:#111;border-color:#ccc;background:#f4f4f4}

/* 展開詳情 */
.more-btn{
  display:inline-flex;align-items:center;gap:5px;margin:0 13px 11px 48px;
  font-size:12px;font-weight:600;color:var(--ink-faint);cursor:pointer;
  background:var(--line-soft);border:none;border-radius:8px;padding:6px 11px;font-family:inherit;
}
.more-btn .arw{transition:transform .25s;font-size:9px}
.more-btn.open .arw{transform:rotate(180deg)}
.detail{display:none;margin:0 13px 12px 48px;padding:11px 13px;background:#faf8f2;border-radius:10px;border:1px solid var(--line)}
.detail.open{display:block;animation:fade .25s ease}
.detail .sec{font-size:12.5px;line-height:1.7;white-space:pre-line;color:#3f4a50}
.detail .sec + .sec{margin-top:9px;padding-top:9px;border-top:1px dashed var(--line)}
.detail .sec-lbl{font-size:11px;font-weight:700;color:var(--coral);margin-bottom:3px;letter-spacing:.05em}
.detail .sec.move .sec-lbl{color:var(--sea)}
.detail a{word-break:break-all}
.detail .hl{background:#fdf0d5;padding:0 3px;border-radius:3px;color:#8a6416;font-weight:600}

/* 分段標籤 */
.seg{font-size:11.5px;font-weight:700;color:var(--ink-faint);letter-spacing:.12em;margin:18px 2px 8px;display:flex;align-items:center;gap:8px}
.seg::before,.seg::after{content:"";height:1px;background:var(--line);flex:1}

/* ===== 分帳 ===== */
.split-intro{font-size:13px;color:var(--ink-soft);margin-bottom:14px;line-height:1.6}
.card{background:var(--card);border-radius:13px;padding:15px;box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:13px}
.card h3{font-size:14.5px;color:var(--sea-deep);margin-bottom:12px;font-weight:700;display:flex;align-items:center;gap:7px}
.people-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:6px}
.pchip{background:var(--sea);color:#fff;border-radius:16px;padding:5px 11px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.pchip .x{cursor:pointer;opacity:.7;font-weight:700}
.inline-add{display:flex;gap:7px;margin-top:8px}
.inline-add input{flex:1;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:16px;font-family:inherit;background:#fff}
.inline-add input:focus{outline:none;border-color:var(--sea)}
.btn{background:var(--sea);color:#fff;border:none;border-radius:9px;padding:9px 15px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn.ghost{background:#fff;color:var(--sea);border:1px solid var(--sea)}
.btn.coral{background:var(--coral)}
.btn.sm{padding:7px 12px;font-size:12.5px}
.btn.block{width:100%;margin-top:4px}

.exp-item{padding:11px 0;border-top:1px dashed var(--line)}
.exp-item:first-child{border-top:none}
.exp-item .er1{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.exp-item .edesc{font-weight:600;font-size:14px}
.exp-item .eamt{font-weight:700;color:var(--coral);white-space:nowrap;font-size:14px}
.exp-item .er2{font-size:11.5px;color:var(--ink-faint);margin-top:3px}
.exp-item .edel{font-size:11px;color:var(--ink-faint);cursor:pointer;margin-top:5px;display:inline-block}

.result-card{background:linear-gradient(140deg,var(--sea-deep),var(--sea));color:#fff}
.result-card h3{color:#fff}
.bal-row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;border-top:1px solid rgba(255,255,255,.15)}
.bal-row:first-of-type{border-top:none}
.bal-row .who{font-weight:600}
.bal-row .num{font-weight:700}
.bal-row .num.pos{color:#8ff0a8}
.bal-row .num.neg{color:#ffb59e}
.settle{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.2)}
.settle .s-line{font-size:13.5px;padding:6px 0;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.settle .s-line b{color:#ffd98a}

.field{margin-bottom:11px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px}
.field input,.field select{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 11px;font-size:16px;font-family:inherit;background:#fff}
.field input:focus,.field select:focus{outline:none;border-color:var(--sea)}
.payer-grid{display:flex;flex-wrap:wrap;gap:6px}
.payer-opt{border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;background:#fff;font-weight:600;color:var(--ink-soft)}
.payer-opt.on{background:var(--sea);color:#fff;border-color:var(--sea)}
.split-with{display:flex;flex-wrap:wrap;gap:6px}
.sw-opt{border:1px solid var(--line);border-radius:8px;padding:6px 11px;font-size:12.5px;cursor:pointer;background:#fff;font-weight:600;color:var(--ink-soft);display:flex;align-items:center;gap:5px}
.sw-opt.on{background:#e9f2ec;color:var(--green);border-color:var(--green)}

.empty-state{text-align:center;padding:30px 20px;color:var(--ink-faint);font-size:13.5px;line-height:1.7}

/* ===== 底部導覽 ===== */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:70;background:rgba(255,253,248,.96);
  backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;
  height:calc(var(--tabbar-height) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);
}
.tabbar-btn{
  flex:1;height:var(--tabbar-height);background:none;border:none;cursor:pointer;padding:8px 0 7px;font-family:inherit;
  display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--ink-faint);font-size:12px;font-weight:600;
}
.tabbar-btn .ic{font-size:24px;line-height:1}
.tabbar-btn.active{color:var(--sea)}

.totop{
  position:fixed;right:14px;bottom:calc(74px + env(safe-area-inset-bottom));width:42px;height:42px;
  border-radius:50%;background:var(--sea-deep);color:#fff;border:none;font-size:19px;cursor:pointer;
  z-index:65;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.3s;
  display:flex;align-items:center;justify-content:center;
}
.totop.show{opacity:.9;pointer-events:auto}

.toast{
  position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--sea-deep);color:#fff;padding:11px 18px;border-radius:22px;font-size:13.5px;font-weight:600;
  z-index:90;opacity:0;pointer-events:none;transition:.3s;box-shadow:var(--shadow-lg);white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.has-action{pointer-events:auto;display:flex;align-items:center;gap:12px}
.toast-action{border:0;background:rgba(255,255,255,.16);color:#fff;border-radius:999px;padding:4px 9px;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer}
.toast-action:active{transform:scale(.96)}

.loading{text-align:center;padding:50px 20px;color:var(--ink-faint)}
.spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--sea);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== V1 元件 ===== */
.chip-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.drive-chip{display:inline-block;font-size:10.5px;font-weight:700;border-radius:5px;padding:2px 7px;margin-top:5px;background:#e7f0f2;color:var(--sea)}
.qa-row{display:flex;gap:7px;padding:0 13px 12px 48px;flex-wrap:wrap}
.qa-btn{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:700;border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 13px;cursor:pointer;font-family:inherit;color:var(--ink-soft);text-decoration:none;transition:.15s;min-height:38px}
.qa-btn:active{transform:scale(.96)}
.qa-btn.drv{color:#fff;border-color:var(--sea);background:var(--sea)}
.qa-btn.pk{color:#1256a0;border-color:#bcd6f0;background:#eaf3fc}
.qa-btn.nf{color:#9a7620;border-color:#e8d9ae;background:#faf3df}
.qa-btn.fr{color:#0e6d8c;border-color:#b8dde9;background:#e8f6fb}
.qa-btn.sp{color:var(--green);border-color:#c4dccd;background:#edf5f0}
.qa-btn.mo{color:var(--ink-faint);border-color:var(--line);background:var(--line-soft)}
.qa-btn.on{outline:2px solid currentColor;outline-offset:-2px}
.panel{display:none;margin:0 13px 12px 48px;padding:12px 13px;background:#faf8f2;border-radius:11px;border:1px solid var(--line)}
.panel.open{display:block;animation:fade .25s ease}
.mapcode-box{display:flex;justify-content:space-between;align-items:center;gap:10px;background:#0e3a44;color:#fff;border-radius:10px;padding:11px 13px;margin-bottom:9px}
.mapcode-open{cursor:pointer}
.mapcode-open:active{transform:scale(.99)}
.mc-lbl{font-size:10px;opacity:.7;letter-spacing:.05em}
.mc-val{font-size:18px;font-weight:800;letter-spacing:.04em;font-variant-numeric:tabular-nums}
.mapcode-fullscreen{position:fixed;inset:0;z-index:120;background:rgba(6,32,38,.96);color:#fff;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
.mapcode-fullscreen .mapcode-dialog{width:100%;max-width:360px}
.mapcode-fullscreen .mapcode-label{font-size:13px;font-weight:900;letter-spacing:.16em;opacity:.7;margin-bottom:14px}
.mapcode-fullscreen .mapcode-value{font-size:clamp(38px,13vw,64px);font-weight:950;line-height:1.08;letter-spacing:.04em;font-variant-numeric:tabular-nums;word-break:break-word}
.mapcode-fullscreen .mapcode-hint{margin-top:18px;font-size:13px;font-weight:700;opacity:.62}

<script>
/* ===== schema.js(部署為獨立檔)===== */
/* ============================================================
   schema.js — 唯一資料規格(Single Source of Truth)
   ============================================================
   整個 App 的資料層都依賴這份 Schema:
   - Google Sheet 欄位定義(header + aliases)
   - Parser 動態解析(不再硬編碼欄位)
   - Validator 同步時檢查缺漏/未知欄位
   - schemaDoc() 自動產生對照文件

   ▍新增欄位 SOP(不用改 Parser):
   1. Google Sheet 加欄
   2. 本檔對應 sheet 的 columns 加一筆 { field, header, aliases?, required?, desc }
   3. UI 要顯示新欄位時才需要動渲染層
   ============================================================ */

var SCHEMA = {
  version: '2.5 (2026-07-17)',

  /* 發布來源(換試算表只改這裡) */
  pubBase: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRenmV8UxEzWbzSjKJKi4rSpYt63geBqhEkKsl1GemWVPmFKTcvv3Uk71Hjla3TGBpGIjC7bQDDdI00/pub?single=true&output=csv&gid=',

  sheets: {

    /* ── 行程總表:固定 7 欄位置式解析 ── */

      gid: '1169222358', label: '行程總表', kind: 'itinerary',

    /* ── Places 地點主表 ── */
    places: {
      gid: '1089684162', label: 'Places', kind: 'table', idField: 'placeId',
      columns: [
        { field:'placeId', header:'PID',           aliases:['placeid','地點id'], required:true, desc:'地點唯一ID(P001…),不得重複' },

    rest: {
      gid: '1421821084', label: 'Restaurants', kind: 'table', idField: 'restId',
      columns: [
        { field:'restId',  header:'RID',        aliases:['restid','餐廳id'], required:true, desc:'餐廳唯一ID(R001…)' },
        { field:'placeId', header:'PID(可空白)', aliases:['pid','placeid'],  desc:'所屬地點;掛上後該地點卡自動列出' },
        { field:'name',    header:'餐廳名稱',    aliases:['店名','名稱'],     required:true },
        { field:'rating',  header:'Tabelog',    aliases:['評分'], desc:'數字自動顯示為「Tabelog X.XX」' },

        { field:'hours',   header:'營業時間' },

        { field:'travel',  header:'交通時間',    desc:'開車/步行時間' },
        { field:'pnote',   header:'停車' },
        { field:'note',    header:'備註' }
      ]
    },

    /* ── Shopping 商店表 ── */
    shop: {
      gid: '1182059264', label: 'Shopping', kind: 'table', idField: 'shopId',
      columns: [
        { field:'shopId',  header:'SID',      aliases:['shopid','商店id'], required:true, desc:'商店唯一ID(S001…)' },
        { field:'placeId', header:'PID',      aliases:['placeid'],         required:true, desc:'所屬商場(Places.PID)' },
        { field:'name',    header:'品牌名稱', aliases:['店名','名稱'],      required:true },
        { field:'floor',   header:'樓層',     required:true, desc:'購物頁樓層摺疊依據' },
        { field:'cat',     header:'分類' },
        { field:'must',    header:'必逛',     desc:'填「是」顯示必逛徽章' },
        { field:'taxfree', header:'免稅',     desc:'填「是」顯示免稅徽章' },
        { field:'note',    header:'備註',     desc:'「櫃位 XXX」會顯示於店名旁' }
      ]
    },

    /* ── Hotels 住宿表 ── */
    hotels: {
      gid: '792115203', label: 'Hotels', kind: 'table', idField: 'hotelId',
      columns: [
        { field:'hotelId', header:'HID', aliases:['hotelid','住宿id'], required:true },
        { field:'name',    header:'名稱', required:true, desc:'以名稱比對 Places 住宿型地點' },
        { field:'checkin', header:'入住' },
        { field:'checkout',header:'退房' },
        { field:'addr',    header:'地址' },
        { field:'pnote',   header:'停車' },
        { field:'dates',   header:'適用日期' },
        { field:'note',    header:'備註' }
      ]
    },

    /* ── Expenses 支出表:自由格式(非欄位表) ── */
    exp: {

        catCol: 0,                    // 類別(交通/住宿/門票…,僅此欄有值=類別列)
        nameCol: 1,                   // 明細
        twdCol: 4,                    // $台幣
        jpyCol: 5,                    // ¥日幣
        noteCol: 6,                   // 備註
        totalMarks: ['小計','總計']   // 合計列
      },
      desc: '行前團費。旅途記帳在 App 端(localStorage),兩者於分帳頁並列不重複計算。同行成員自動帶入分帳成員(首次)。'
    },

    /* ── Ledger 分帳紀錄 ── */
    ledger: {
      gid: '896856089', label: '分帳紀錄', kind: 'table', idField: 'id',
      columns: [
        { field:'id',        header:'紀錄ID', required:true, desc:'時間戳-4位隨機;append-only 去重鍵' },
        { field:'time',      header:'時間',                 desc:'ISO 8601 寫入時間' },
        { field:'member',    header:'成員',   required:true, desc:'寫入當下的成員身分' },
        { field:'category',  header:'類別' },
        { field:'detail',    header:'明細' },
        { field:'amountJpy', header:'日幣',   required:true, desc:'日幣金額;沖銷紀錄為負數' },
        { field:'amountTwd', header:'台幣',                 desc:'台幣金額;沖銷紀錄為負數' },
        { field:'note',      header:'備註' }
      ]
    },

    /* ── TripConfig 設定表:Key/Value ── */
    cfg: {
      gid: '1070234314', label: 'TripConfig', kind: 'keyvalue',
      keys: [
        { field:'tripname',   header:'Trip Name',   desc:'顯示於頂欄標題' },
        { field:'startdate',  header:'Start Date' },
        { field:'enddate',    header:'End Date' },
        { field:'travelmode', header:'Travel Mode', aliases:['transport','交通模式'],
          values:{ 'driving':'drive','drive':'drive','自駕':'drive','開車':'drive',
                   'transit':'transit','train':'transit','電車':'transit','大眾運輸':'transit' },
          desc:'Driving→drive(🚗導航+停車卡);Transit/Train→transit(🚃路線)' },
        { field:'currency',   header:'Currency' },
        { field:'exchangeRate', header:'Exchange Rate', desc:'1 JPY 對應的 TWD 金額;必須大於 0' },
        { field:'ledgerDefaultCurrency', header:'Ledger Default Currency',
          values:{'JPY':'JPY','jpy':'JPY','TWD':'TWD','twd':'TWD'},
          desc:'分帳預設輸入幣別;只允許 JPY/TWD' },
        { field:'homepage',   header:'Home Page',   desc:'預設分頁(⚠️ 目前**未啟用**,App 固定 Today;填寫無效果)' }
      ]
    }
  }
};

/* ── 由 Schema 自動產生對照文件(Markdown) ── */
function schemaDoc(){
  var md = '# CMS ↔ App 欄位對照(由 schema.js 自動產生)\n\n版本:' + SCHEMA.version + '\n';
  Object.keys(SCHEMA.sheets).forEach(function(k){
    var s = SCHEMA.sheets[k];
    md += '\n## ' + s.label + '(gid=' + s.gid + ',kind=' + s.kind + ')\n';
    if(s.columns){
      md += '| Google Sheet 欄位 | App Property | 必填 | 說明 |\n|---|---|---|---|\n';
      s.columns.forEach(function(c){
        var h = c.header + (c.aliases ? '(別名:' + c.aliases.join('/') + ')' : '');
        md += '| ' + h + ' | ' + c.field + ' | ' + (c.required?'✅':'') + ' | ' + (c.desc||'') + ' |\n';
      });
    }
    if(s.keys){
      md += '| Key | App Property | 說明 |\n|---|---|---|\n';
      s.keys.forEach(function(c){
        var h = c.header + (c.aliases ? '(別名:' + c.aliases.join('/') + ')' : '');
        md += '| ' + h + ' | ' + c.field + ' | ' + (c.desc||'') + ' |\n';
      });
    }
    if(s.layout){
      md += '自由格式:成員列標記「' + s.layout.membersRowMark + '」;欄位位置 → 類別[' + s.layout.catCol + '] 明細[' + s.layout.nameCol + '] 台幣[' + s.layout.twdCol + '] 日幣[' + s.layout.jpyCol + '] 備註[' + s.layout.noteCol + ']';
      if(s.layout.totalMarks) md += ';合計列標記「' + s.layout.totalMarks.join('/') + '」';
      md += '\n';
    }
    if(s.desc) md += '> ' + s.desc + '\n';
  });
  return md;
}
if(typeof window !== 'undefined') window.schemaDoc = schemaDoc;

</script>
<script>
/* ===== validator.js(部署為獨立檔)===== */
/* ============================================================
   validator.js — 自體防錯防線(Guardrails)
   ============================================================
   職責:
   1. AppLog:六類錯誤日誌,格式固定「[分類] 訊息」,
      AI Debug 時看一眼 console 即可定位,不需貼整段程式碼
   2. 表頭驗證(buildHeaderMap):缺必填欄/未知欄位 → 警告不崩潰
   3. healthCheck():資料一致性健康報告(重複ID/懸空引用/型別覆蓋)
   依賴:schema.js(SCHEMA 必須先載入)
   ============================================================ */

/* ---- 六類錯誤日誌 ---- */
var AppLog = {
  schema: function(msg){ console.warn('[Schema Error] ' + msg); },
  parser: function(msg){ console.warn('[Parser Error] ' + msg); },
  data:   function(msg){ console.warn('[Data Error] ' + msg); },
  repo:   function(msg){ console.warn('[Repository Error] ' + msg); },
  render: function(msg){ console.error('[Render Error] ' + msg); },
  sync:   function(msg){ console.warn('[Sync Error] ' + msg); }
};

/* ---- 表頭正規化 ---- */
function normH(h){ return String(h||'').trim().toLowerCase().replace(/\s+/g,''); }
function normHBase(h){ return normH(h).replace(/[（(].*?[)）]/g,''); }

/* ---- 表頭驗證與對照(Schema 驅動) ---- */
function buildHeaderMap(rows, def){
  var result = { map:{}, headerIdx:-1, blockers:[], warnings:[] };
  var best = { idx:-1, hits:0 };
  for(var i=0;i<Math.min(rows.length,10);i++){
    var hits = 0;
    (rows[i]||[]).forEach(function(cell){
      var h = normHBase(cell);
      if(!h) return;
      def.columns.forEach(function(c){
        var cand = [c.header].concat(c.aliases||[]).map(normHBase);
        if(cand.indexOf(h)>=0) hits++;
      });
    });
    if(hits > best.hits){ best = { idx:i, hits:hits }; }
  }
  if(best.idx < 0 || best.hits === 0){
    var missingHeaderMessage = def.label + ':找不到表頭列 — 請確認工作表第一列為欄位名稱';
    AppLog.schema(missingHeaderMessage);
    result.blockers.push(makeValidationFinding('blocker','HEADER_MISSING',def.label,missingHeaderMessage));
    return result;
  }
  result.headerIdx = best.idx;
  rows[best.idx].forEach(function(cell, idx){
    var h = normHBase(cell);
    if(!h) return;
    var matched = null;
    def.columns.forEach(function(c){
      if(matched) return;
      var cand = [c.header].concat(c.aliases||[]).map(normHBase);
      if(cand.indexOf(h)>=0) matched = c.field;
    });
    if(matched){ if(!(matched in result.map)) result.map[matched] = idx; }
    else{
      var unknownMessage = def.label + ':未知欄位「' + cell + '」(第' + (idx+1) + '欄) — 已忽略;若為新欄位請更新 schema.js';
      AppLog.schema(unknownMessage);
      result.warnings.push(makeValidationFinding('warning','HEADER_UNKNOWN',def.label,unknownMessage));
    }
  });
  def.columns.forEach(function(c){
    if(c.required && !(c.field in result.map)){
      var requiredMessage = def.label + ":Missing required field '" + c.header + "'(" + c.field + ") — 相關卡片可能無法顯示";
      AppLog.schema(requiredMessage);
      result.blockers.push(makeValidationFinding('blocker','HEADER_REQUIRED',def.label,requiredMessage));
    }
  });
  return result;
}

function makeValidationFinding(level,code,sheet,message){
  return { level:level, code:code, sheet:sheet||'', message:String(message||'') };
}

function sameDisplayName(a,b){
  var left=String(a||'').toLowerCase().replace(/\s+/g,'');
  var right=String(b||'').toLowerCase().replace(/\s+/g,'');
  return !!(left&&right&&(left.indexOf(right)>=0||right.indexOf(left)>=0));
}

function validateSnapshotData(db,raw,schema){
  var result={blockers:[],warnings:[]}, sheets=(schema&&schema.sheets)||{};
  function block(code,sheet,message){ result.blockers.push(makeValidationFinding('blocker',code,sheet,message)); }
  function warn(code,sheet,message){ result.warnings.push(makeValidationFinding('warning',code,sheet,message)); }
  function ids(list,field,sheet){
    var seen={};
    (list||[]).forEach(function(row){
      var id=String(row&&row[field]||'').toUpperCase().trim();
      if(!id) return;
      if(seen[id]) block('DUPLICATE_ID',sheet,'重複ID:' + sheet + ' ' + id);
      seen[id]=true;
    });
    return seen;
  }
  Object.keys(sheets).forEach(function(key){
    if(!raw||!raw[key]||String(raw[key]).trim().length<5){
      block('SHEET_MISSING',key,'資料缺席:工作表 ' + sheets[key].label + ' 無任何資料來源(內建/快取/線上皆空)');
    }
  });
  db=db&&typeof db==='object'&&!Array.isArray(db)?db:{};
  function validObjects(list,sheet,label){
    var valid=[];
    list.forEach(function(row,index){
      if(!row||typeof row!=='object'||Array.isArray(row)){
        block('DB_STRUCTURE',sheet,label + ' 第 ' + (index+1) + ' 筆必須是物件');
      }else{
        valid.push(row);
      }
    });
    return valid;
  }
  function validList(field,sheet){
    if(!Array.isArray(db[field])){
      block('DB_STRUCTURE',sheet,field + ' 必須是陣列');
      return [];
    }
    return validObjects(db[field],sheet,field);
  }
  var placeList=validList('placeList','places');
  var restList=validList('rest','rest');
  var shopList=validList('shop','shop');
  var hotelList=validList('hotels','hotels');
  function boundedValue(value,maxLength){ return String(value||'').slice(0,maxLength); }
  function requiredValues(list,key){
    var def=sheets[key]||{}, columns=def.columns||[], idField=def.idField;
    (list||[]).forEach(function(row,index){
      var identity=String(idField&&row[idField]||'').trim()||('row ' + (index+1));
      columns.forEach(function(column){
        if(column.required&&!String(row[column.field]||'').trim()){
          var message=boundedValue(def.label||key,30) + ' ' + boundedValue(identity,30) + ": missing required '" + boundedValue(column.header||column.field,30) + "' (" + boundedValue(column.field,24) + ')';
          block('REQUIRED_VALUE',key,message);
        }
      });
    });
  }
  requiredValues(placeList,'places');
  requiredValues(restList,'rest');
  requiredValues(shopList,'shop');
  requiredValues(hotelList,'hotels');
  var tripDays=[];
  if(!db.trip||typeof db.trip!=='object'||Array.isArray(db.trip)){
    block('DB_STRUCTURE','itin','trip 必須是物件');
  }else if(!Array.isArray(db.trip.days)||!db.trip.days.length){
    block('DB_STRUCTURE','itin','trip.days 必須是非空陣列');
  }else{
    tripDays=validObjects(db.trip.days,'itin','trip.days');
  }
  var cfg=null;
  if(!db.cfg||typeof db.cfg!=='object'||Array.isArray(db.cfg)){
    block('DB_STRUCTURE','cfg','cfg 必須是物件');
  }else{
    cfg=db.cfg;
  }
  var pids=ids(placeList,'placeId','places');
  var rids=ids(restList,'restId','rest');
  ids(shopList,'shopId','shop');
  ids(hotelList,'hotelId','hotels');
  var typeColumn=null;
  ((sheets.places&&sheets.places.columns)||[]).forEach(function(column){ if(column.field==='type') typeColumn=column; });
  var typeValues=typeColumn&&typeColumn.values||{};
  placeList.forEach(function(place){
    var rawType=String(place.type||'').trim();
    if(rawType&&!typeValues[rawType]&&!typeValues[rawType.toLowerCase()]){
      block('UNKNOWN_PLACE_TYPE','places','未註冊型別:' + place.placeId + ' 型別「' + rawType + '」無對應卡片渲染');
    }
  });
  restList.forEach(function(rest){
    var pid=String(rest.placeId||'').toUpperCase().trim();
    if(pid&&!pids[pid]) block('BROKEN_REF','rest','懸空引用:Restaurants ' + rest.restId + ' → ' + pid + ' 不存在於 Places');
  });
  shopList.forEach(function(shop){
    var pid=String(shop.placeId||'').toUpperCase().trim();
    if(pid&&!pids[pid]) block('BROKEN_REF','shop','懸空引用:Shopping ' + shop.shopId + ' → ' + pid + ' 不存在於 Places');
  });
  tripDays.forEach(function(day,dayIndex){
    if(!Array.isArray(day.items)){
      block('DB_STRUCTURE','itin','trip.days 的每一天都必須包含 items 陣列');
      return;
    }
    validObjects(day.items,'itin','trip.days[' + dayIndex + '].items').forEach(function(item){
      var ref=String(item.ref||'').toUpperCase().trim(), linked=null;
      if(/^P\d+/.test(ref)&&!pids[ref]) block('BROKEN_REF','itin','懸空引用:行程 ' + day.date + '「' + item.act + '」→ ' + ref + ' 不存在於 Places');
      if(/^R\d+/.test(ref)){
        if(!rids[ref]) block('BROKEN_REF','itin','懸空引用:行程 ' + day.date + '「' + item.act + '」→ ' + ref + ' 不存在於 Restaurants');
        linked=restList.filter(function(rest){return String(rest.restId||'').toUpperCase()===ref;})[0]||null;
        if(linked&&item.place&&linked.name&&!sameDisplayName(item.place,linked.name)){
          block('REF_NAME_MISMATCH','itin','引用名稱不一致:行程 ' + day.date + '「' + item.place + '」→ ' + ref + '「' + linked.name + '」');
        }
      }
    });
  });
  if(cfg){
    ['tripname','startdate','enddate','travelmode'].forEach(function(field){
      if(!String(cfg[field]||'').trim()) block('CFG_REQUIRED','cfg','TripConfig 缺少 ' + field);
    });
    function isoDateValue(value){
      var match=/^(\d{4})-(\d{2})-(\d{2})$/.exec(String(value||'').trim());
      if(!match) return null;
      var year=Number(match[1]), month=Number(match[2]), day=Number(match[3]);
      var leap=year%4===0&&(year%100!==0||year%400===0);
      var monthDays=[31,leap?29:28,31,30,31,30,31,31,30,31,30,31];
      if(year<1||month<1||month>12||day<1||day>monthDays[month-1]) return null;
      return year*10000+month*100+day;
    }
    var startText=String(cfg.startdate||'').trim(), endText=String(cfg.enddate||'').trim();
    var startValue=startText?isoDateValue(startText):null, endValue=endText?isoDateValue(endText):null;
    if(startText&&startValue===null) block('CFG_DATE','cfg','TripConfig startdate 必須是有效的 YYYY-MM-DD 日期');
    if(endText&&endValue===null) block('CFG_DATE','cfg','TripConfig enddate 必須是有效的 YYYY-MM-DD 日期');
    if(startValue!==null&&endValue!==null&&endValue<startValue) block('CFG_DATE','cfg','TripConfig enddate 不得早於 startdate');
    var mode=String(cfg.travelmode||'').trim().toLowerCase();
    if(mode&&mode!=='drive'&&mode!=='transit') block('CFG_TRAVELMODE','cfg','TripConfig travelmode 必須是 drive 或 transit');
    var exchangeRate=Number(cfg.exchangeRate);
    if(!String(cfg.exchangeRate||'').trim()||!isFinite(exchangeRate)||exchangeRate<=0){
      block('CFG_EXCHANGE_RATE','cfg','TripConfig exchangeRate 必須是大於 0 的數字');
    }
    var ledgerCurrency=String(cfg.ledgerDefaultCurrency||'').trim().toUpperCase();
    if(ledgerCurrency!=='JPY'&&ledgerCurrency!=='TWD'){
      block('CFG_LEDGER_CURRENCY','cfg','TripConfig ledgerDefaultCurrency 必須是 JPY 或 TWD');
    }
  }
  return result;
}

/* ---- 專案健康檢查(資料一致性) ----
   回傳 findings 陣列並輸出報告;AI 每次交付前必跑 */
function healthCheck(){
  var validation = validateSnapshotData(DB,RAW,SCHEMA);
  var findings = validation.blockers.concat(validation.warnings);
  /* 輸出報告 */
  if(findings.length){
    console.warn('━━ Project Health Check:發現 ' + findings.length + ' 項 ━━');
    findings.forEach(function(f){ AppLog.data(f.message); });
  }else{
    console.log('━━ Project Health Check:PASS(資料一致性無異常)━━');
  }
  return findings.map(function(f){ return f.message; });
}
if(typeof window !== 'undefined') window.healthCheck = healthCheck;

function escapeHtml(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function jsString(s){ return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/\r/g,''); }

function appNow(){
  var sim=lsGet('trip_time_simulation',null);
  if(sim&&sim.mode==='offset'&&typeof sim.offsetMs==='number') return new Date(Date.now()+sim.offsetMs);
  if(sim&&sim.mode==='custom'&&sim.value){
    var custom=new Date(sim.value);
    if(!isNaN(custom.getTime())) return custom;
  }
  try{
    var q=new URLSearchParams(window.location.search||'');
    var pd=q.get('previewDate');
    if(pd&&/^\d{4}-\d{2}-\d{2}$/.test(pd)){
      var d=new Date(pd+'T09:00:00');
      if(!isNaN(d.getTime())) return d;
    }
  }catch(e){}
  return new Date();
}

var toastTimer, toastAction=null;
function clearToast(){
  var el=document.getElementById('toast');
  if(!el) return;
  el.classList.remove('show','has-action');
  el.textContent='';
  toastAction=null;
}
function runToastAction(){
  if(!toastAction) return;
  var fn=toastAction;
  clearTimeout(toastTimer);
  clearToast();
  fn();
}
function toast(msg,actionText,actionFn){
  var el=document.getElementById('toast');
  toastAction=typeof actionFn==='function'?actionFn:null;
  if(toastAction){
    el.innerHTML='<span>'+escapeHtml(msg)+'</span><button class="toast-action" onclick="runToastAction()">'+escapeHtml(actionText||'復原')+'</button>';
    el.classList.add('has-action');
  }else{
    el.textContent=msg;
    el.classList.remove('has-action');
  }
  el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(clearToast,toastAction?3500:2000);
}
function copyText(text,label){
  var done=function(){ toast((label||'')+'已複製 ✓'); };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(function(){ legacyCopy(text,done); });
  }else legacyCopy(text,done);
}
function legacyCopy(text,done){
  try{
    var ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done();
  }catch(e){ toast('複製失敗，請長按手動複製'); }
}

/* ================= CSV 解析 ================= */
function parseCSV(text){
  var rows=[],row=[],field='',inQ=false;
  for(var i=0;i<text.length;i++){
    var c=text[i],n=text[i+1];
    if(inQ){
      if(c==='"'&&n==='"'){ field+='"'; i++; }
      else if(c==='"') inQ=false;
      else field+=c;
    }else{
      if(c==='"') inQ=true;
      else if(c===','){ row.push(field); field=''; }
      else if(c==='\r'){}
      else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else field+=c;
    }
  }
  if(field.length||row.length){ row.push(field); rows.push(row); }
  return rows;
}

/* ================= 表格 → 物件(依表頭名稱對應,容錯欄位順序) ================= */
/* ============================================================
   Schema 驅動 Parser + Validator
   欄位對應完全來自 schema.js;新增欄位只改 Schema,不改這裡
   ============================================================ */
/* normH / normHBase / buildHeaderMap 已抽離至 validator.js(防錯防線) */

/* 表格型解析:rows → 物件陣列(欄位名 = Schema field) */
function parseTable(csvText, sheetKey){
  var def = SCHEMA.sheets[sheetKey];
  var rows = parseCSV(csvText||'');
  var hm = buildHeaderMap(rows, def);   // 驗證與警告由 validator.js 處理
  if(hm.headerIdx < 0) return [];
  var out = [];
  for(var r=hm.headerIdx+1; r<rows.length; r++){
    var row = rows[r]; if(!row) continue;
    var o = {}, any = false;
    for(var f in hm.map){
      var v = (row[hm.map[f]]||'').trim();
      o[f] = v; if(v) any = true;
    }
    if(any) out.push(o);
  }
  return out;
}

/* Key/Value 型解析(TripConfig):依 Schema keys 正規化 */
function parseKeyValue(csvText, sheetKey){
  var def = SCHEMA.sheets[sheetKey];
  var rows = parseCSV(csvText||'');
  var cfg = {};
  rows.forEach(function(r){
    var k = normHBase(r[0]), v = (r[1]||'').trim();
    if(!k || k==='key') return;
    var matched = null;
    (def.keys||[]).forEach(function(kd){
      if(matched) return;
      var cand = [kd.header].concat(kd.aliases||[]).map(normHBase);
      if(cand.indexOf(k)>=0) matched = kd;
    });
    if(!matched){ AppLog.schema(def.label+':未知設定鍵「'+(r[0]||'')+'」— 已忽略;若為新設定請更新 schema.js'); return; }
    if(matched.values){
      var nv = matched.values[normH(v)] || matched.values[v];
      if(nv) v = nv;
      else if(v) AppLog.schema(def.label+':「'+matched.header+'」的值「'+v+'」不在 Schema 定義中,原樣使用');
    }
    cfg[matched.field] = v;
  });
  return cfg;
}

/* 型別正規化:對照 Places.Type 欄的 Schema values;未知值警告並回退景點 */
function schemaType(raw){
  var col = null;
  SCHEMA.sheets.places.columns.forEach(function(c){ if(c.field==='type') col = c; });
  var v = (col && col.values && (col.values[String(raw||'').trim()] || col.values[normH(raw)])) || null;
  if(!v && raw){ AppLog.schema("Places:未知型別「"+raw+"」— 以「景點」處理;請更新 schema.js 的 type.values"); }
  return v || 'attraction';
}

/* ================= 行程解析(7欄:日期/時間/活動/地點/ID/交通/備註) ================= */
function buildItin(rows){
  var meta={ title:'' }, days=[], cur=null;
  var dayRe=/第.+天\s*(\d{1,2})\/(\d{1,2})\s*[\(（]?([日一二三四五六])?/;
  rows.forEach(function(r,idx){
    var c=[]; for(var i=0;i<7;i++) c.push((r[i]||'').trim());
    if(idx===0&&c[0]&&!meta.title){ meta.title=c[0]; return; }
    if(c[0]==='飯店') return;
    if(c[0]==='日期'&&c[1]==='時間') return;
    var dtext=c[0]||c[1];
    var m=dtext.match(dayRe);
    if(/第.+天/.test(dtext)&&m){
      cur={ date:m[1].padStart(2,'0')+'/'+m[2].padStart(2,'0'), dow:m[3]||'', items:[] };
      days.push(cur);
      if(!c[2]&&!c[3]) return;
    }
    if(!cur) return;
    var it={ time:c[1], act:c[2], place:c[3], ref:c[4], move:c[5], note:c[6] };
    if(!it.act&&!it.place&&!it.move&&!it.note) return;
    cur.items.push(it);
  });
  days.forEach(function(d){ d.items.forEach(function(it,i){ it.id=d.date+'_'+i; }); });
  return { meta:meta, days:days };
}

/* ================= 網路(相容模式:無 AbortController) ================= */
function fetchWithTimeout(url,ms){
  var bust=url+'&_ts='+Date.now();
  var timeout=new Promise(function(_,rej){ setTimeout(function(){ rej(new Error('連線逾時')); },ms); });
  var attempt=new Promise(function(resolve,reject){
    var p;
    try{ p=fetch(bust,{cache:'no-store'}); }catch(e){ p=null; }
    if(!p){ try{ p=fetch(bust); }catch(e2){ reject(e2); return; } }
    p.then(resolve).catch(function(err){
      if(/clone|DataCloneError/i.test(String(err))){
        try{ fetch(bust).then(resolve).catch(reject); }catch(e3){ reject(e3); }
      }else reject(err);
    });
  });
  return Promise.race([attempt,timeout]);
}
function fetchSheet(s){
  var tryOnce=function(){
    return fetchWithTimeout(PUB+s.gid,FETCH_TIMEOUT).then(function(res){
      if(!res.ok) throw new Error('HTTP '+res.status);
      return res.text();
    }).then(function(text){
      if(!text||text.trim().length<5) throw new Error('CSV為空');
      return text;
    });
  };
  return tryOnce().catch(function(e){
    AppLog.sync(s.key+' 第1次抓取失敗:'+(e.message||e)+' — 自動重試');
    return tryOnce();
  });
}

var RAW={};      // key → csv text(目前生效)
var SRC={};      // key → builtin|cache|online
var SNAPSHOT_STATE_KEY='trip_data_snapshot_state';
var SNAPSHOT_FAILURE_KEY='trip_sync_last_failure';
var SNAPSHOT_FORMAT_VERSION=1;
var CURRENT_SNAPSHOT=null;

function createDataSnapshot(raw,source,createdAt,generationId,validation){
  var sheets={};
  SHEETS.forEach(function(sheet){ sheets[sheet.key]=String(raw[sheet.key]||''); });
  return {formatVersion:1,generationId:generationId,createdAt:createdAt,source:source,sheets:sheets,sheetMeta:{},validation:{warnings:(validation&&validation.warnings)||[]}};
}
function hydrateSnapshotLedger(snapshot){
  if(!snapshot||!snapshot.sheets||!SCHEMA.sheets.ledger||typeof snapshot.sheets.ledger==='string') return snapshot;
  var hydrated=JSON.parse(JSON.stringify(snapshot));
  hydrated.sheets.ledger=BUILTIN.ledger;
  hydrated.sheetMeta=hydrated.sheetMeta||{};
  hydrated.sheetMeta.ledger={source:'builtin-migration',migratedAt:Date.now()};
  return hydrated;
}
function validSnapshotShape(snapshot){
  if(!snapshot||snapshot.formatVersion!==1||!snapshot.generationId||!snapshot.sheets) return false;
  return SHEETS.every(function(sheet){return typeof snapshot.sheets[sheet.key]==='string'&&snapshot.sheets[sheet.key].trim().length>=5;});
}
function readSnapshotState(storage){
  try{
    var raw=storage.getItem(SNAPSHOT_STATE_KEY), state=raw?JSON.parse(raw):null;
    if(!state||state.formatVersion!==1) return null;
    state.active=typeof hydrateSnapshotLedger==='function'?hydrateSnapshotLedger(state.active):state.active;
    state.previous=typeof hydrateSnapshotLedger==='function'?hydrateSnapshotLedger(state.previous):state.previous;
    return state;
  }catch(e){ return null; }
}
function nextSnapshotState(current,candidate,effectiveSnapshot){
  var previous=validSnapshotShape(effectiveSnapshot)?effectiveSnapshot:null;
  if(!previous&&current&&validSnapshotShape(current.active)) previous=current.active;
  return {formatVersion:1,active:candidate,previous:previous};
}
function writeSnapshotState(storage,nextState){
  var serialized=JSON.stringify(nextState);
  var parsed=JSON.parse(serialized);
  if(!parsed||parsed.formatVersion!==1||!validSnapshotShape(parsed.active)||(parsed.previous!==null&&!validSnapshotShape(parsed.previous))) throw new Error('Invalid snapshot state');
  var previousRaw=storage.getItem(SNAPSHOT_STATE_KEY);
  storage.setItem(SNAPSHOT_STATE_KEY,serialized);
  var savedRaw=storage.getItem(SNAPSHOT_STATE_KEY), saved=null;
  try{ if(savedRaw===serialized) saved=JSON.parse(savedRaw); }catch(e){}
  if(!saved||saved.formatVersion!==1||!validSnapshotShape(saved.active)||(saved.previous!==null&&!validSnapshotShape(saved.previous))){
    var verificationError=new Error('Snapshot state verification failed');
    try{
      if(previousRaw===null) storage.removeItem(SNAPSHOT_STATE_KEY);
      else storage.setItem(SNAPSHOT_STATE_KEY,previousRaw);
    }catch(rollbackError){
      var rollbackFailure=new Error('Snapshot state verification failed; rollback failed');
      rollbackFailure.verificationError=verificationError;
      rollbackFailure.rollbackError=rollbackError;
      throw rollbackFailure;
    }
    throw verificationError;
  }
  return true;
}

function validateCandidateStructure(raw){
  var result={blockers:[],warnings:[]};
  SHEETS.forEach(function(sheet){
    var text=raw&&raw[sheet.key], def=SCHEMA.sheets[sheet.key], rows, mapped, strictDef;
    if(!text||String(text).trim().length<5){
      result.blockers.push(makeValidationFinding('blocker','SHEET_EMPTY',sheet.key,def.label+' 資料為空白'));
      return;
    }
    rows=parseCSV(text);
    if(!rows.length){
      result.blockers.push(makeValidationFinding('blocker','CSV_PARSE',sheet.key,def.label+' 不是有效的 CSV'));
      return;
    }
    if(def.kind==='table'){
      mapped=buildHeaderMap(rows,def);
      result.blockers=result.blockers.concat(mapped.blockers||[]);
      result.warnings=result.warnings.concat(mapped.warnings||[]);
    }
    if(def.kind==='itinerary'){
      strictDef={label:def.label,columns:def.columns.map(function(column){
        return {field:column.field,header:column.header,aliases:column.aliases||[],required:true};
      })};
      mapped=buildHeaderMap(rows,strictDef);
      result.blockers=result.blockers.concat(mapped.blockers||[]);
      result.warnings=result.warnings.concat(mapped.warnings||[]);
    }
  });
  return result;
}
function prepareSheetCandidate(raw,source,now,generationId){
  var structure=validateCandidateStructure(raw), db, validation, error;
  if(structure.blockers.length){
    error=new Error(structure.blockers.map(function(f){return f.message;}).join('；'));
    error.stage='structure'; error.findings=structure.blockers; throw error;
  }
  db=createDB(raw);
  validation=validateSnapshotData(db,raw,SCHEMA);
  validation.warnings=structure.warnings.concat(validation.warnings);
  if(validation.blockers.length){
    error=new Error(validation.blockers.map(function(f){return f.message;}).join('；'));
    error.stage='validation'; error.findings=validation.blockers; throw error;
  }
  generationId=generationId||source+'-'+now;
  return {db:db,validation:validation,snapshot:createDataSnapshot(raw,source,now,generationId,validation)};
}
function bootFailure(error){
  var failure=new Error(error&&error.message||'啟動資料驗證失敗');
  failure.stage='boot';
  failure.code=error&&error.code;
  failure.findings=error&&error.findings;
  return failure;
}
function selectBootData(storage,builtin){
  var state=readSnapshotState(storage), activeError=null, candidate, source, legacyRaw={}, legacyReady=true, legacyAt=0;
  function selectSnapshot(snapshot){
    if(!validSnapshotShape(snapshot)) throw new Error('Invalid snapshot shape');
    candidate=prepareSheetCandidate(snapshot.sheets,snapshot.source,snapshot.createdAt,snapshot.generationId);
    return {raw:snapshot.sheets,db:candidate.db,source:snapshot.source,snapshot:snapshot};
  }
  if(state&&state.active){
    try{ return selectSnapshot(state.active); }
    catch(error){ activeError=bootFailure(error); }
  }
  if(state&&state.previous){
    try{
      candidate=selectSnapshot(state.previous);
      if(activeError) saveSyncFailure(activeError,storage,state.active);
      return candidate;
    }catch(previousError){
      if(!activeError) activeError=bootFailure(previousError);
    }
  }
  SHEETS.forEach(function(sheet){
    var stored, parsed;
    if(!legacyReady) return;
    try{
      stored=storage.getItem('v2_cache_'+sheet.key);
      parsed=stored?JSON.parse(stored):null;
    }catch(error){ parsed=null; }
    if(!parsed||typeof parsed.text!=='string') legacyReady=false;
    else{
      legacyRaw[sheet.key]=parsed.text;
      if(Number(parsed.ts)>legacyAt) legacyAt=Number(parsed.ts);
    }
  });
  if(legacyReady){
    try{
      candidate=prepareSheetCandidate(legacyRaw,'legacy-migrated',legacyAt||Date.now(),'legacy-'+(legacyAt||Date.now()));
      writeSnapshotState(storage,{formatVersion:1,active:candidate.snapshot,previous:null});
      return {raw:candidate.snapshot.sheets,db:candidate.db,source:'legacy-migrated',snapshot:candidate.snapshot};
    }catch(legacyError){
      if(!activeError) activeError=bootFailure(legacyError);
    }
  }
  candidate=prepareSheetCandidate(builtin,'builtin',BUILTIN_TS,'builtin-'+BUILTIN_TS);
  if(activeError) saveSyncFailure(activeError,storage,state&&state.active);
  source='builtin';
  return {raw:candidate.snapshot.sheets,db:candidate.db,source:source,snapshot:candidate.snapshot};
}
function bootLocal(){
  var selected=selectBootData(localStorage,BUILTIN), nextSource={};
  SHEETS.forEach(function(sheet){nextSource[sheet.key]=selected.source;});
  RAW=selected.raw; DB=selected.db; SRC=nextSource; CURRENT_SNAPSHOT=selected.snapshot;
  return true;
}
function saveSyncFailure(error,storage,activeSnapshot){
  function bounded(value,limit){
    var text=String(value==null?'':value).replace(/[\r\n\t]+/g,' ').replace(/\s+/g,' ').trim();
    return text.length>limit?text.slice(0,limit-1)+'…':text;
  }
  var finding=error&&error.findings&&error.findings[0], target=storage||localStorage;
  var stage=bounded(error&&error.stage,24), sheet=bounded(error&&error.sheet||finding&&finding.sheet,80);
  var code=bounded(error&&error.code||finding&&finding.code,48).replace(/[^0-9A-Za-z_-]/g,'');
  var allowedReasons={download:'無法下載工作表資料',storage:'無法儲存完整資料版本'};
  var reason=finding?bounded(finding.message,160):allowedReasons[stage]||'';
  var failure={
    at:Date.now(),
    stage:stage,
    sheet:sheet,
    code:code,
    reason:reason,
    activeCreatedAt:activeSnapshot&&activeSnapshot.createdAt||CURRENT_SNAPSHOT&&CURRENT_SNAPSHOT.createdAt||null
  };
  try{ target.setItem(SNAPSHOT_FAILURE_KEY,JSON.stringify(failure)); }catch(ignore){}
}
function downloadAllSheets(){
  var raw={}, meta={}, partialSheets=[];
  return Promise.all(SHEETS.map(function(sheet){
    return fetchSheet(sheet).then(function(text){
      raw[sheet.key]=text;
      meta[sheet.key]={fetchedAt:Date.now()};
    },function(error){
      if(sheet.key==='ledger'){
        raw.ledger=CURRENT_SNAPSHOT&&CURRENT_SNAPSHOT.sheets&&CURRENT_SNAPSHOT.sheets.ledger||RAW.ledger||BUILTIN.ledger;
        meta.ledger={fetchedAt:Date.now(),failed:true,source:CURRENT_SNAPSHOT&&CURRENT_SNAPSHOT.sheets&&CURRENT_SNAPSHOT.sheets.ledger?'current-snapshot':'builtin',reason:String(error&&error.message||error||'下載失敗').slice(0,160)};
        partialSheets.push('ledger');
        AppLog.sync('ledger 下載失敗 — 沿用目前分帳快照,其餘工作表繼續更新');
        return;
      }
      if(!error||typeof error!=='object') error=new Error(String(error||'下載失敗'));
      error.stage='download'; error.sheet=sheet.key; throw error;
    });
  })).then(function(){return {raw:raw,sheetMeta:meta,partialSheets:partialSheets};});
}
var syncInFlight=null;
function syncAll(showToast){
  if(syncInFlight) return syncInFlight;
  setSyncState('syncing');
  syncInFlight=downloadAllSheets().then(function(download){
    var now=Date.now(), generation='sheet-'+now;
    var candidate=prepareSheetCandidate(download.raw,'online',now,generation);
    var current;
    candidate.snapshot.sheetMeta=download.sheetMeta;
    current=readSnapshotState(localStorage);
    try{
      writeSnapshotState(localStorage,nextSnapshotState(current,candidate.snapshot,CURRENT_SNAPSHOT));
    }catch(storageError){
      storageError.stage='storage';
      throw storageError;
    }
    RAW=candidate.snapshot.sheets;
    SRC={}; SHEETS.forEach(function(sheet){SRC[sheet.key]=download.partialSheets.indexOf(sheet.key)>=0?'cache':'online';});
    DB=candidate.db;
    CURRENT_SNAPSHOT=candidate.snapshot;
    if(typeof reconcileLedgerSettingsBridge==='function')reconcileLedgerSettingsBridge();
    renderAll();
    setSyncState(download.partialSheets.length?'partial':'online');
    try{localStorage.removeItem(SNAPSHOT_FAILURE_KEY);}catch(ignore){}
    if(showToast) toast(download.partialSheets.length?'其他資料已更新,分帳沿用目前版本':'已更新到最新版 ✓');
    return {ok:true,generationId:generation,warnings:candidate.validation.warnings,partialSheets:download.partialSheets};
  });
  syncInFlight=syncInFlight.then(function(result){
    syncInFlight=null; renderSyncStatusBody(); return result;
  },function(error){
    saveSyncFailure(error); setSyncState('failed');
    if(showToast) toast('同步失敗，繼續顯示目前版本');
    syncInFlight=null;
    renderSyncStatusBody();
    return {ok:false,error:error};
  });
  renderSyncStatusBody();
  return syncInFlight;
}
function manualSyncNew(){ toast('正在抓取最新行程…'); return syncAll(true); }
function manualSync(){ return manualSyncNew(); }
function syncStatusModel(){
  function pad(value){ return String(value).length<2?'0'+value:String(value); }
  function formatTime(value){
    var date=timestampDate(value);
    if(!value||isNaN(date.getTime())) return '尚無完整同步紀錄';
    return date.getFullYear()+'/'+pad(date.getMonth()+1)+'/'+pad(date.getDate())+' '+pad(date.getHours())+':'+pad(date.getMinutes());
  }
  function bounded(value,limit){
    var text=String(value==null?'':value).replace(/[\r\n\t]+/g,' ').replace(/\s+/g,' ').trim();
    return text.length>limit?text.slice(0,limit-1)+'…':text;
  }
  var snapshot=CURRENT_SNAPSHOT||null, source=snapshot&&snapshot.source||'builtin', partialLedger=snapshot&&snapshot.sheetMeta&&snapshot.sheetMeta.ledger&&snapshot.sheetMeta.ledger.failed, failureRecord=null, state, label;
  try{
    var stored=localStorage.getItem(SNAPSHOT_FAILURE_KEY);
    failureRecord=stored?JSON.parse(stored):null;
  }catch(ignore){ failureRecord=null; }
  if(syncInFlight){ state='syncing'; label='同步中'; }
  else if(source==='builtin'){ state='builtin'; label='內建資料'; }
  else if(failureRecord){ state='failed'; label='更新失敗'; }
  else if(partialLedger){ state='partial'; label='部分同步'; }
  else if(source==='online'){ state='online'; label='同步正常'; }
  else{ state='offline'; label='離線資料'; }
  var failedSheet='', failure='';
  if(failureRecord){
    var stageLabels={download:'下載失敗',structure:'資料結構檢查失敗',validation:'資料驗證失敗',storage:'本機儲存失敗',boot:'啟動資料驗證失敗'};
    var detail=stageLabels[failureRecord.stage]||'同步作業失敗';
    failedSheet=bounded(failureRecord.sheet,40);
    var code=bounded(failureRecord.code,40).replace(/[^0-9A-Za-z_-]/g,'');
    var reason=bounded(failureRecord.reason,160);
    failure=detail+(code?' ['+code+']':'')+(reason?'：'+reason:'');
  }else if(partialLedger){
    failedSheet='ledger';
    failure='分帳紀錄下載失敗,已沿用目前快照;其他工作表已更新';
  }
  return {
    state:state,
    label:label,
    lastComplete:formatTime(snapshot&&snapshot.createdAt),
    schemaVersion:SCHEMA.version,
    generationId:snapshot&&snapshot.generationId||'內建資料',
    failure:failure,
    failedSheet:failedSheet
  };
}
function closeSyncStatus(){
  var overlay=document.getElementById('syncStatusOverlay');
  if(overlay) overlay.remove();
}
function renderSyncStatusBody(){
  var model=syncStatusModel(), body=document.getElementById('syncStatusBody');
  var stateLabels={syncing:'同步中',online:'同步正常',partial:'部分同步',failed:'更新失敗',offline:'離線資料',builtin:'內建資料'};
  var label=model.label||stateLabels[model.state]||'更新失敗';
  var icon=model.state==='online'?'✓':model.state==='syncing'?'↻':model.state==='partial'?'△':'!';
  var html='<div class="sync-status-summary state-'+escapeHtml(model.state)+'">'+
    '<div class="sync-status-icon" aria-hidden="true">'+escapeHtml(icon)+'</div>'+
    '<div class="sync-status-title">'+escapeHtml(label)+'</div>'+
    '<div class="sync-status-time">最後完整同步 '+escapeHtml(model.lastComplete)+'</div>'+
    '<div class="sync-status-version">Schema '+escapeHtml(model.schemaVersion)+'／資料版本 '+escapeHtml(model.generationId)+'</div>'+
    '</div>';
  if(model.failedSheet){
    html+='<div class="sync-status-alert"><b>未同步 Sheet</b><span>'+escapeHtml(model.failedSheet)+'</span></div>';
  }
  if(model.failure){
    html+='<div class="sync-status-alert"><b>原因</b><span>'+escapeHtml(model.failure)+'</span></div>';
  }
  html+='<button class="sync-status-retry" onclick="retrySyncFromPanel(this)"'+(syncInFlight?' disabled':'')+'>立即重新同步</button>';
  if(body) body.innerHTML=html;
  return html;
}
function openSyncStatus(){
  closeSyncStatus();
  var overlay=document.createElement('div');
  overlay.id='syncStatusOverlay'; overlay.className='sync-status-overlay'; overlay.setAttribute('role','presentation');
  overlay.setAttribute('onclick','if(event.target===this)closeSyncStatus()');
  overlay.innerHTML='<section class="sync-status-panel" role="dialog" aria-modal="true" aria-labelledby="syncStatusTitle"><div class="sync-status-head"><h2 id="syncStatusTitle">資料同步狀態</h2><button class="sync-status-close" aria-label="關閉" onclick="closeSyncStatus()">×</button></div><div id="syncStatusBody"></div></section>';
  document.body.appendChild(overlay);
  renderSyncStatusBody();
}
function retrySyncFromPanel(button){
  if(button) button.disabled=true;
  return syncAll(true).then(function(result){
    if(button) button.disabled=false;
    renderSyncStatusBody();
    return result;
  },function(error){
    if(button) button.disabled=false;
    renderSyncStatusBody();
    throw error;
  });
}
function setSyncState(state){
  var dot=document.getElementById('syncDot'),txt=document.getElementById('syncTxt'),btn=document.getElementById('syncBtn');
  if(!dot) return;
  btn.classList.remove('spinning'); dot.className='dot';
  if(state==='syncing'){ btn.classList.add('spinning'); txt.textContent='同步中'; }
  else if(state==='online'){ txt.textContent='已同步'; }
  else if(state==='partial'){ dot.classList.add('stale'); txt.textContent='部分同步'; }
  else if(state==='legacy-migrated'||state==='cache'||state==='offline'){ dot.classList.add('stale'); txt.textContent='離線版'; }
  else if(state==='builtin'){ dot.classList.add('stale'); txt.textContent='內建版'; }
  else { dot.classList.add('err'); txt.textContent='更新失敗'; }
  renderSyncStatusBody();
}

/* ================= DB 組裝(CMS → 應用資料模型) ================= */
var DB={ places:{}, placeList:[], rest:[], shop:[], hotels:[], expCMS:[], expMembers:[], ledger:[], cfg:{}, trip:null };
function normType(t){ return schemaType(t); }

/* Expenses 表為自由格式(非欄位表):
   - 「同行成員:」列 → 成員清單(可供分帳初始化)
   - 類別列(交通/住宿/門票…,僅第1欄有值)→ 之後項目歸此類
   - 項目列:明細(第2欄)+ $台幣(第5欄)/ ¥日幣(第6欄)+ 備註(第7欄)
   - 小計/總計列獨立標記 */
function parseExpensesFree(rows){
  var L = SCHEMA.sheets.exp.layout;   // 欄位位置由 Schema 定義
  var members=[], items=[], curCat='';
  rows.forEach(function(r){
    var c0=(r[L.catCol]||'').trim(), c1=(r[L.nameCol]||'').trim(),
        twd=(r[L.twdCol]||'').trim(), jpy=(r[L.jpyCol]||'').trim(), note=(r[L.noteCol]||'').trim();
    if(c0.indexOf(L.membersRowMark)>=0){
      for(var i=L.nameCol;i<r.length;i++){ var v=(r[i]||'').trim(); if(v) members.push(v); }
      return;
    }
    if(c0==='項目' && c1==='明細') return;   // 表頭列
    var isTotal = L.totalMarks.some(function(m){ return c0.indexOf(m)===0; });
    if(isTotal){ items.push({cat:c0, name:'', twd:twd, jpy:jpy, note:note, total:true}); return; }
    if(c0 && !c1 && !twd && !jpy && !note){ curCat=c0.replace(/[：:]$/,''); return; }
    if(c1){ items.push({cat:(c0||curCat), name:c1, twd:twd, jpy:jpy, note:note}); }
  });
  return { members:members, items:items };
}

function createDB(raw){
  var db={trip:null,placeList:[],places:{},rest:[],shop:[],hotels:[],expCMS:[],expMembers:[],ledger:[],cfg:{}};
  db.trip=buildItin(parseCSV(raw.itin||''));
  db.placeList=parseTable(raw.places,'places');
  db.placeList.forEach(function(place){ place.tnorm=normType(place.type); if(place.placeId) db.places[place.placeId.toUpperCase()]=place; });
  db.rest=parseTable(raw.rest,'rest');
  db.shop=parseTable(raw.shop,'shop');
  db.hotels=parseTable(raw.hotels,'hotels');
  var expense=parseExpensesFree(parseCSV(raw.exp||''));
  db.expCMS=expense.items;
  db.expMembers=expense.members;
  db.ledger=(typeof SCHEMA!=='undefined'&&SCHEMA.sheets&&SCHEMA.sheets.ledger?parseTable(raw.ledger||'紀錄ID,時間,成員,類別,明細,日幣,台幣,備註\n','ledger'):[]).map(function(record){
    record.amountJpy=Number(String(record.amountJpy||'0').replace(/,/g,''))||0;
    record.amountTwd=Number(String(record.amountTwd||'0').replace(/,/g,''))||0;
    return record;
  });
  db.cfg=parseKeyValue(raw.cfg,'cfg');
  return db;
}

function buildDB(){
  DB=createDB(RAW);
  return DB;
}
var _refWarned = {};
function resolveRef(it){
  var ref=(it.ref||'').toUpperCase().trim();
  if(/^P\d+/.test(ref) && DB.places[ref]) return { kind:'place', p:DB.places[ref] };
  if(/^[PR]\d+/.test(ref) && !DB.places[ref] && !_refWarned[ref]){
    var isR = ref.charAt(0)==='R';
    var hasR = isR && DB.rest.some(function(x){ return (x.restId||'').toUpperCase()===ref; });
    if(!hasR && !isR){ AppLog.data('行程引用 '+ref+' 不存在於 Places — 改用名稱備援'); _refWarned[ref]=1; }
  }
  if(/^R\d+/.test(ref)){
    var r=DB.rest.find(function(x){ return (x.restId||'').toUpperCase()===ref; });
    if(r) return { kind:'rest', r:r };
  }
  // 名稱備援
  if(it.place){
    var flat=it.place.replace(/\s+/g,'');
    var p=DB.placeList.find(function(x){ return x.name && (flat.indexOf(x.name.replace(/\s+/g,''))>=0 || x.name.replace(/\s+/g,'').indexOf(flat)>=0); });
    if(p) return { kind:'place', p:p };
    var r2=DB.rest.find(function(x){ return x.name && flat.indexOf(x.name.replace(/\s+/g,''))>=0; });
    if(r2) return { kind:'rest', r:r2 };
  }
  return null;
}
function restaurantsOf(placeId){
  return DB.rest.filter(function(r){ return (r.placeId||'').toUpperCase()===String(placeId).toUpperCase(); });
}
function hotelOf(place){
  if(!DB.hotels.length) return null;
  var flat=(place.name||'').replace(/\s+/g,'');
  return DB.hotels.find(function(h){ return h.name && (flat.indexOf(h.name.replace(/\s+/g,''))>=0 || h.name.replace(/\s+/g,'').indexOf(flat)>=0); }) || DB.hotels[0];
}
function transport(){
  return DB.cfg.travelmode || 'drive';   // 值已由 Schema(cfg.keys.values)正規化為 drive/transit
}
function tripName(){ return DB.cfg.tripname || ''; }

/* ================= 打卡 / 想逛(個人狀態,存本機) ================= */
function getChecks(){ return lsGet('trip_checks',{}); }
function toggleCheck(id){ var c=getChecks(); if(c[id]) delete c[id]; else c[id]=true; lsSet('trip_checks',c); }
function dayProgressKey(day,dayIndex){
  var d=(day&&day.date)?day.date:('day'+(dayIndex+1));
  return 'day_'+(dayIndex+1)+'_'+String(d).replace(/[^0-9A-Za-z]/g,'_');
}
function getNextStopProgress(){ return lsGet('trip_next_stop_progress',{}); }
function saveNextStopProgress(progress){ lsSet('trip_next_stop_progress',progress); }
function emptyDayProgress(){ return { done:{}, skip:{} }; }
function normalizeDayProgress(progress){
  progress=progress||{};
  return { done:progress.done||{}, skip:progress.skip||{}, autoSkip:progress.autoSkip||{} };
}
function getDayProgress(day,dayIndex){
  var all=getNextStopProgress();
  return normalizeDayProgress(all[dayProgressKey(day,dayIndex)]);
}
function hasDayProgress(progress){
  progress=normalizeDayProgress(progress);
  return Object.keys(progress.done).length>0 || Object.keys(progress.skip).length>0;
}
function setItemCompletion(day,dayIndex,itemId,status){
  var all=getNextStopProgress();
  var key=dayProgressKey(day,dayIndex);
  var progress=normalizeDayProgress(all[key]);
  delete progress.done[itemId];
  delete progress.skip[itemId];
  delete progress.autoSkip[itemId];
  if(status==='done') progress.done[itemId]=true;
  if(status==='skip') progress.skip[itemId]=true;
  all[key]=progress;
  saveNextStopProgress(all);
  var checks=getChecks();
  if(status==='done') checks[itemId]=true;
  else delete checks[itemId];
  lsSet('trip_checks',checks);
}
function markNextStop(day,dayIndex,itemId,status){
  setItemCompletion(day,dayIndex,itemId,status);
}
/* 時間不能重來、行程不會同天回訪:已過時間且從未手動處理的項目,除了「最後一個」保留待確認外,
   其餘自動標記為略過(寫入 progress.skip,並記錄於 autoSkip 供 UI 顯示標籤與一鍵修正)。
   回傳 true 代表這次呼叫「新」標記了(用於決定是否要 toast),false 代表本來就已清除過,不重複動作。 */
function autoSkipStaleItem(day,dayIndex,itemId){
  if(typeof findToday==='function'&&findToday()!==dayIndex) return false;
  var all=getNextStopProgress();
  var key=dayProgressKey(day,dayIndex);
  var progress=normalizeDayProgress(all[key]);
  if(progress.done[itemId]||progress.skip[itemId]) return false;
  setItemCompletion(day,dayIndex,itemId,'skip');
  all=getNextStopProgress(); progress=normalizeDayProgress(all[key]); progress.autoSkip[itemId]=true; all[key]=progress; saveNextStopProgress(all);
  return true;
}
function isAutoSkipped(itemId,progress){
  return !!(progress&&progress.autoSkip&&progress.autoSkip[itemId]);
}
function isNextStopCleared(item,progress,checks){
  if(!item||!item.id) return false;
  progress=normalizeDayProgress(progress);
  checks=checks||{};
  return !!(progress.done[item.id]||progress.skip[item.id]||checks[item.id]);
}

function navQuery(it,res){

function navUrl(it,res){

function highlightNote(text){
  var t=escapeHtml(text);
  t=t.replace(/(https?:\/\/[^\s，、]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
  t=t.replace(/(訂單編號[：:]\s*\d+)/g,'<span class="hl">$1</span>');
  t=t.replace(/(TEL[：:]\s*[\d\-+ ]+)/gi,'<span class="hl">$1</span>');
  t=t.replace(/(¥[\d,]+)/g,'<span class="hl">$1</span>');
  return t;
}
function parseNoteLine(line){
  var t=(line||'').trim();
  var m=t.match(/^(•|-|\d+[.、]|[①②③④⑤⑥⑦⑧⑨⑩])\s*(.+)$/);
  if(m) return {type:'list', marker:m[1], text:m[2]};
  m=t.match(/^(※)\s*(.+)$/);
  if(m) return {type:'alert', marker:m[1], text:m[2]};
  return {type:'text', text:t};
}
function renderNote(text){
  if(!text) return '';
  var lines=String(text).split(/\r?\n/), out='', listOpen=false;
  function closeList(){ if(listOpen){ out+='</ul>'; listOpen=false; } }
  lines.forEach(function(line){
    var raw=(line||'').trim();
    if(!raw){ closeList(); return; }
    var item=parseNoteLine(raw);
    if(item.type==='list'){
      if(!listOpen){ out+='<ul class="note-list">'; listOpen=true; }
      out+='<li class="note-li"><span class="note-marker">'+escapeHtml(item.marker)+'</span><span>'+highlightNote(item.text)+'</span></li>';
      return;
    }
    closeList();
    if(item.type==='alert'){
      out+='<div class="note-alert"><span class="note-marker">'+escapeHtml(item.marker)+'</span><span>'+highlightNote(item.text)+'</span></div>';
    }else{
      out+='<div class="note-p">'+highlightNote(item.text)+'</div>';
    }
  });
  closeList();
  return out?'<div class="note-rich">'+out+'</div>':'';
}
function renderNoteBlock(text, icon){
  return text?'<div class="pc-tip">'+renderNote(text)+'</div>':'';
}
function extractDrive(moveText){
  if(!moveText) return '';
  var m=moveText.match(/開車約?\s*([\d.]+\s*(小時|分鐘)[\d.]*\s*(分鐘)?)/);
  return m?'開車約'+m[1].replace(/\s+/g,''):'';
}
function typeTag(res){
  if(!res) return null;
  if(res.kind==='rest') return {cls:'food',label:'🍜 '+(res.r.cat||'美食')};
  var t=res.p.tnorm;
  var rawType=(res.p.type||'').trim();
  if(rawType==='機場') return {cls:'move',label:'🛫 機場'};
  if(rawType==='纜車') return {cls:'play',label:'🚡 纜車'};
  if(t==='shopping') return {cls:'shop',label:'🏬 購物'};
  if(t==='restarea') return {cls:'food',label:'🍜 美食區'};
  if(t==='hotel') return {cls:'stay',label:'🏨 住宿'};
  if(t==='ferry') return {cls:'move',label:'⛴ 渡輪碼頭'};
  if(t==='parking') return {cls:'move',label:'🚗 租車/停車'};
  if(t==='fuel') return {cls:'move',label:'⛽ 加油站'};
  return {cls:'play',label:'⛩️ 景點'};
}

function parseScheduleLinks(text){
  text=String(text||'');
  var links=[], re=/https?:\/\/[^\s"'<>]+/g, m, last=0;

    var url=m[0].replace(/[、，。)）\]]+$/,'');
    var chunk=text.slice(last,m.index).trim();
    var q=chunk.match(/「([^」]+)」[^「」]*$/);
    var label=(q&&q[1]?q[1]:chunk.replace(/\s+/g,' ').replace(/^[:：\-–—]+/,'').trim());

    if(label.indexOf('時刻表')<0) label+='時刻表';
    links.push({ label:label, url:url });
    last=re.lastIndex;
  }
  return links;
}

/* 停車資訊「引用其他 Place」解析
   規則:停車備註(或停車費)欄若寫「停車同P004」,
   自動找到 P004 並完整繼承其停車資訊(MAPCODE/停車費/停車備註)。
   - 支援多層引用(P006→P005→P004),深度上限 3 防止循環引用
   - 引用的 PlaceID 不存在時:console.warn 提示、顯示原本內容、絕不報錯 */
function resolveParking(p, depth){
  depth = depth || 0;
  /* 現行 Places 停車資訊 = MAPCODE + 停車(單欄文字) */
  var park = { mapcode:p.mapcode||'', pnote:p.pnote||'' };
  var refM = park.pnote.match(/停車同\s*(P\d+)/i);
  if(!refM) return park;
  if(depth >= 3){ AppLog.data('停車引用層數過深(疑似循環引用),停止解析:'+p.placeId); return park; }
  var refId = refM[1].toUpperCase();
  var target = DB.places[refId];
  if(!target){ AppLog.data('找不到停車引用的地點:'+refId+'(來自 '+p.placeId+')'); return park; }
  return resolveParking(target, depth+1);   // 完整繼承目標停車資訊
}

function onCheck(id){
  var day=DB.trip&&DB.trip.days?DB.trip.days[curDay]:null;
  if(day){
    var progress=getDayProgress(day,curDay);
    if(isAutoSkipped(id,progress)){
      /* 這站被系統自動略過(時間已過但你沒手動處理);現在點打卡 = 你確認其實有完成,修正為完成 */
      markNextStop(day,curDay,id,'done');
      if(curView==='trip') renderTrip();
      else if(curView==='today') renderToday();
      toast('已修正為完成 ✓');
      return;
    }
  }
  var progress=day?getDayProgress(day,curDay):null;
  var wasDone=!!(getChecks()[id]||(progress&&progress.done[id]));
  if(day) setItemCompletion(day,curDay,id,wasDone?'clear':'done');
  else toggleCheck(id);
  var cancelledPast=false;
  if(wasDone&&day){
    var item=(day.items||[]).find(function(it){return it.id===id;});
    var crossDay=findToday()!==curDay;
    var timePick=item?pickNextStop([item],getDayProgress(day,curDay),{},currentMinutes(),null):null;
    var timePast=!!(item&&parseStartMinutes(item.time)!==null&&timePick&&timePick.source==='time-stale');
    cancelledPast=crossDay||timePast;
    if(cancelledPast) autoSkipStaleItem(day,curDay,id);
  }
  renderToday();
  if(curView==='trip') renderTrip();
  toast(cancelledPast?'已取消,該行程時間已過,列於已略過':(getChecks()[id]?'已打卡 ✓':'取消打卡'));
}

function selectCurrentTripItem(day,dayIndex,checks){ if(findToday()!==dayIndex) return null; var progress=getDayProgress(day,dayIndex); var pick=pickNextStop((day.items||[]).filter(isTripCheckableItem),progress,checks||getChecks(),currentMinutes(),{day:day,dayIndex:dayIndex}); return pick.item?pick.item.id:null; }
function renderTrip(){
  var view=document.getElementById('view-trip');
  var t=DB.trip;
  if(!t||!t.days.length){ view.innerHTML='<div class="empty-state">行程資料載入中…</div>'; return; }
  var day=t.days[curDay];
  if(!day){ curDay=0; day=t.days[0]; }
  var checks=getChecks();
  var progress=getDayProgress(day,curDay);
  var currentItemId=selectCurrentTripItem(day,curDay,checks);
  var acts=day.items.filter(isTripCheckableItem);
  var skipN=acts.filter(function(it){return !!progress.skip[it.id];}).length;
  var doneN=acts.filter(function(it){return !progress.skip[it.id]&&(!!checks[it.id]||!!progress.done[it.id]);}).length;
  var visibleItems=tripHideDone?day.items.filter(function(it){return !isTripCheckableItem(it) || !isTripItemCleared(it,day,curDay,checks);}):day.items;
  var visibleActs=visibleItems.filter(isTripCheckableItem);
  view.innerHTML='<div class="day-head"><span class="num">DAY '+(curDay+1)+'</span>'+
    '<span class="date">'+day.date+(day.dow?' ('+day.dow+')':'')+'</span>'+

    '<div class="trip-filter"><button class="trip-filter-btn '+(!tripHideDone?'on':'')+'" onclick="setTripHideDone(false)">顯示全部</button>'+

}

function findToday(){
  var md=todayMD();
  if(!DB.trip) return null;
  var di=DB.trip.days.findIndex(function(d){return d.date===md;});
  return di>=0?di:null;
}
function parseStartMinutes(timeText){
  var times=String(timeText||'').match(/\d{1,2}\s*:\s*\d{2}/g);
  var m=times&&times.length?times[times.length-1].match(/(\d{1,2})\s*:\s*(\d{2})/):null;
  if(!m) return null;
  var h=parseInt(m[1],10), min=parseInt(m[2],10);
  if(isNaN(h)||isNaN(min)||h<0||h>23||min<0||min>59) return null;
  return h*60+min;
}
function currentMinutes(){
  var d=appNow();
  return d.getHours()*60+d.getMinutes();
}

function weatherCityFromText(text){

function weatherHotelForItem(item,res){

  if(!candidates.length||!DB.hotels||!DB.hotels.length) return null;
  return DB.hotels.find(function(h){
    var name=(h.name||'').replace(/\s+/g,'');
    return name && candidates.some(function(flat){ return flat && (flat.indexOf(name)>=0 || name.indexOf(flat)>=0); });
  }) || null;
}
function weatherTextForItem(item,res){
  var p=res&&res.kind==='place'?res.p:null;

  var h=weatherHotelForItem(item,res);

function inferWeatherCity(item,res){
